// ── TOAST NOTIFICATION SYSTEM ─────────────────────────────────────────────────
// Replaces all alert() calls — non-blocking, auto-dismiss, stackable
function showToast(msg, type="info", duration=4000){
  // type: "info" | "success" | "warn" | "error"
  const colors={
    info:   {bg:"#4f8ef7", text:"#fff"},
    success:{bg:"#38d9a9", text:"#052e1c"},
    warn:   {bg:"#ffd166", text:"#1a1200"},
    error:  {bg:"#ff5f6d", text:"#fff"}
  };
  const {bg, text}=colors[type]||colors.info;

  // Stack toasts vertically — find existing ones and shift
  const existing=document.querySelectorAll(".vibe-toast");
  const offset=existing.length*60;

  const t=document.createElement("div");
  t.className="vibe-toast";
  t.style.cssText=[
    "position:fixed",
    "bottom:"+(1.5+offset/16)+"rem",
    "left:50%",
    "transform:translateX(-50%)",
    "background:"+bg,
    "color:"+text,
    "padding:.7rem 1.3rem",
    "border-radius:12px",
    "font-weight:700",
    "font-size:.85rem",
    "z-index:9999",
    "box-shadow:0 4px 20px #00000044",
    "font-family:'Sora',sans-serif",
    "max-width:90vw",
    "text-align:center",
    "transition:opacity .3s,transform .3s",
    "cursor:pointer",
    "line-height:1.4"
  ].join(";");
  t.textContent=msg;

  // Tap to dismiss
  t.addEventListener("click",()=>dismiss());
  document.body.appendChild(t);

  function dismiss(){
    t.style.opacity="0";
    t.style.transform="translateX(-50%) translateY(8px)";
    setTimeout(()=>{ t.remove(); repositionToasts(); },320);
  }

  function repositionToasts(){
    document.querySelectorAll(".vibe-toast").forEach((el,i)=>{
      el.style.bottom=(1.5+i*3.75)+"rem";
    });
  }

  const timer=setTimeout(dismiss, duration);
  t.addEventListener("click",()=>clearTimeout(timer),{once:true});
  return t;
}

async function markAbsences() {
  const today = new Date();
  const todayStr = localDateStr(today);
  if (today.getDay() === 0) return;

  const nowMin = today.getHours() * 60 + today.getMinutes();
  if (nowMin < 630) return;

  if (!DB.absences) DB.absences = [];

  try {
    const loaded = await loadFromSheet();
    if (!loaded) {
      console.warn("markAbsences: sheet unreachable, skipping this cycle");
      return;
    }
  } catch(e) {
    console.warn("markAbsences: sheet unreachable, skipping", e);
    return;
  }

  const checkedInToday = new Set(
    DB.attendance
      .filter(r => (r.type === "in" || r.type === "out") && localDateStr(new Date(r.timestamp)) === todayStr)
      .map(r => r.username)
  );
  const surveyedToday = new Set(
    (DB.surveys||[])
      .filter(s => s.date === todayStr)
      .map(s => s.username)
  );

  DB.users.filter(u => u.role !== "admin").forEach((u, idx) => {
    const isPresent = checkedInToday.has(u.username) || surveyedToday.has(u.username);
    const existingAbs = DB.absences.find(a => a.username === u.username && a.date === todayStr);
    if (isPresent && existingAbs) {
      DB.absences = DB.absences.filter(a => !(a.username === u.username && a.date === todayStr));
      const url = getScriptUrl();
      if(url) fetch(url, { method:"POST", redirect:"follow", headers:{"Content-Type":"text/plain"},
        body: JSON.stringify({ action:"removeAbsence", data:{ username: u.username, date: todayStr } }) }).catch(()=>{});
    } else if (!isPresent && !existingAbs) {
      const newAbs = { id: String(Date.now())+"_abs_"+idx, username: u.username, date: todayStr, auto: true };
      DB.absences.push(newAbs);
      gsPost({ action: "addAbsence", data: newAbs });
    }
  });
}

let _loadRunning = false;
async function loadFromSheet() {
  if (!getScriptUrl()) return false;
  _loadRunning = true;
  try {
    const result = await gsFetch({ action:"getAll" });
    if (!result || !result.ok) return false;

    const safeString = (val, fallback = "") => {
      if (val === null || val === undefined) return fallback;
      if (typeof val === 'function') return fallback;
      return String(val).trim();
    };
    const safeChain = (...vals) => {
      for (let v of vals) {
        const s = safeString(v, null);
        if (s) return s;
      }
      return "";
    };

    const sheetUsers = (result.users||[]).map(u => ({
        username:    safeString(u.username, ""),
        password:    safeString(u.password, ""),
        fullName:    safeChain(u.fullName, u.full_name, u.FullName, u.name),
        userId:      safeChain(u.userId, u.user_id, u.UserId, u.username),
        designation: safeString(u.designation, ""),
        location:    safeString(u.location, ""),
        role:        safeString(u.role, "user") || "user",
        geoLat:      safeString(u.geoLat, ""),
        geoLng:      safeString(u.geoLng, ""),
        geoRadius:   (u.geoRadius !== undefined && u.geoRadius !== "" && u.geoRadius !== null && typeof u.geoRadius !== 'function') ? parseInt(u.geoRadius) || 200 : 200,
        officeName:  safeString(u.officeName, "")
      })).filter(u => u.username);

    if (sheetUsers.length) {
      const localAdmins = DB.users.filter(u => u.role === "admin" && !sheetUsers.find(s => s.username === u.username));
      const merged = sheetUsers.map(su => {
        const local = DB.users.find(x => x.username === su.username);
        return {
          ...su,
          geoLat: su.geoLat || local?.geoLat || "",
          geoLng: su.geoLng || local?.geoLng || "",
          geoRadius: su.geoRadius || local?.geoRadius || 200,
          officeName: su.officeName || local?.officeName || ""
        };
      });
      DB.users = [...merged, ...localAdmins];
    }

    if (SESSION) {
      const sessionUser = DB.users.find(u => u.username === SESSION.username);
      if (sessionUser) {
        if (sessionUser.fullName && sessionUser.fullName.trim()) SESSION.fullName = sessionUser.fullName.trim();
      }
    }

    const safeParseFloat = (val, fallback = 0) => {
      const num = parseFloat(val);
      return isNaN(num) ? fallback : num;
    };

    const sheetAttend = (result.attendance||[]).map(r => {
      const lat = safeParseFloat(r.lat), lng = safeParseFloat(r.lng);
      const outLat = safeParseFloat(r.outLat), outLng = safeParseFloat(r.outLng);
      const validLoc = (r.lat && r.lng && lat >= -90 && lat <= 90 && lng >= -180 && lng <= 180) ? {lat, lng, workLocation: safeString(r.workLocation, "")} : null;
      const validOutLoc = (r.outLat && r.outLng && outLat >= -90 && outLat <= 90 && outLng >= -180 && outLng <= 180) ? {lat: outLat, lng: outLng} : null;
      const rType = safeString(r.type, "").toLowerCase();
      const localRec = r.id ? DB.attendance.find(x => x.id && String(x.id) === String(r.id)) : null;
      const inferredType = rType || localRec?.type || "in";
      const geoOk = r.geoOk === true || r.geoOk === "true" || r.geoOk === 1 || r.geoOk === "1";
      return {
        id: safeString(r.id, ""),
        username: safeString(r.username, ""),
        type: inferredType,
        timestamp: parseInt(r.timestamp)||0,
        location: validLoc,
        outLocation: validOutLoc,
        outTimestamp: parseInt(r.outTimestamp)||0,
        geoOk,
        geoName: safeString(r.geoName, ""),
        geoDist: r.geoDist!=null ? parseInt(r.geoDist)||0 : null
      };
    }).filter(r => r.username && r.timestamp);

    const byUserDay = {};
    sheetAttend.forEach(r => {
      const key = r.username + "__" + new Date(r.timestamp).toDateString();
      if(!byUserDay[key]) byUserDay[key] = [];
      byUserDay[key].push(r);
    });

    const orphanOuts = [];
    Object.entries(byUserDay).forEach(([key, recs]) => {
      const ins = recs.filter(r => r.type === "in");
      const outs = recs.filter(r => r.type === "out");
      if(outs.length && !ins.length){
        outs.forEach(r => orphanOuts.push(r));
        delete byUserDay[key];
      }
    });
    orphanOuts.forEach(orphan => {
      const candidates = Object.keys(byUserDay).filter(k =>
        k.startsWith(orphan.username + "__") &&
        byUserDay[k].some(r => r.type === "in" && orphan.timestamp > r.timestamp && orphan.timestamp - r.timestamp <= 28*60*60*1000)
      );
      if(candidates.length){
        const bestKey = candidates.reduce((a,b) => {
          const aIns = byUserDay[a].filter(r=>r.type==="in").map(r=>r.timestamp);
          const bIns = byUserDay[b].filter(r=>r.type==="in").map(r=>r.timestamp);
          const aIn = aIns.length ? Math.max(...aIns) : 0;
          const bIn = bIns.length ? Math.max(...bIns) : 0;
          return Math.abs(orphan.timestamp - aIn) < Math.abs(orphan.timestamp - bIn) ? a : b;
        });
        byUserDay[bestKey].push(orphan);
      }
    });

    const cleanedAttend = [];
    Object.values(byUserDay).forEach(recs => {
      const outs = recs.filter(r => r.type === "out");
      outs.forEach(r => cleanedAttend.push(r));
      const ins = recs.filter(r => r.type === "in");
      if(!outs.length){ ins.forEach(r => cleanedAttend.push(r)); return; }
      const lastOutTs = outs.length ? Math.max(...outs.map(r => r.timestamp)) : 0;
      ins.forEach(r => {
        if(r.timestamp < lastOutTs){ cleanedAttend.push(r); }
        else if(r.timestamp - lastOutTs > 5*60*1000){ cleanedAttend.push(r); }
      });
    });
    DB.attendance = cleanedAttend;

    const sheetSurveys = (result.surveys||[]).map(s => {
      const ts = parseInt(s.timestamp)||0;
      let d = "";
      try {
        if (ts) {
          d = localDateStr(new Date(ts));
        } else {
          d = safeString(s.date, "").slice(0,10);
        }
      } catch (e) {
        d = safeString(s.date, "").slice(0,10);
      }
      if(!d) return null;
      return { id: safeString(s.id, ""), username: safeString(s.username, ""), date: d, timestamp: ts, policy: parseInt(s.policy)||0, rsa: parseInt(s.rsa)||0, gpa: parseInt(s.gpa)||0 };
    }).filter(s => s && s.username && s.date);

    const surveyMap = {};
    sheetSurveys.forEach(s => {
      const key = s.username + "__" + s.date;
      const existing = surveyMap[key];
      if (!existing) { surveyMap[key] = s; }
      else {
        const existTotal = existing.policy + existing.rsa + existing.gpa;
        const newTotal = s.policy + s.rsa + s.gpa;
        if (newTotal > existTotal || (newTotal === existTotal && s.timestamp > existing.timestamp)) surveyMap[key] = s;
      }
    });
    DB.surveys = Object.values(surveyMap);

    const sheetAbsences = (result.absences||[]).map(a => {
      return {
        id: safeString(a.id, ""), 
        username: safeString(a.username, ""), 
        date: safeString(a.date, "").slice(0,10), 
        auto: a.auto||false
      };
    }).filter(a => a.username && a.date);
    DB.absences = sheetAbsences;

    const activeUsernames = new Set(DB.users.map(u => u.username));
    DB.absences = DB.absences.filter(a => activeUsernames.has(a.username));
    DB.surveys = DB.surveys.filter(s => activeUsernames.has(s.username));
    DB.attendance = DB.attendance.filter(r => activeUsernames.has(r.username));

    return true;
  } catch(e) { console.error("loadFromSheet error:", e); return false; }
  finally { _loadRunning = false; }
}

// ── GEOFENCE HELPERS ──────────────────────────────────────────────────────────
function haversineDistance(lat1,lng1,lat2,lng2){
  const R=6371000,toRad=x=>x*Math.PI/180;
  const dLat=toRad(lat2-lat1),dLng=toRad(lng2-lng1);
  const a=Math.sin(dLat/2)**2+Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function checkUserGeofence(userLat,userLng,username){
  const u=DB.users.find(x=>x.username===username);
  if(u&&u.geoLat&&u.geoLng){
    const lat = parseFloat(u.geoLat), lng = parseFloat(u.geoLng);
    if (isNaN(lat) || isNaN(lng)) return {ok:false,name:"",dist:0,radius:200};
    const d=haversineDistance(userLat,userLng,lat,lng);
    const radius=parseInt(u.geoRadius)||200;
    const name=u.officeName||"";
    return{ok:d<=radius,name,dist:Math.round(d),radius};
  }
  return{ok:true,name:"",dist:null,noLocationSet:true};
}

// ── WORK TIMING HELPERS ───────────────────────────────────────────────────────
const WORK_START_H=9,WORK_START_M=0;
const WORK_END_H=18,WORK_END_M=0;
const FULL_DAY_MIN=8*60;
const HALF_DAY_MIN=4*60;
const HALF_DAY_LATE_MIN=4*60;

function getArrivalStatus(tsMs){
  if(!tsMs)return null;
  const d=new Date(tsMs);
  const inMin=d.getHours()*60+d.getMinutes();
  const startMin=WORK_START_H*60+WORK_START_M;
  const lateMin=inMin-startMin;
  if(lateMin<=0)return{type:"ontime",label:"On Time"};
  if(lateMin>=HALF_DAY_LATE_MIN)return{type:"halfday",label:"Half Day"};
  const lh=Math.floor(lateMin/60),lm=lateMin%60;
  return{type:"late",label:lh>0?(lm>0?`${lh}h ${lm}m Late`:`${lh}h Late`):`${lm}m Late`};
}
function getDepartureStatus(tsMs, checkInTs){
  if(!tsMs)return null;
  if(!checkInTs){
    const d=new Date(tsMs);
    const outMin=d.getHours()*60+d.getMinutes();
    const endMin=WORK_END_H*60+WORK_END_M;
    return outMin<endMin?{type:"permission",label:"Permission"}:{type:"full",label:"Full Day"};
  }
  const workedMs=tsMs-checkInTs;
  const workedMin=Math.round(workedMs/60000);
  if(workedMin>=FULL_DAY_MIN) return{type:"full",label:"Full Day"};
  if(workedMin>=HALF_DAY_MIN) return{type:"permission",label:"Permission"};
  const wh=Math.floor(workedMin/60),wm=workedMin%60;
  return{type:"permission",label:wh>0?(wm>0?`${wh}h ${wm}m`:`${wh}h`):(`${wm}m`)};
}

  pwWrap.appendChild(inP);pwWrap.appendChild(eyeBtn);
  const btn=h("button",{className:"btn btn-primary"},"Sign In");

  function doLogin(){
    const u=inU.value.trim(),p=inP.value.trim();
    errBox.classList.add("hidden");
    if(!u||!p){errBox.textContent="Please enter username and password.";errBox.classList.remove("hidden");return}
    btn.disabled=true;btn.textContent="Verifying…";
    (async()=>{
      try{
        await loadFromSheet();
      }catch(_){}
      let found=DB.users.find(x=>x.username===u&&x.password===p);
      if(!found && DB.users.filter(x=>x.role==="admin").length===0){
        const defUser=def().users.find(x=>x.username===u&&x.password===p);
        if(defUser) found=defUser;
      }
      if(!found){
        errBox.textContent="Incorrect username or password.";errBox.classList.remove("hidden");
        btn.disabled=false;btn.textContent="Sign In";return;
      }
      proceedLogin(found,u,p);
    })();
  }

  function withLoginTimeout(promise, ms=6000){
    return Promise.race([promise, new Promise(res=>setTimeout(()=>res(false), ms))]);
  }

  function proceedLogin(found, u, p){
    if(found.role==="admin"){
      SESSION={username:found.username,fullName:found.fullName&&found.fullName.trim()?found.fullName.trim():found.username,role:"admin"};
      saveSession(SESSION);
      route();
      return;
    }
    if(!navigator.onLine){
      errBox.textContent="No internet connection. Please connect to the internet and try again.";
      errBox.classList.remove("hidden");
      btn.disabled=false;btn.textContent="Sign In";
      return;
    }
    const fn=found.fullName&&found.fullName.trim()?found.fullName.trim():found.username.charAt(0).toUpperCase()+found.username.slice(1).toLowerCase();
    SESSION={username:found.username,fullName:fn,role:"user"};
    saveSession(SESSION);
    sessionStorage.removeItem("vibeLastCheckout_"+SESSION.username);
    route();
  }
  btn.addEventListener("click",doLogin);
  [inU,inP].forEach(i=>i.addEventListener("keydown",e=>{if(e.key==="Enter")doLogin()}));
  [logo,sub,errBox,lbU,inU,lbP,pwWrap,btn].forEach(x=>card.appendChild(x));
  wrap.appendChild(card);render(wrap);
}

function showSurvey(onSubmit, onCancel){

  const sub=el("div","sub","Enter today's counts before checking out");
  function field(lbl,cls,placeholder){
    const wrap=h("div",{style:{marginBottom:"1.2rem"}});
    const ql=el("div","q-label "+cls,lbl);
    const inp=h("input",{type:"number",min:"0",placeholder});
    inp.style.marginBottom="0";
    wrap.appendChild(ql);wrap.appendChild(inp);
    return{wrap,inp};
  }
  const {wrap:w1,inp:i1}=field("📜 Today's Policy Count","q-policy","e.g. 5");
  const {wrap:w2,inp:i2}=field("🔐 Today's RSA Count","q-rsa","e.g. 3");
  const {wrap:w3,inp:i3}=field("🎓 Today's GPA Count","q-gpa","e.g. 2");
  const submitBtn=h("button",{className:"btn btn-primary",disabled:true,style:{marginTop:".5rem"}},"Please fill all 3 fields");
  function checkFill(){
    const ok=i1.value!==""&&i2.value!==""&&i3.value!=="";
    submitBtn.disabled=!ok;submitBtn.textContent=ok?"✓ Submit & Check Out":"Please fill all 3 fields";
  }
  [i1,i2,i3].forEach(i=>i.addEventListener("input",checkFill));
  submitBtn.addEventListener("click",()=>{
    const p=parseInt(i1.value)||0, r=parseInt(i2.value)||0, g=parseInt(i3.value)||0;
    if(p===0&&r===0&&g===0){
      if(!confirm("All counts are 0. Are you sure you want to submit with zero entries?")) return;
    }
    onSubmit({policy:p,rsa:r,gpa:g});overlay.remove();
  });
  [xBtn,title,sub,w1,w2,w3,submitBtn].forEach(x=>modal.appendChild(x));
  overlay.appendChild(modal);
  overlay.addEventListener("click",e=>{if(e.target===overlay){overlay.remove();if(onCancel)onCancel();}});
  document.body.appendChild(overlay);
}

  const todayRecs=()=>{
    const s=new Date().toDateString();
    const recs=myRecs().filter(r=>new Date(r.timestamp).toDateString()===s);
    const sessionCheckoutTs=parseInt(sessionStorage.getItem("vibeLastCheckout_"+SESSION.username)||"0");
    const outs=recs.filter(r=>r.type==="out");
    const lastOutTs=outs.length?Math.max(...outs.map(r=>r.timestamp)):0;
    const cutoff=Math.max(sessionCheckoutTs,lastOutTs);
    if(!cutoff)return recs;
    return recs.filter(r=>{
      if(r.type==="out")return true;

        const todayDayMap={in:null,out:null,inRec:null,outRec:null,outLoc:null};
        tr.filter(r=>r.type==="in").forEach(r=>{
          if(!todayDayMap.in||r.timestamp<todayDayMap.in){todayDayMap.in=r.timestamp;todayDayMap.inRec=r;}
        });
        tr.filter(r=>r.type==="out").forEach(r=>{
          if(!todayDayMap.out||r.timestamp>todayDayMap.out){todayDayMap.out=r.timestamp;todayDayMap.outRec=r;todayDayMap.outLoc=r.location||null;}
        });
        const _sessionOut=parseInt(sessionStorage.getItem("vibeLastCheckout_"+SESSION.username)||"0");
        if(_sessionOut&&_sessionOut>(todayDayMap.out||0)){
          const _sessionOutRec=myRecs().find(r=>r.type==="out"&&r.timestamp===_sessionOut)||myRecs().find(r=>r.type==="out"&&Math.abs(r.timestamp-_sessionOut)<2000);
          todayDayMap.out=_sessionOut;
          if(_sessionOutRec){todayDayMap.outRec=_sessionOutRec;todayDayMap.outLoc=_sessionOutRec.location||null;}
        }
        const arr=getArrivalStatus(todayDayMap.in);
        const dep=getDepartureStatus(todayDayMap.out, todayDayMap.in);
        const inRec=todayDayMap.inRec;
        const outRec=todayDayMap.outRec;
        const inLoc=inRec?.location||null;
        const outLoc=todayDayMap.outLoc||(outRec?.location)||null;

        const summaryCard=h("div",{style:{background:"var(--card)",border:"1px solid var(--border)",borderRadius:"12px",overflow:"hidden",marginBottom:"1rem"}});
        const sGrid=h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0"}});

        function summaryCell(icon,label,value,color,borderRight){
          const cell=h("div",{style:{padding:"1rem",borderBottom:"1px solid var(--border)",...(borderRight?{borderRight:"1px solid var(--border)"}:{})}});
          cell.appendChild(h("div",{style:{fontSize:".7rem",color:"var(--muted)",fontWeight:"700",textTransform:"uppercase",letterSpacing:".07em",marginBottom:".35rem"}},icon+" "+label));
          cell.appendChild(h("div",{style:{fontFamily:"var(--mono)",fontSize:"1.1rem",fontWeight:"700",color:color||"var(--text)"}},value));
          return cell;
        }
        sGrid.appendChild(summaryCell("▶","Check In", todayDayMap.in?new Date(todayDayMap.in).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):"—", "var(--accent2)", true));
        sGrid.appendChild(summaryCell("⏹","Check Out", todayDayMap.out?new Date(todayDayMap.out).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):"—", "var(--danger)", false));

        const arrVal=arr?arr.label:"—";
        const arrColor=arr?.type==="ontime"?"var(--gpa)":arr?.type==="halfday"?"var(--warn)":"var(--danger)";
        const depVal=dep?dep.label:"—";
        const depColor=dep?.type==="full"?"var(--gpa)":dep?.type==="permission"?"var(--policy)":"var(--muted)";
        sGrid.appendChild(summaryCell("⏰","Arrival", arrVal, arrColor, true));
        sGrid.appendChild(summaryCell("🚪","Departure", depVal, depColor, false));
        summaryCard.appendChild(sGrid);

        const locRow=h("div",{style:{padding:"1rem",borderTop:"1px solid var(--border)",display:"grid",gridTemplateColumns:"1fr 1fr",gap:"1rem"}});
        function locInfo(rec, rawLoc, label, color){
          const wrap=h("div",{});
          wrap.appendChild(h("div",{style:{fontSize:".7rem",color:"var(--muted)",fontWeight:"700",textTransform:"uppercase",letterSpacing:".07em",marginBottom:".3rem"}},"📍 "+label));
          const lat=rawLoc?.lat, lng=rawLoc?.lng;
          if(lat&&lng){
            const officeName=rec?.geoName&&rec.geoName!=="No office location set"&&rec.geoName!==""?rec.geoName:"";
            if(officeName) wrap.appendChild(h("div",{style:{fontSize:".8rem",fontWeight:"700",color:color,marginBottom:"2px"}},officeName));
            else wrap.appendChild(h("div",{style:{fontSize:".8rem",color:"var(--muted)"}}, "—"));
          } else {
            wrap.appendChild(h("div",{style:{fontSize:".8rem",color:"var(--muted)"}}, "—"));
          }
          return wrap;
        }
        locRow.appendChild(locInfo(inRec, inLoc, "In Location", "var(--accent2)"));
        locRow.appendChild(locInfo(outRec, outLoc, "Out Location", "var(--danger)"));
        summaryCard.appendChild(locRow);
        content.appendChild(summaryCard);

        tr.forEach(r=>{
          const rc=el("div","record-card");
          const dot=el("span","status-dot "+(r.type==="in"?"dot-in":"dot-out"));
          const info=h("div",{style:{flex:1}});
          const label=h("div",{style:{fontWeight:"600",fontSize:".88rem"}},r.type==="in"?"✅ Checked In":"🔴 Checked Out");
          const locLbl=r.geoName&&r.geoName!=="No office location set"&&r.geoName!==""
            ?`📍 ${r.geoName}`
            :"No location";
          const locEl=el("div","rec-loc",locLbl);
          info.appendChild(label);info.appendChild(locEl);
          const time=el("div","rec-time",new Date(r.timestamp).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}));
          rc.appendChild(dot);rc.appendChild(info);rc.appendChild(time);content.appendChild(rc);
        });
      }
    } else if(curTab==="monthly"){
      const allM=[...new Set(myRecs().map(r=>{const d=new Date(r.timestamp);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`}))].sort().reverse();
      if(!allM.includes(curMonthKey))allM.unshift(curMonthKey);
      const bar=el("div","month-bar");
      const lbl=h("label",{},"Month:");lbl.style.margin="0";
      const sel=h("select",{});
      allM.forEach(m=>{const o=h("option",{value:m},new Date(m+"-01").toLocaleString("default",{month:"long",year:"numeric"}));if(m===selMonth)o.selected=true;sel.appendChild(o)});
      sel.addEventListener("change",()=>{selMonth=sel.value;refresh()});
      bar.appendChild(lbl);bar.appendChild(sel);content.appendChild(bar);

      const mRecs=myRecs().filter(r=>{const d=new Date(r.timestamp);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`===selMonth});
      const mSurveys=(DB.surveys||[]).filter(s=>s.username===SESSION.username&&s.date&&s.date.startsWith(selMonth));
      const g3=el("div","grid3",null,{marginBottom:"1.2rem"});
      const policySum=mSurveys.reduce((s,r)=>s+(parseInt(r.policy)||0),0);
      const rsaSum=mSurveys.reduce((s,r)=>s+(parseInt(r.rsa)||0),0);
      const gpaSum=mSurveys.reduce((s,r)=>s+(parseInt(r.gpa)||0),0);
      [["policy","📜 Policy",policySum],["rsa","🔐 RSA",rsaSum],["gpa","🎓 GPA",gpaSum]].forEach(([cls,lbl,v])=>{
        const b=el("div","stat-box "+cls);b.innerHTML=`<div class="num">${v}</div><div class="lbl">${lbl} Total</div>`;g3.appendChild(b);
      });
      content.appendChild(g3);

      const dayMap={};
      mRecs.filter(r=>r.type==="in").forEach(r=>{
        const k=new Date(r.timestamp).toDateString();
        if(!dayMap[k])dayMap[k]={date:new Date(r.timestamp),in:null,out:null,loc:null,outLoc:null,inRec:null,outRec:null};
        if(!dayMap[k].in||r.timestamp<dayMap[k].in){
          dayMap[k].in=r.timestamp;dayMap[k].loc=r.location;dayMap[k].inRec=r;
          if(r.outLocation&&!dayMap[k].outLoc){
            dayMap[k].outLoc=r.outLocation;
            if(!dayMap[k].outRec)dayMap[k].outRec={location:r.outLocation,geoName:r.geoName||"",geoOk:r.geoOk||false,geoDist:r.geoDist??null};
          }
          if(r.outTimestamp&&!dayMap[k].out)dayMap[k].out=r.outTimestamp;
        }
      });
      mRecs.filter(r=>r.type==="out").forEach(r=>{
        const outKey=new Date(r.timestamp).toDateString();
        const target=dayMap[outKey]||null;
        if(!target)return;
        if(!target.out||r.timestamp>target.out){target.out=r.timestamp;target.outLoc=r.location||r.outLocation||null;target.outRec=r;}
      });
      const days=Object.values(dayMap).sort((a,b)=>b.date-a.date);
      const st1=el("div","section-title",`Attendance — ${new Date(selMonth+"-01").toLocaleString("default",{month:"long",year:"numeric"})}`);
      content.appendChild(st1);
      if(!days.length){content.appendChild(el("div","empty","No attendance for this month."))}
      else{
        const tw=h("div",{style:{overflowX:"auto",background:"var(--card)",borderRadius:"12px",border:"1px solid var(--border)"}});
        const tbl=el("table","month-table");
        tbl.innerHTML=`<thead><tr><th>Date</th><th>Check In</th><th>Check Out</th><th>⏰ Arrival</th><th>🚪 Departure</th><th>📍 In Location</th><th>📍 Out Location</th></tr></thead>`;
        const tb2=document.createElement("tbody");
        days.forEach(d=>{
          const tr2=document.createElement("tr");
          const mins=d.in&&d.out?Math.round((d.out-d.in)/60000):null;
          const hrs=mins?`${Math.floor(mins/60)}h ${mins%60}m`:"—";
          const hrsVal=mins?mins/60:null;
          const hrsColor=!mins?"var(--muted)":hrsVal>=8?"var(--gpa)":hrsVal>=4?"var(--warn)":"var(--danger)";
          const hrsBg=!mins?"transparent":hrsVal>=8?"#38d9a922":hrsVal>=4?"#ffd16622":"#ff5f6d22";
          const hrsBorder=!mins?"transparent":hrsVal>=8?"#38d9a944":hrsVal>=4?"#ffd16644":"#ff5f6d44";
          const arr=getArrivalStatus(d.in);
          const dep=getDepartureStatus(d.out, d.in);
          const arrCell=arr?`<span class="timing-pill tp-${arr.type}">${arr.label}</span>`:"—";
          const depCell=dep?`<span class="timing-pill tp-${dep.type==="full"?"ontime":dep.type}">${dep.label}</span>`:"—";
          const geoRec=d.inRec||myRecs().find(r=>r.type==="in"&&r.timestamp===d.in);
          const inLoc=d.loc||(geoRec?.location)||null;
          let inGeoName=inLoc?.lat&&geoRec?.geoName&&geoRec.geoName!=="No office location set"&&geoRec.geoName!==""?geoRec.geoName:"";
          const inGeoCell=inLoc?.lat
            ?`<a href="https://maps.google.com/?q=${inLoc.lat},${inLoc.lng}" target="_blank" style="font-size:.75rem;font-family:var(--mono);color:var(--accent2);text-decoration:none">📍 ${parseFloat(inLoc.lat).toFixed(4)}, ${parseFloat(inLoc.lng).toFixed(4)}</a>${inGeoName?`<div style="font-size:.7rem;color:var(--gpa);font-weight:700">🏢 ${inGeoName}</div>`:""}`
            :`<span style="color:var(--muted);font-size:.75rem">—</span>`;
          const outLoc=d.outLoc||(d.outRec?.location)||null;
          let outGeoName=outLoc?.lat&&d.outRec?.geoName&&d.outRec.geoName!=="No office location set"&&d.outRec.geoName!==""?d.outRec.geoName:"";
          const outGeoCell=outLoc?.lat
            ?`<a href="https://maps.google.com/?q=${outLoc.lat},${outLoc.lng}" target="_blank" style="font-size:.75rem;font-family:var(--mono);color:var(--danger);text-decoration:none">📍 ${parseFloat(outLoc.lat).toFixed(4)}, ${parseFloat(outLoc.lng).toFixed(4)}</a>${outGeoName?`<div style="font-size:.7rem;color:var(--gpa);font-weight:700">🏢 ${outGeoName}</div>`:""}`
            :`<span style="color:var(--muted);font-size:.75rem">—</span>`;
          tr2.innerHTML=`<td style="font-family:var(--mono);font-size:.8rem">${d.date.toLocaleDateString("en-GB",{weekday:"short",day:"2-digit",month:"short"})}</td>
            <td style="color:var(--accent2);font-family:var(--mono);font-size:.82rem">${d.in?new Date(d.in).toLocaleTimeString([],({"hour":"2-digit","minute":"2-digit"})):"—"}</td>
            <td style="color:var(--danger);font-family:var(--mono);font-size:.82rem">${d.out?new Date(d.out).toLocaleTimeString([],({"hour":"2-digit","minute":"2-digit"})):"—"}</td>
            <td>${arrCell}</td>
            <td>${depCell}</td>
            <td>${inGeoCell}</td>
            <td>${outGeoCell}</td>`;
          tb2.appendChild(tr2);
        });
        tbl.appendChild(tb2);tw.appendChild(tbl);content.appendChild(tw);
      }

      if(mSurveys.length){
        const st2=el("div","section-title","Survey Responses");content.appendChild(st2);
        const tw2=h("div",{style:{overflowX:"auto",background:"var(--card)",borderRadius:"12px",border:"1px solid var(--border)"}});
        const tbl2=el("table","month-table");
        tbl2.innerHTML=`<thead><tr><th>Date</th><th>📜 Policy</th><th>🔐 RSA</th><th>🎓 GPA</th></tr></thead>`;
        const tb3=document.createElement("tbody");
        [...mSurveys].sort((a,b)=>b.timestamp-a.timestamp).forEach(s=>{
          const tr3=document.createElement("tr");
          tr3.innerHTML=`<td style="font-family:var(--mono);font-size:.8rem">${s.date}</td>
            <td><span class="pill pill-pend">${s.policy??0}</span></td>
            <td><span class="pill pill-yes">${s.rsa??0}</span></td>
            <td><span class="pill pill-gpa">${s.gpa??0}</span></td>`;
          tb3.appendChild(tr3);
        });
        tbl2.appendChild(tb3);tw2.appendChild(tbl2);content.appendChild(tw2);
      }
    }

    if(curTab==="calendar"){
      if(!window._calMonth)window._calMonth=curMKS;
      const calNav=h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"1rem"}});
      const prevBtn=h("button",{className:"btn btn-ghost btn-sm"},"◀");
      const nextBtn=h("button",{className:"btn btn-ghost btn-sm"},"▶");
      const calTitle=h("div",{style:{fontWeight:"700",fontSize:"1rem",color:"var(--text)"}},
        new Date(window._calMonth+"-01").toLocaleString("default",{month:"long",year:"numeric"}));
      prevBtn.addEventListener("click",()=>{
        const d=new Date(window._calMonth+"-01");d.setMonth(d.getMonth()-1);
        window._calMonth=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;refresh();});
      nextBtn.addEventListener("click",()=>{
        const d=new Date(window._calMonth+"-01");d.setMonth(d.getMonth()+1);
        window._calMonth=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;refresh();});
      if(window._calMonth>=curMKS) nextBtn.disabled=true;
      calNav.appendChild(prevBtn);calNav.appendChild(calTitle);calNav.appendChild(nextBtn);
      content.appendChild(calNav);

      const calRecs=myRecs().filter(r=>{const d=new Date(r.timestamp);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`===window._calMonth});
      const calDayMap={};
      calRecs.forEach(r=>{
        const k=localDateStr(new Date(r.timestamp));
        if(!calDayMap[k])calDayMap[k]={in:null,out:null};
        if(r.type==="in"&&(!calDayMap[k].in||r.timestamp<calDayMap[k].in)){
          calDayMap[k].in=r.timestamp;
          // Also capture outTimestamp embedded in check-in row (some sheet layouts store both in one row)
          if(r.outTimestamp&&(!calDayMap[k].out||r.outTimestamp>calDayMap[k].out)) calDayMap[k].out=r.outTimestamp;
        }
        if(r.type==="out"&&(!calDayMap[k].out||r.timestamp>calDayMap[k].out)) calDayMap[k].out=r.timestamp;
      });
      // FIX: Mark a day as "full day" (green) if the user submitted a survey for that date
      // (survey is only submitted at checkout, so its presence = full checkout happened)
      const calSurveyDates=new Set((DB.surveys||[]).filter(s=>s.username===SESSION.username&&(s.date||"").startsWith(window._calMonth)).map(s=>s.date));
      calSurveyDates.forEach(date=>{
        if(!calDayMap[date])calDayMap[date]={in:null,out:null};
        if(!calDayMap[date].out) calDayMap[date].out=1; // sentinel: survey = checked out
      });
      // FIX: Compute absent dates on-the-fly instead of relying on DB.absences
      // DB.absences only gets written if admin was logged in after 10:30 AM — unreliable.
      const calAbsent=(()=>{
        const s=new Set();
        const todayStr=localDateStr(new Date());
        const calParts=(window._calMonth||"").split("-");
        if(calParts.length<2)return s;
        const cy=parseInt(calParts[0]),cm=parseInt(calParts[1])-1;
        const dim=new Date(cy,cm+1,0).getDate();
        for(let d=1;d<=dim;d++){
          const ds=window._calMonth+"-"+String(d).padStart(2,"0");
          if(ds>=todayStr)continue; // skip today and future
          const dow=new Date(cy,cm,d).getDay();
          if(dow===0)continue; // skip Sunday
          if(!calDayMap[ds])s.add(ds);
        }
        return s;
      })();

      const parts = (window._calMonth || "").split("-");
      if (parts.length < 2) return;
      const calYear=parseInt(parts[0]);
      const calMonthIdx=parseInt(parts[1])-1;
      if (isNaN(calYear) || isNaN(calMonthIdx)) return;
      const firstDay=new Date(calYear,calMonthIdx,1).getDay();
      const daysInMonth=new Date(calYear,calMonthIdx+1,0).getDate();
      const todayDateStr=localDateStr(new Date());

      const calWrap=h("div",{style:{background:"var(--card)",borderRadius:"14px",border:"1px solid var(--border)",padding:"1rem"}});
      const dayHeaders=h("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"2px",marginBottom:"4px"}});
      ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach(d=>{
        dayHeaders.appendChild(h("div",{style:{textAlign:"center",fontSize:".7rem",fontWeight:"700",color:"var(--muted)",padding:".3rem 0"}},d));
      });
      calWrap.appendChild(dayHeaders);

      const calGrid=h("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"3px"}});
      for(let i=0;i<firstDay;i++) calGrid.appendChild(h("div",{}));

      for(let day=1;day<=daysInMonth;day++){
        const dateStr=`${window._calMonth}-${String(day).padStart(2,"0")}`;
        const dayData=calDayMap[dateStr];
        const isAbsent=calAbsent.has(dateStr);
        const isToday=dateStr===todayDateStr;
        const isWeekend=new Date(calYear,calMonthIdx,day).getDay()===0;
        const isFuture=dateStr>todayDateStr;

        let bg="transparent",color="var(--text)",border="1px solid transparent";
        if(isToday){border="2px solid var(--accent)";color="var(--accent)";}
        if(isFuture){color="var(--muted)";}
        else if(isWeekend&&!dayData){color="var(--muted)";}
        else if(dayData?.in&&dayData?.out){bg="#38d9a922";color="var(--gpa)";border="1px solid #38d9a944";}
        else if(dayData?.in&&!dayData?.out){bg="#4f8ef722";color="var(--accent)";border="1px solid #4f8ef744";}
        else if(isAbsent){bg="#ff5f6d22";color="var(--danger)";border="1px solid #ff5f6d44";}

        const cell=h("div",{style:{
          textAlign:"center",borderRadius:"8px",padding:".4rem .1rem",cursor:(dayData||isAbsent)?"pointer":"default",
          background:bg,border,color,fontSize:".85rem",fontWeight:isToday?"800":"600",
          transition:"all .15s",minHeight:"2.2rem",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"
        }},String(day));

        if(dayData?.in){
          const timeStr=new Date(dayData.in).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
          cell.appendChild(h("div",{style:{fontSize:".55rem",color:"var(--accent2)",fontFamily:"var(--mono)",marginTop:"1px"}},timeStr));
        }

        if(dayData||isAbsent){
          cell.addEventListener("click",()=>{
            document.querySelectorAll(".cal-popup").forEach(p=>p.remove());
            const popup=el("div","cal-popup");
            popup.style.cssText=`position:fixed;inset:0;background:#00000088;display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem`;
            const box=h("div",{style:{background:"var(--card)",border:"1px solid var(--border)",borderRadius:"16px",padding:"1.5rem",width:"100%",maxWidth:"320px",position:"relative"}});
            const closeBtn=h("button",{className:"x-btn"},"✕");closeBtn.addEventListener("click",()=>popup.remove());
            const dateLabel=new Date(calYear,calMonthIdx,day).toLocaleDateString("en-GB",{weekday:"long",day:"2-digit",month:"long",year:"numeric"});
            box.appendChild(closeBtn);
            box.appendChild(h("div",{style:{fontSize:"1.1rem",fontWeight:"700",marginBottom:"1rem",paddingRight:"2rem"}},dateLabel));
            if(isAbsent&&!dayData?.in){
              box.appendChild(h("div",{style:{color:"var(--danger)",fontWeight:"700",fontSize:".9rem"}},"🔴 Absent"));
            } else {
              const rows=[
                ["Check In", dayData?.in?new Date(dayData.in).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):"—","var(--accent2)"],
                ["Check Out", dayData?.out?new Date(dayData.out).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):"—","var(--danger)"],
              ];
              rows.forEach(([lbl,val,col])=>{
                const row=h("div",{style:{display:"flex",justifyContent:"space-between",padding:".5rem 0",borderBottom:"1px solid var(--border)"}});
                row.appendChild(h("span",{style:{color:"var(--muted)",fontSize:".85rem"}},lbl));
                row.appendChild(h("span",{style:{color:col,fontFamily:"var(--mono)",fontWeight:"700",fontSize:".85rem"}},val));
                box.appendChild(row);
              });
              const survey=(DB.surveys||[]).find(s=>s.username===SESSION.username&&s.date===dateStr);
              if(survey){
                box.appendChild(h("div",{style:{marginTop:".8rem",fontSize:".78rem",fontWeight:"700",color:"var(--muted)",letterSpacing:".06em",textTransform:"uppercase"}},"Survey"));
                [["📜 Policy",survey.policy||0,"var(--policy)"],["🔐 RSA",survey.rsa||0,"var(--rsa)"],["🎓 GPA",survey.gpa||0,"var(--gpa)"]].forEach(([lbl,val,col])=>{
                  const row=h("div",{style:{display:"flex",justifyContent:"space-between",padding:".4rem 0",borderBottom:"1px solid var(--border)"}});
                  row.appendChild(h("span",{style:{color:"var(--muted)",fontSize:".85rem"}},lbl));
                  row.appendChild(h("span",{style:{color:col,fontFamily:"var(--mono)",fontWeight:"700",fontSize:".85rem"}},String(val)));
                  box.appendChild(row);
                });
              }
            }
            popup.appendChild(box);
            popup.addEventListener("click",e=>{if(e.target===popup)popup.remove();});
            document.body.appendChild(popup);
          });
          cell.addEventListener("mouseenter",()=>{if(dayData)cell.style.opacity=".8";});
          cell.addEventListener("mouseleave",()=>{cell.style.opacity="1";});
        }
        calGrid.appendChild(cell);
      }
      calWrap.appendChild(calGrid);

      const legend=h("div",{style:{display:"flex",gap:".75rem",flexWrap:"wrap",marginTop:"1rem",fontSize:".72rem"}});
      [["#38d9a922","#38d9a944","var(--gpa)","Full Day"],["#4f8ef722","#4f8ef744","var(--accent)","Checked In"],["#ff5f6d22","#ff5f6d44","var(--danger)","Absent"]].forEach(([bg,border,col,lbl])=>{
        const item=h("div",{style:{display:"flex",alignItems:"center",gap:".3rem"}});
        item.appendChild(h("span",{style:{width:"12px",height:"12px",borderRadius:"3px",background:bg,border:`1px solid ${border}`,display:"inline-block"}}));
        item.appendChild(h("span",{style:{color:"var(--muted)"}},lbl));
        legend.appendChild(item);
      });
      calWrap.appendChild(legend);
      content.appendChild(calWrap);
    }
  }
  refresh();render(dash);
}

// ── SURVEY EDIT MODAL ────────────────────────────────────────────────────────
function openSurveyEditModal(survey, onSave) {
  const ov=el("div","modal-overlay");
  const mo=el("div","modal",null,{maxWidth:"420px"});
  const xb=h("button",{className:"x-btn"},"✕");xb.addEventListener("click",()=>ov.remove());
  mo.appendChild(xb);
  mo.appendChild(h("div",{style:{fontSize:"1.5rem",marginBottom:".4rem"}},"✏️"));
  mo.appendChild(h("h2",{},"Edit Survey Entry"));
  const sub=el("div","sub","");
  sub.innerHTML=`User: <strong>${escapeHtml(survey.username)}</strong> &nbsp;·&nbsp; Date: <strong>${escapeHtml(survey.date)}</strong>`;
  mo.appendChild(sub);
  function numField(labelTxt, cls, val) {
    const wrap=h("div",{style:{marginBottom:"1.2rem"}});
    const ql=el("div","q-label "+cls,labelTxt);
    const inp=h("input",{type:"number",min:"0",value:val});
    inp.style.marginBottom="0";wrap.appendChild(ql);wrap.appendChild(inp);
    return {wrap,inp};
  }
  const {wrap:w1,inp:i1}=numField("📜 Policy Count","q-policy",survey.policy||0);
  const {wrap:w2,inp:i2}=numField("🔐 RSA Count","q-rsa",survey.rsa||0);
  const {wrap:w3,inp:i3}=numField("🎓 GPA Count","q-gpa",survey.gpa||0);
  const saveBtn=h("button",{className:"btn btn-primary",style:{marginTop:".5rem"}},"💾 Save Changes");
  saveBtn.addEventListener("click",async()=>{
    const idx=DB.surveys.findIndex(s=>s.id===survey.id);
    if(idx>=0){
      const updated={...DB.surveys[idx],policy:parseInt(i1.value)||0,rsa:parseInt(i2.value)||0,gpa:parseInt(i3.value)||0};
      saveBtn.disabled=true;saveBtn.textContent="Saving…";
      DB.surveys[idx]=updated;
      await gsPost({action:"addSurvey",data:updated});
    }
    ov.remove();onSave();
  });
  const delBtn=h("button",{className:"btn btn-danger",style:{marginTop:".6rem"}},"🗑 Delete This Entry");
  delBtn.addEventListener("click",async()=>{
    if(!confirm("Delete this survey entry?"))return;
    DB.surveys=DB.surveys.filter(s=>s.id!==survey.id);
    await gsPost({action:"deleteSurvey",data:{id:survey.id}});
    ov.remove();onSave();
  });
  const cancelBtn=h("button",{className:"btn btn-ghost",style:{marginTop:".6rem"}},"Cancel");
  cancelBtn.addEventListener("click",()=>ov.remove());
  [w1,w2,w3,saveBtn,delBtn,cancelBtn].forEach(x=>mo.appendChild(x));
  ov.appendChild(mo);document.body.appendChild(ov);
}

function openQueueInspector(onClose){ if(onClose) onClose(); }

// ── USER DATA MODAL ───────────────────────────────────────────────────────────
function openUserDataModal(u, allAttend, allSurveys){
  const ov=el("div","modal-overlay");
  const mo=el("div","modal",null,{maxWidth:"560px"});
  const xb=h("button",{className:"x-btn"},"✕");xb.addEventListener("click",()=>ov.remove());
  mo.appendChild(xb);

  const displayName=(u.fullName&&u.fullName.trim())?u.fullName.trim():(u.username.charAt(0).toUpperCase()+u.username.slice(1).toLowerCase());
  const titleEl=h("h2",{},displayName);
  const subEl=h("div",{style:{color:"var(--muted)",fontSize:".82rem",marginBottom:"1.2rem",display:"flex",flexWrap:"wrap",gap:".5rem",alignItems:"center"}});
  subEl.appendChild(h("span",{style:{background:"#4f8ef722",color:"var(--accent)",border:"1px solid #4f8ef744",borderRadius:"6px",padding:".1rem .45rem",fontSize:".75rem",fontFamily:"var(--mono)"}},"ID: "+(u.userId||u.username)));
  if(u.designation)subEl.appendChild(h("span",{},"🏷 "+u.designation));
  if(u.location)subEl.appendChild(h("span",{},"📍 "+u.location));
  mo.appendChild(titleEl);mo.appendChild(subEl);

  const userAttend=allAttend.filter(r=>r.username===u.username).sort((a,b)=>b.timestamp-a.timestamp);
  const userSurveys=(allSurveys||[]).filter(s=>s.username===u.username).sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  const userAbsences=(DB.absences||[]).filter(a=>a.username===u.username).sort((a,b)=>(b.date||"").localeCompare(a.date||""));

  const now=new Date();
  const curMon=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
  const presentDays=new Set(userAttend.filter(r=>r.type==="in").map(r=>new Date(r.timestamp).toDateString())).size;
  const monthSurveys=userSurveys.filter(s=>(s.date||"").startsWith(curMon));
  const monthPolicy=monthSurveys.reduce((s,r)=>s+(parseInt(r.policy)||0),0);
  const monthRsa=monthSurveys.reduce((s,r)=>s+(parseInt(r.rsa)||0),0);
  const monthGpa=monthSurveys.reduce((s,r)=>s+(parseInt(r.gpa)||0),0);
  // FIXED: Compute absent days from attendance data — do NOT rely on DB.absences
  // (only written if admin was logged in after 10:30 AM — unreliable)
  const monthAbsences=(()=>{
    const today=now;
    const year=parseInt(curMon.split("-")[0]);
    const month=parseInt(curMon.split("-")[1])-1;
    const daysInMonth=new Date(year,month+1,0).getDate();
    const lastDay=Math.min(daysInMonth,today.getDate());
    const presentDates=new Set([
      ...userAttend.filter(r=>r.type==="in").map(r=>localDateStr(new Date(r.timestamp))),
      ...userSurveys.map(s=>s.date)
    ]);
    let count=0;
    for(let d=1;d<=lastDay;d++){
      const dateStr=curMon+"-"+String(d).padStart(2,"0");
      const dow=new Date(year,month,d).getDay();
      if(dow===0)continue; // skip Sunday
      if(dateStr===localDateStr(today))continue; // skip today
      if(!presentDates.has(dateStr))count++;
    }
    return count;
  })();

  const statsGrid=h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:".6rem",marginBottom:"1.2rem"}});
  function statBox(num,lbl,col){
    const b=h("div",{style:{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"10px",padding:".75rem 1rem"}});
    b.appendChild(h("div",{style:{fontSize:"1.5rem",fontWeight:"900",fontFamily:"var(--mono)",color:col}},String(num)));
    b.appendChild(h("div",{style:{fontSize:".72rem",color:"var(--muted)",marginTop:".15rem"}},lbl));
    return b;
  }
  statsGrid.appendChild(statBox(presentDays,"Total Present","var(--accent2)"));
  statsGrid.appendChild(statBox(monthAbsences,"Absent This Month","var(--danger)"));
  statsGrid.appendChild(statBox(monthPolicy,"Policy This Month","var(--policy)"));
  statsGrid.appendChild(statBox(monthRsa+" / "+monthGpa,"RSA / GPA This Month","var(--rsa)"));
  mo.appendChild(statsGrid);

  let modalTab="attendance";
  const tabRow=h("div",{style:{display:"flex",gap:".4rem",marginBottom:"1rem",flexWrap:"wrap"}});
  const tabDefs=[["attendance","📋 Attendance ("+userAttend.filter(r=>r.type==="in").length+" days)"],["surveys","📜 Surveys ("+userSurveys.length+")"],["absences","❌ Absences ("+monthAbsences+")"]];
  const tabBody=h("div",{});
  mo.appendChild(tabRow);mo.appendChild(tabBody);

  function renderModalTab(){
    tabBody.innerHTML="";
    tabRow.querySelectorAll("button").forEach((b,i)=>{
      b.style.background=tabDefs[i][0]===modalTab?"var(--accent)":"transparent";
      b.style.color=tabDefs[i][0]===modalTab?"#fff":"var(--muted)";
      b.style.borderColor=tabDefs[i][0]===modalTab?"var(--accent)":"var(--border)";
      b.style.fontWeight=tabDefs[i][0]===modalTab?"700":"500";
    });

    if(modalTab==="attendance"){
      const byDay={};
      userAttend.forEach(r=>{
        const dk=new Date(r.timestamp).toDateString();
        if(!byDay[dk])byDay[dk]={date:new Date(r.timestamp),ins:[],outs:[]};
        if(r.type==="in")byDay[dk].ins.push(r);
        else byDay[dk].outs.push(r);
      });
      const days=Object.values(byDay).sort((a,b)=>b.date-a.date);
      if(!days.length){tabBody.appendChild(el("div","empty","No attendance records found."));return;}

      const tbl=h("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:".82rem"}});
      const thead=h("thead",{});
      thead.innerHTML="<tr><th class='attend-th'>Date</th><th class='attend-th'>Check In</th><th class='attend-th'>Check Out</th><th class='attend-th'>Arrival</th><th class='attend-th'>Departure</th></tr>";
      tbl.appendChild(thead);
      const tbody=h("tbody",{});
      days.forEach(({date,ins,outs})=>{
        const inTs=ins.length?Math.min(...ins.map(r=>r.timestamp)):null;
        const outTs=outs.length?Math.max(...outs.map(r=>r.timestamp)):null;
        const arr=getArrivalStatus(inTs);
        const dep=getDepartureStatus(outTs,inTs);
        const arrColor=arr?.type==="ontime"?"var(--gpa)":arr?.type==="halfday"?"var(--warn)":"var(--danger)";
        const depColor=dep?.type==="full"?"var(--gpa)":dep?.type==="permission"?"var(--policy)":"var(--muted)";
        const tr=h("tr",{});
        tr.innerHTML=`
          <td class='attend-td'>${date.toLocaleDateString("en-GB",{weekday:"short",day:"2-digit",month:"short"})}</td>
          <td class='attend-td' style='color:var(--accent2);font-family:var(--mono)'>${inTs?new Date(inTs).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):"—"}</td>
          <td class='attend-td' style='color:var(--danger);font-family:var(--mono)'>${outTs?new Date(outTs).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):"—"}</td>
          <td class='attend-td'><span style='color:${arrColor};font-weight:700;font-size:.78rem'>${arr?arr.label:"—"}</span></td>
          <td class='attend-td'><span style='color:${depColor};font-weight:700;font-size:.78rem'>${dep?dep.label:"—"}</span></td>`;
        tbody.appendChild(tr);
      });
      tbl.appendChild(tbody);
      const wrap=h("div",{style:{overflowX:"auto",maxHeight:"360px",overflowY:"auto",borderRadius:"10px",border:"1px solid var(--border)"}});
      wrap.appendChild(tbl);tabBody.appendChild(wrap);

    } else if(modalTab==="surveys"){
      if(!userSurveys.length){tabBody.appendChild(el("div","empty","No survey entries found."));return;}
      const tbl=h("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:".82rem"}});
      const thead=h("thead",{});
      thead.innerHTML="<tr><th class='attend-th'>Date</th><th class='attend-th'>📜 Policy</th><th class='attend-th'>🔐 RSA</th><th class='attend-th'>🎓 GPA</th></tr>";
      tbl.appendChild(thead);
      const tbody=h("tbody",{});
      userSurveys.forEach(s=>{
        const tr=h("tr",{});
        tr.innerHTML=`
          <td class='attend-td'>${s.date}</td>
          <td class='attend-td' style='color:var(--policy);font-weight:700;font-family:var(--mono)'>${parseInt(s.policy)||0}</td>
          <td class='attend-td' style='color:var(--rsa);font-weight:700;font-family:var(--mono)'>${parseInt(s.rsa)||0}</td>
          <td class='attend-td' style='color:var(--gpa);font-weight:700;font-family:var(--mono)'>${parseInt(s.gpa)||0}</td>`;
        tbody.appendChild(tr);
      });
      tbl.appendChild(tbody);
      const wrap=h("div",{style:{overflowX:"auto",maxHeight:"360px",overflowY:"auto",borderRadius:"10px",border:"1px solid var(--border)"}});
      wrap.appendChild(tbl);tabBody.appendChild(wrap);

    } else if(modalTab==="absences"){
      // FIXED: Compute absent date list from attendance — same logic as monthAbsences count
      const computedAbsentDates=(()=>{
        const today=new Date();
        const year=parseInt(curMon.split("-")[0]);
        const month=parseInt(curMon.split("-")[1])-1;
        const daysInMonth=new Date(year,month+1,0).getDate();
        const lastDay=Math.min(daysInMonth,today.getDate());
        const presentDates=new Set([
          ...userAttend.filter(r=>r.type==="in").map(r=>localDateStr(new Date(r.timestamp))),
          ...userSurveys.map(s=>s.date)
        ]);
        const dates=[];
        for(let d=1;d<=lastDay;d++){
          const dateStr=curMon+"-"+String(d).padStart(2,"0");
          const dow=new Date(year,month,d).getDay();
          if(dow===0)continue;
          if(dateStr===localDateStr(today))continue;
          if(!presentDates.has(dateStr))dates.push(dateStr);
        }
        return dates.reverse(); // most recent first
      })();
      if(!computedAbsentDates.length){tabBody.appendChild(el("div","empty","No absences recorded."));return;}
      const tbl=h("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:".82rem"}});
      const thead=h("thead",{});
      thead.innerHTML="<tr><th class='attend-th'>Date</th><th class='attend-th'>Type</th></tr>";
      tbl.appendChild(thead);
      const tbody=h("tbody",{});
      computedAbsentDates.forEach(dateStr=>{
        const tr=h("tr",{});
        tr.innerHTML=`
          <td class='attend-td'>${dateStr}</td>
          <td class='attend-td'><span style='color:var(--danger);font-weight:700;font-size:.78rem'>🔴 Absent</span></td>`;
        tbody.appendChild(tr);
      });
      tbl.appendChild(tbody);
      const wrap=h("div",{style:{overflowX:"auto",maxHeight:"360px",overflowY:"auto",borderRadius:"10px",border:"1px solid var(--border)"}});
      wrap.appendChild(tbl);tabBody.appendChild(wrap);
    }
  }

  tabDefs.forEach(([key,lbl])=>{
    const tb=h("button",{style:{padding:".4rem .85rem",borderRadius:"8px",border:"1.5px solid var(--border)",background:"transparent",color:"var(--muted)",fontFamily:"var(--font)",fontSize:".8rem",cursor:"pointer",transition:"all .15s",fontWeight:"500"}},lbl);
    tb.addEventListener("click",()=>{modalTab=key;renderModalTab();});
    tabRow.appendChild(tb);
  });
  renderModalTab();

  const syncRowEl=h("div",{style:{marginTop:"1rem",paddingTop:"1rem",borderTop:"1px solid var(--border)",display:"flex",gap:".5rem",alignItems:"center"}});
  const syncUserBtn=h("button",{className:"btn btn-ghost btn-sm"},"🔄 Sync Latest Data");
  syncUserBtn.addEventListener("click",async()=>{
    syncUserBtn.disabled=true;syncUserBtn.textContent="Syncing...";
    await loadFromSheet();
    syncUserBtn.textContent="Done!";
    const freshAttend=DB.attendance.filter(r=>r.username===u.username).sort((a,b)=>b.timestamp-a.timestamp);
    const freshSurveys=(DB.surveys||[]).filter(s=>s.username===u.username).sort((a,b)=>(b.date||"").localeCompare(a.date||""));
    ov.remove();
    openUserDataModal(u,freshAttend,freshSurveys);
  });
  syncRowEl.appendChild(syncUserBtn);
  syncRowEl.appendChild(h("span",{style:{fontSize:".75rem",color:"var(--muted)"}},"Data synced from Google Sheets"));
  mo.appendChild(syncRowEl);

  ov.appendChild(mo);
  ov.addEventListener("click",e=>{if(e.target===ov)ov.remove();});
  document.body.appendChild(ov);
}

// ── ADMIN DASH ────────────────────────────────────────────────────────────────
function renderAdmin(){
  if(!SESSION||!SESSION.username){renderLogin();return;}
  let curTab="users";
  let dlMonth="";
  const dash=el("div","dash");

  const hdr=el("div","vibe-header");
  const logoWrap=h("div",{});
  const logoText=h("div",{className:"vibe-logo-text"});
  logoText.innerHTML='<span style="color:#e63329">V</span><span style="color:#f5a623">I</span><span style="color:#2563eb">B</span><span style="color:#16a34a">E</span>';
  const tagline=el("div","vibe-tagline","Insurance Broking & Advisory Service");
  logoWrap.appendChild(logoText);logoWrap.appendChild(tagline);hdr.appendChild(logoWrap);
  const hdrR=h("div",{style:{display:"flex",alignItems:"center",gap:".5rem",flexWrap:"wrap",justifyContent:"flex-end"}});
  hdrR.appendChild(h("span",{style:{fontSize:".8rem",color:"#64748b",whiteSpace:"nowrap"}},SESSION.username));
  hdrR.appendChild(h("span",{style:{background:"#2563eb",color:"#fff",fontSize:".65rem",padding:".15rem .5rem",borderRadius:"20px",fontWeight:"700",whiteSpace:"nowrap"}},"Admin"));
  const soBtn=h("button",{style:{padding:".35rem .7rem",border:"1.5px solid #e5e7eb",borderRadius:"8px",background:"#fff",color:"#64748b",fontFamily:"var(--font)",fontSize:".75rem",cursor:"pointer",fontWeight:"600",whiteSpace:"nowrap"}},"Sign Out");
  const adminThemeBtn=h("button",{style:{padding:".35rem .6rem",border:"1.5px solid #d1d5db",borderRadius:"8px",background:"transparent",color:"inherit",fontFamily:"var(--font)",fontSize:".9rem",cursor:"pointer",whiteSpace:"nowrap",lineHeight:"1"}},document.body.classList.contains("light-mode")?"🌙":"☀️");
  adminThemeBtn.title="Toggle light/dark mode";
  adminThemeBtn.addEventListener("click",()=>{
    const isLight=document.body.classList.toggle("light-mode");
    adminThemeBtn.textContent=isLight?"🌙":"☀️";
    localStorage.setItem("vibeTheme",isLight?"light":"dark");
  });
  hdrR.appendChild(adminThemeBtn);
  if(window._adminBadgeInterval) clearInterval(window._adminBadgeInterval);
  window._adminBadgeInterval=null;
  hdrR.appendChild(soBtn);hdr.appendChild(hdrR);dash.appendChild(hdr);

  const content=el("div","content");dash.appendChild(content);

  function getAdminPollMs(){
    const t=new Date(),tot=t.getHours()*60+t.getMinutes();
    return (tot>=480 && tot<=660) ? 6000 : 15000;
  }

  let _adminSyncing=false;
  async function doAdminSync(force){
    if(_adminSyncing && !force) return;
    _adminSyncing=true;
    try{
      await loadFromSheet();
      const u2=DB.users.find(x=>x.username===SESSION?.username);
      if(u2?.fullName?.trim()) SESSION.fullName=u2.fullName.trim();
      if(SESSION) try{if(typeof window._adminRefresh==="function")window._adminRefresh();}catch(_){}
    }finally{ _adminSyncing=false; }
  }

  if(window._adminPollInterval){clearInterval(window._adminPollInterval);window._adminPollInterval=null;}
  if(window._adminPollTimeout){clearTimeout(window._adminPollTimeout);window._adminPollTimeout=null;}

  let _pollMs=getAdminPollMs();
  function startAdminPoll(){
    if(window._adminPollInterval) clearInterval(window._adminPollInterval);
    _pollMs=getAdminPollMs();
    window._adminPollInterval=setInterval(async()=>{
      if(!SESSION||SESSION.role!=="admin"){clearInterval(window._adminPollInterval);return;}
      const newMs=getAdminPollMs();
      if(newMs!==_pollMs){clearInterval(window._adminPollInterval);startAdminPoll();return;}
      await doAdminSync(false);
    }, _pollMs);
  }

  content.innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:60vh;color:var(--muted);font-family:var(--font);font-size:.95rem">⏳ Loading data from Google Sheets…</div>';
  (async()=>{ await doAdminSync(true); refresh(); startAdminPoll(); })();
  window._doAdminSync = doAdminSync;

  soBtn.addEventListener("click",()=>{
    if(window._adminPollInterval){clearInterval(window._adminPollInterval);window._adminPollInterval=null;}
    window._adminRefresh=null; window._doAdminSync=null;
    if(autoSyncInterval){clearInterval(autoSyncInterval);autoSyncInterval=null;}
    delete window._recQuick;delete window._recUser;delete window._recMonth;
    delete window._userSearch;delete window._geoWarn;
    SESSION=null;clearSession();route();
  });

  function refresh(){
    window._adminRefresh=refresh;
    content.innerHTML="";
    const regularUsers=DB.users.filter(u=>u.role!=="admin");
    let allAttend = [...DB.attendance].sort((a,b)=>b.timestamp-a.timestamp);

    const _adByUD = {};
    allAttend.forEach(r => {
      const dk = r.username+"__"+new Date(r.timestamp).toDateString();
      if(!_adByUD[dk]) _adByUD[dk] = [];
      _adByUD[dk].push(r);
    });
    const allSurveys = [...(DB.surveys||[])];
    const todayStr=localDateStr();
    function normDate(d){if(!d)return"";const s=String(d);return s.includes("T")?s.slice(0,10):s.slice(0,10);}
    const todaySurveys=allSurveys.filter(s=>normDate(s.date)===todayStr);
    const todayLocalStr = todayStr;
    const todayInUsers=[...new Set(
      allAttend
        .filter(r=>(r.type==="in"||r.type==="out") && localDateStr(new Date(r.timestamp))===todayLocalStr)
        .map(r=>r.username)
    )];
    const todayIsWeekend=new Date().getDay()===0;
    const todaySurveyUsernames=new Set(todaySurveys.map(s=>s.username));
    const todayAbsent=todayIsWeekend?[]:regularUsers.filter(u=>
      !todayInUsers.includes(u.username) &&
      !todaySurveyUsernames.has(u.username)
    );
    const curMon=localMonthStr(new Date());
    const thisMonthSurveys=allSurveys.filter(s=>(s.date||"").startsWith(curMon));
    const totalPolicy=thisMonthSurveys.reduce((s,r)=>s+(parseInt(r.policy)||0),0);
    const todayPolicy=todaySurveys.reduce((s,r)=>s+(parseInt(r.policy)||0),0);
    const todayRsa=todaySurveys.reduce((s,r)=>s+(parseInt(r.rsa)||0),0);
    const todayGpa=todaySurveys.reduce((s,r)=>s+(parseInt(r.gpa)||0),0);

    const homeGrid=h("div",{style:{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:"1rem",margin:"1.5rem 0 .8rem"},className:"home-cards"});
    function makePillList(names, bg, col, emptyMsg) {
      const LIMIT = 6;
      const wrap = h("div",{style:{marginTop:".6rem"}});
      const pillWrap = h("div",{style:{display:"flex",gap:".3rem",flexWrap:"wrap"}});
      if(!names.length){ pillWrap.appendChild(h("span",{style:{color:"#9ca3af",fontSize:".75rem"}},emptyMsg)); wrap.appendChild(pillWrap); return wrap; }
      let expanded = false;
      function renderPills(){
        pillWrap.innerHTML="";
        const visible = expanded ? names : names.slice(0,LIMIT);
        visible.forEach(n=>{ pillWrap.appendChild(h("span",{className:"name-pill",style:{background:bg,color:col}},n)); });
      }
      renderPills();
      wrap.appendChild(pillWrap);
      if(names.length > LIMIT){
        const tog = h("button",{style:{marginTop:".4rem",background:"none",border:"none",color:col,fontSize:".75rem",fontWeight:"700",cursor:"pointer",padding:"0",opacity:".8"}},`+${names.length-LIMIT} more`);
        tog.addEventListener("click",()=>{ expanded=!expanded; renderPills(); tog.textContent=expanded?`Show less`:`+${names.length-LIMIT} more`; });
        wrap.appendChild(tog);
      }
      return wrap;
    }

    const c1=el("div","home-card");
    c1.innerHTML=`<div class="big-num" style="color:#16a34a">${todayInUsers.length}</div><div class="card-label">Today Present</div>`;
    const presentNames=todayInUsers.map(uname=>{ const u=regularUsers.find(x=>x.username===uname); return (u&&u.fullName&&u.fullName.trim())?u.fullName.trim():(uname.charAt(0).toUpperCase()+uname.slice(1).toLowerCase()); });
    if(todayInUsers.length===0){
      c1.appendChild(h("div",{style:{color:"#9ca3af",fontSize:".75rem",marginTop:".4rem"}},"No check-ins yet"));
    } else {
      const presTblWrap=h("div",{style:{borderRadius:"10px",overflow:"hidden",border:"1px solid #bbf7d0",display:"none",marginTop:".4rem"}});

// ── PERMANENT FIX: ServiceWorker — unregister broken SW, probe before registering ──
// Fixes: "ServiceWorker script evaluation failed" + "GS GET AbortError"
// Root cause: a broken/stale sw.js intercepts and aborts fetch() calls to Google Sheets.
// Solution: unregister ALL existing SWs on every page load, then re-register only if sw.js
// is actually reachable and valid. This self-heals on every page load without manual action.
if('serviceWorker' in navigator){
  const host = window.location.hostname;
  const isRealHost = window.location.protocol === 'https:'
    && host !== 'www.claudeusercontent.com'
    && host !== ''
    && host !== 'localhost';

  // Step 1: Unregister ALL existing ServiceWorkers immediately (before anything else).
  // This clears any broken SW that could be intercepting fetch() calls.
  navigator.serviceWorker.getRegistrations().then(regs=>{
    regs.forEach(reg=>reg.unregister().catch(()=>{}));
  }).catch(()=>{});

  if(isRealHost){
    // Step 2: After unregistrations settle, probe sw.js before re-registering.
    // If sw.js is missing or returns an error, skip registration entirely —
    // avoids the "script evaluation failed" error that caused the original bug.
    window.addEventListener('load', async ()=>{
      let swOk = false;
      try {
        const probe = await fetch('./sw.js', { method:'HEAD', cache:'no-store' });
        swOk = probe.ok;
      } catch(_){ swOk = false; }

      if(!swOk){
        console.warn('VIBE: sw.js not reachable — skipping ServiceWorker registration. Google Sheets fetch will work normally.');
        return;
      }

      navigator.serviceWorker.register('./sw.js')
        .then(reg=>{
          console.log('✅ VIBE SW registered');
          reg.update();
          const hadControllerOnLoad = !!navigator.serviceWorker.controller;
          reg.addEventListener('updatefound',()=>{
            const newSW=reg.installing;
            if(!newSW) return;
            newSW.addEventListener('statechange',()=>{
              if(newSW.state==='installed'&&navigator.serviceWorker.controller){
                const toast=document.createElement('div');
                toast.style.cssText='position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#4f8ef7;color:#fff;padding:.75rem 1.4rem;border-radius:12px;font-weight:700;font-size:.9rem;z-index:9999;box-shadow:0 4px 20px #00000044;display:flex;align-items:center;gap:.6rem;font-family:Sora,sans-serif;cursor:pointer';
                toast.innerHTML='🔄 Update ready — tap to refresh';
                toast.addEventListener('click',()=>{ newSW.postMessage({type:'SKIP_WAITING'}); });
                document.body.appendChild(toast);
                setTimeout(()=>toast.remove(),8000);
              }
            });
          });
          let refreshing=false;
          navigator.serviceWorker.addEventListener('controllerchange',()=>{
            if(!refreshing&&hadControllerOnLoad){ refreshing=true; window.location.reload(); }
          });
        })
        .catch(e=>console.warn('VIBE: SW registration failed:',e));
    });
  }
}
