<div id="app"></div>

<script>
const KEY = "vibeAttendanceData";
let SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwvX9h3XDveEw0zpwDvhru7j8dlaQx5VGAGOayx1tnn7GuohDq-H7UTZdBLx9o9N3Yh/exec";
localStorage.setItem("vibeScriptUrl", SCRIPT_URL);

async function gsFetch(params) {
  if (!SCRIPT_URL) return null;
  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 8000); // 8s timeout
    const res = await fetch(SCRIPT_URL + "?" + new URLSearchParams(params), { method: "GET", redirect: "follow", signal: controller.signal });
    clearTimeout(timer);
    return JSON.parse(await res.text());
  } catch(e) { console.error("GS GET error", e); return null; }
}

// ── RETRY QUEUE — never lose a check-in even if network fails ─────────────────
const QUEUE_KEY = "vibePostQueue";
function loadQueue(){ try{ return JSON.parse(localStorage.getItem(QUEUE_KEY)||"[]"); }catch{ return []; } }
function saveQueue(q){ try{ localStorage.setItem(QUEUE_KEY, JSON.stringify(q)); }catch(e){} }

let _queueRunning = false;
async function flushQueue(){
  if(_queueRunning || !SCRIPT_URL) return;
  _queueRunning = true;
  let q = loadQueue();
  let failCount = 0;
  while(q.length > 0 && failCount < 3){
    const item = q[0];
    try{
      const _ctrl = new AbortController();
      const _timer = setTimeout(() => _ctrl.abort(), 8000);
      const res = await fetch(SCRIPT_URL, { method:"POST", redirect:"follow", headers:{"Content-Type":"text/plain"}, body: JSON.stringify(item), signal: _ctrl.signal });
      clearTimeout(_timer);
      const text = await res.text();
      // Only remove from queue if server confirmed success
      let parsed = null;
      try { parsed = JSON.parse(text); } catch(e){}
      if(res.ok || (parsed && parsed.ok !== false)){
        q.shift();
        saveQueue(q);
        failCount = 0;
      } else {
        failCount++;
        if(failCount >= 3) break; // give up after 3 consecutive failures
        await new Promise(r=>setTimeout(r,1000)); // wait 1s before retry
      }
    } catch(e){
      failCount++;
      if(failCount >= 3) break;
      await new Promise(r=>setTimeout(r,1000));
    }
  }
  _queueRunning = false;
}

async function gsPost(body) {
  if (!SCRIPT_URL) return null;
  // Add to queue first — guarantees no data loss
  const q = loadQueue();
  q.push(body); // don't add extra fields that may confuse Apps Script
  saveQueue(q);
  flushQueue(); // try immediately, non-blocking
  return { ok: true };
}

// Flush queue on visibility change (when user reopens tab/phone)
document.addEventListener("visibilitychange", () => { if(!document.hidden) flushQueue(); });
// Flush queue periodically
setInterval(flushQueue, 30000);

// ── DEBOUNCE — prevent double check-in on rapid taps ─────────────────────────
let _lastCheckIn = 0;
function canCheckIn(){ const now = Date.now(); if(now - _lastCheckIn < 5000) return false; _lastCheckIn = now; return true; }

function markAbsences() {
  const today = new Date();
  const todayStr = localDateStr(today);
  const day = today.getDay();
  if (day === 0) return; // Skip Sunday only (Saturday is a working day)

  // Only mark absent AFTER work start time (9:00 AM)
  const nowMin = today.getHours() * 60 + today.getMinutes();
  const startMin = WORK_START_H * 60 + WORK_START_M; // 9:00 AM
  if (nowMin < startMin) return;

  if (!DB.absences) DB.absences = [];
  const regularUsers = DB.users.filter(u => u.role !== "admin");
  const checkedInToday = new Set(
    DB.attendance
      .filter(r => r.type === "in" && localDateStr(new Date(r.timestamp)) === todayStr)
      .map(r => r.username)
  );
  regularUsers.forEach(u => {
    if (checkedInToday.has(u.username)) {
      const hadAbsence = DB.absences.find(a => a.username === u.username && a.date === todayStr);
      if (hadAbsence) {
        DB.absences = DB.absences.filter(a => !(a.username === u.username && a.date === todayStr));
        // Tell sheet to remove this absence now that user has checked in
        gsPost({ action: "removeAbsence", data: { username: u.username, date: todayStr } });
      }
    } else {
      if (!DB.absences.find(a => a.username === u.username && a.date === todayStr)) {
        const newAbs = { id: Date.now() + Math.random(), username: u.username, date: todayStr, auto: true };
        DB.absences.push(newAbs);
        gsPost({ action: "addAbsence", data: newAbs });
      }
    }
  });
  save(DB);
}

setInterval(markAbsences, 60000);

let autoSyncInterval = null;
function startAutoSync() {
  if (autoSyncInterval) clearInterval(autoSyncInterval);
  autoSyncInterval = setInterval(async () => {
    if (SESSION && SCRIPT_URL && !document.hidden) { // skip if tab is hidden
      await flushQueue(); // push pending records before pulling
      await loadFromSheet();
      if(!SESSION)return; // signed out during async load
      if (typeof window._adminRefresh === "function") window._adminRefresh();
      else if (typeof window._userRefresh === "function") window._userRefresh();
      else if (SESSION.role === "admin") renderAdmin();
      else renderUser();
    }
  }, 5 * 60 * 1000);
}

async function syncToSheet() {
  if (!SCRIPT_URL) return;
  // Send directly (not via queue) to avoid ordering issues with queued attendance records
  const payload = { action:"fullSync", data: { users: DB.users, surveys: DB.surveys, attendance: DB.attendance, absences: DB.absences, officeLocations: DB.officeLocations } };
  try {
    const _sc = new AbortController();
    const _st = setTimeout(() => _sc.abort(), 8000);
    const res = await fetch(SCRIPT_URL, { method:"POST", redirect:"follow", headers:{"Content-Type":"text/plain"}, body: JSON.stringify(payload), signal: _sc.signal });
    clearTimeout(_st);
    const text = await res.text();
    try { return JSON.parse(text); } catch { return { ok: true }; }
  } catch(e) {
    // On failure, fall back to queue
    console.warn("syncToSheet direct failed, queuing:", e);
    return await gsPost(payload);
  }
}

async function loadFromSheet() {
  if (!SCRIPT_URL) return false;
  try {
    const result = await gsFetch({ action:"getAll" });
    if (!result || !result.ok) return false;

    const sheetUsers = (result.users||[]).map(u => ({
      username: String(u.username||"").trim(),
      password: String(u.password||"").trim(),
      fullName: (u.fullName||u.full_name||u.FullName||u.name||"").trim(),
      userId: (u.userId||u.user_id||u.UserId||u.username||"").trim(),
      designation: u.designation||"",
      location: u.location||"",
      role: u.role||"user",
      geoLat: u.geoLat||"",
      geoLng: u.geoLng||"",
      geoRadius: parseInt(u.geoRadius)||200,
      officeName: u.officeName||""
    })).filter(u => u.username);

    if (sheetUsers.length) {
      const localAdmins = DB.users.filter(u => u.role === "admin" && !sheetUsers.find(s => s.username === u.username));
      const merged = sheetUsers.map(su => {
        const local = DB.users.find(x => x.username === su.username);
        return {
          ...su,
          geoLat: su.geoLat || local?.geoLat || "",
          geoLng: su.geoLng || local?.geoLng || "",
          geoRadius: su.geoRadius || local?.geoRadius || 200,
          officeName: su.officeName || local?.officeName || ""
        };
      });
      DB.users = [...merged, ...localAdmins];
    }

    // Update SESSION fields if user data changed on sheet
    if (SESSION) {
      const sessionUser = DB.users.find(u => u.username === SESSION.username);
      if (sessionUser) {
        if (sessionUser.fullName && sessionUser.fullName.trim()) SESSION.fullName = sessionUser.fullName.trim();
      }
    }

    const sheetAttend = (result.attendance||[]).map(r => {
      const lat = parseFloat(r.lat), lng = parseFloat(r.lng);
      const outLat = parseFloat(r.outLat), outLng = parseFloat(r.outLng);
      const validLoc = (r.lat && r.lng && lat >= -90 && lat <= 90 && lng >= -180 && lng <= 180) ? {lat, lng, workLocation: r.workLocation||""} : null;
      const validOutLoc = (r.outLat && r.outLng && outLat >= -90 && outLat <= 90 && outLng >= -180 && outLng <= 180) ? {lat: outLat, lng: outLng} : null;
      const rType = (r.type||"").toString().trim().toLowerCase();
      const inferredType = rType || (r.lat ? "in" : "out");
      // Parse geoOk correctly — sheet stores it as string "true"/"false"
      const geoOk = r.geoOk === true || r.geoOk === "true" || r.geoOk === 1 || r.geoOk === "1";
      return {
        id: r.id,
        username: r.username,
        type: inferredType,
        timestamp: parseInt(r.timestamp)||0,
        location: validLoc,
        outLocation: validOutLoc,
        outTimestamp: parseInt(r.outTimestamp)||0,
        geoOk,
        geoName: r.geoName||"",
        geoDist: r.geoDist!=null ? parseInt(r.geoDist)||0 : null
      };
    }).filter(r => r.username && r.timestamp);

    // Merge sheet attendance with local records
    const _queue = loadQueue();
    // All IDs currently in the retry queue (pending upload)
    const queuedIds = new Set(_queue
      .filter(item => (item.action === "addAttendance" || item.action === "addSurvey") && item.data?.id)
      .map(item => String(item.data.id)));
    const todayDateStr = new Date().toDateString();

    // Build a map of ALL local attendance by ID for fast lookup
    const localById = {};
    DB.attendance.forEach(r => {
      const key = r.id ? String(r.id) : (r.username + r.timestamp);
      localById[key] = r;
    });

    // Start with sheet data as base
    const allAttendById = {};
    sheetAttend.forEach(r => {
      const key = r.id ? String(r.id) : (r.username + r.timestamp);
      // Only use sheet record if local doesn't have a newer version
      const local = localById[key];
      if(local && local.timestamp >= r.timestamp){
        allAttendById[key] = local; // local is same age or newer — keep local
      } else {
        allAttendById[key] = r;
      }
    });

    // Add ALL local records not on sheet at all (new records pending upload)
    DB.attendance.forEach(r => {
      const key = r.id ? String(r.id) : (r.username + r.timestamp);
      if(!allAttendById[key]) allAttendById[key] = r;
    });

    // Also pull directly from queue in case DB was cleared/reloaded
    _queue.filter(item => item.action === "addAttendance" && item.data?.username && item.data?.timestamp)
      .forEach(item => {
        const r = item.data;
        const key = r.id ? String(r.id) : (r.username + r.timestamp);
        const existing = allAttendById[key];
        if(!existing || r.timestamp >= (existing.timestamp||0)){
          allAttendById[key] = {...r, type: r.type||(r.lat?"in":"out")};
        }
      });

    let mergedAttend = Object.values(allAttendById);

    // ── DEDUPLICATE: remove ghost check-ins that appear after a checkout ──
    // Rule: only drop check-in records that appear AFTER a checkout (ghost records from sheet echo)
    // NEVER drop checkout records themselves
    const byUserDay = {};
    mergedAttend.forEach(r => {
      const key = r.username + "__" + new Date(r.timestamp).toDateString();
      if(!byUserDay[key]) byUserDay[key] = [];
      byUserDay[key].push(r);
    });
    const cleanedAttend = [];
    Object.values(byUserDay).forEach(recs => {
      const outs = recs.filter(r => r.type === "out");
      // Always keep all checkout records
      outs.forEach(r => cleanedAttend.push(r));
      const ins = recs.filter(r => r.type === "in");
      if(!outs.length){ ins.forEach(r => cleanedAttend.push(r)); return; }
      const lastOutTs = Math.max(...outs.map(r => r.timestamp));
      ins.forEach(r => {
        // Keep check-in if it came BEFORE the last checkout (original check-in)
        if(r.timestamp <= lastOutTs){
          cleanedAttend.push(r);
        } else if(r.timestamp - lastOutTs > 30*60*1000){
          cleanedAttend.push(r); // legitimate re-checkin 30+ min later
        }
        // else: ghost check-in within 30 min after checkout — drop it
      });
    });
    DB.attendance = cleanedAttend;

    const sheetSurveys = (result.surveys||[]).map(s => {
      const ts = parseInt(s.timestamp)||0;
      let d = ts ? localDateStr(new Date(ts)) : (s.date || "").slice(0,10);
      return { id: s.id, username: s.username, date: d, timestamp: ts, policy: s.policy||0, rsa: s.rsa||0, gpa: s.gpa||0 };
    }).filter(s => s.username);

    const surveyMap = {};
    sheetSurveys.forEach(s => {
      const key = s.username + "__" + s.date;
      const existing = surveyMap[key];
      if (!existing) { surveyMap[key] = s; }
      else {
        const existTotal = (parseInt(existing.policy)||0) + (parseInt(existing.rsa)||0) + (parseInt(existing.gpa)||0);
        const newTotal = (parseInt(s.policy)||0) + (parseInt(s.rsa)||0) + (parseInt(s.gpa)||0);
        if (newTotal > existTotal || (newTotal === existTotal && s.timestamp > existing.timestamp)) surveyMap[key] = s;
      }
    });
    // Also preserve local today's surveys not yet on sheet
    const localTodaySurveys = SESSION
      ? (DB.surveys||[]).filter(s => s.username === SESSION.username && s.date === localDateStr(new Date()))
      : [];
    localTodaySurveys.forEach(s => {
      const key = s.username + "__" + s.date;
      const existing = surveyMap[key];
      // Prefer local if it's more recent or has more data than sheet version
      if(!existing) { surveyMap[key] = s; return; }
      const localTotal = (parseInt(s.policy)||0)+(parseInt(s.rsa)||0)+(parseInt(s.gpa)||0);
      const existTotal = (parseInt(existing.policy)||0)+(parseInt(existing.rsa)||0)+(parseInt(existing.gpa)||0);
      if(s.timestamp > existing.timestamp || localTotal > existTotal) surveyMap[key] = s;
    });
    DB.surveys = Object.values(surveyMap);
    save(DB);

    // Load absences from sheet — merge with local so no device loses absence data
    // Always sync absences from sheet — sheet is source of truth for absences
    // Local absences are only kept if not yet confirmed on sheet
    const sheetAbsences = (result.absences||[]).map(a => ({
      id: a.id, username: String(a.username||"").trim(), date: String(a.date||"").slice(0,10), auto: a.auto||false
    })).filter(a => a.username && a.date);
    const absMap = {};
    // Sheet data first
    sheetAbsences.forEach(a => { absMap[a.username+"__"+a.date] = a; });
    // Add any local absences not yet on sheet (queued addAbsence items)
    const queuedAbsKeys = new Set(_queue
      .filter(item => item.action === "addAbsence" && item.data)
      .map(item => String(item.data.username||"")+"__"+String(item.data.date||"")));
    (DB.absences||[]).forEach(a => {
      const k = a.username+"__"+a.date;
      if(queuedAbsKeys.has(k) && !absMap[k]) absMap[k] = a; // only keep if queued and not yet on sheet
    });
    // Remove absences that were queued for removal
    const removedAbsKeys = new Set(_queue
      .filter(item => item.action === "removeAbsence" && item.data)
      .map(item => String(item.data.username||"")+"__"+String(item.data.date||"")));
    removedAbsKeys.forEach(k => delete absMap[k]);
    DB.absences = Object.values(absMap);

    // Clean up orphan records for deleted users
    const activeUsernames = new Set(DB.users.map(u => u.username));
    DB.absences = (DB.absences||[]).filter(a => activeUsernames.has(a.username));
    DB.surveys = (DB.surveys||[]).filter(s => activeUsernames.has(s.username));
    save(DB);
    return true;
  } catch(e) { console.error("loadFromSheet error:", e); return false; }
}

function def(){return{users:[{username:"admin",password:"admin123",role:"admin"}],attendance:[],surveys:[],absences:[],officeLocations:[]}}

function loadData(){
  try{
    const r=localStorage.getItem(KEY);
    if(!r) return def();
    const d=JSON.parse(r);
    if(!d.users) d.users=[];
    if(!d.attendance) d.attendance=[];
    if(!d.surveys) d.surveys=[];
    if(!d.absences) d.absences=[];
    if(!d.officeLocations) d.officeLocations=[];
    return d;
  }catch{return def();}
}
const LS_LIMIT = 5 * 1024 * 1024; // 5MB
function getStorageUsage(){
  try{ return JSON.stringify(DB).length; } catch(e){ return 0; }
}
function storagePercent(){ return Math.round(getStorageUsage()/LS_LIMIT*100); }

function archiveOldData(d, months=6){
  // Keep only last N months of attendance + surveys + absences
  // Users and officeLocations are always kept
  const cutoff = Date.now() - (months * 30 * 24 * 60 * 60 * 1000);
  const cutoffDate = new Date(cutoff);
  const cutoffStr = `${cutoffDate.getFullYear()}-${String(cutoffDate.getMonth()+1).padStart(2,"0")}`;
  d.attendance = d.attendance.filter(r => r.timestamp > cutoff);
  d.surveys = (d.surveys||[]).filter(s => (s.date||"") >= cutoffStr);
  d.absences = (d.absences||[]).filter(a => (a.date||"") >= cutoffStr);
  return d;
}

function save(d){
  try{
    let str = JSON.stringify(d);
    const pct = str.length / LS_LIMIT * 100;
    // Auto-archive when above 75% — keeps last 6 months
    if(pct > 75){
      d = archiveOldData(d, 6);
      str = JSON.stringify(d);
    }
    // Emergency archive when above 90% — keeps last 3 months
    if(str.length / LS_LIMIT * 100 > 90){
      d = archiveOldData(d, 3);
      str = JSON.stringify(d);
    }
    localStorage.setItem(KEY, str);
  } catch(e){
    if(e.name === "QuotaExceededError"){
      // Last resort — keep only 1 month
      d = archiveOldData(d, 1);
      try{ localStorage.setItem(KEY, JSON.stringify(d)); } catch(e2){ console.error("Storage critically full", e2); }
    }
  }
}
function localDateStr(date){const d=date||new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}

// ── GEOFENCE HELPERS ──────────────────────────────────────────────────────────
function haversineDistance(lat1,lng1,lat2,lng2){
  const R=6371000,toRad=x=>x*Math.PI/180;
  const dLat=toRad(lat2-lat1),dLng=toRad(lng2-lng1);
  const a=Math.sin(dLat/2)**2+Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function checkGeofence(userLat,userLng){
  const locs=(DB.officeLocations||[]);
  if(!locs.length)return{ok:true,name:"No office location set",dist:null};
  let best=null,bestDist=Infinity;
  locs.forEach(loc=>{
    const d=haversineDistance(userLat,userLng,loc.lat,loc.lng);
    if(d<bestDist){bestDist=d;best=loc;}
  });
  const radius=best.radius||100;
  return{ok:bestDist<=radius,name:best.name,dist:Math.round(bestDist),radius};
}
function checkUserGeofence(userLat,userLng,username){
  const u=DB.users.find(x=>x.username===username);
  const desig=(u?.designation||"").trim().toLowerCase();
  const isFreeRoam=desig==="team leader"||desig==="trainee";

  if(isFreeRoam){
    // Auto-detect nearest office — no restriction
    const geo=checkGeofence(userLat,userLng);
    return{...geo, freeRoam:true};
  }

  // Regular user — must check in from their assigned location
  if(u&&u.geoLat&&u.geoLng){
    const d=haversineDistance(userLat,userLng,parseFloat(u.geoLat),parseFloat(u.geoLng));
    const radius=parseInt(u.geoRadius)||200;
    const name=u.officeName||u.location||"Assigned Location";
    return{ok:d<=radius,name,dist:Math.round(d),radius,personal:true};
  }

  // No location assigned — fall back to nearest office
  return checkGeofence(userLat,userLng);
}

// ── WORK TIMING HELPERS ───────────────────────────────────────────────────────
const WORK_START_H=9,WORK_START_M=0;   // 9:00 AM
const WORK_END_H=19,WORK_END_M=0;      // 7:00 PM
const HALF_DAY_LATE_MIN=4*60;          // 4 hours late = half day

function getArrivalStatus(tsMs){
  if(!tsMs)return null;
  const d=new Date(tsMs);
  const inMin=d.getHours()*60+d.getMinutes();
  const startMin=WORK_START_H*60+WORK_START_M;
  const lateMin=inMin-startMin;
  if(lateMin<=0)return{type:"ontime",label:"On Time"};
  if(lateMin>=HALF_DAY_LATE_MIN)return{type:"halfday",label:"Half Day"};
  const h=Math.floor(lateMin/60),m=lateMin%60;
  return{type:"late",label:h>0?(m>0?`${h}h ${m}m Late`:`${h}h Late`):`${m}m Late`};
}
function getDepartureStatus(tsMs, checkInTs){
  if(!tsMs)return null;
  const d=new Date(tsMs);
  const outMin=d.getHours()*60+d.getMinutes();
  const endMin=WORK_END_H*60+WORK_END_M;
  // If check-in time is provided, also verify they worked enough hours
  if(checkInTs){
    const workedMs=tsMs-checkInTs;
    const workedHours=workedMs/(1000*60*60);
    const fullDayHours=WORK_END_H-WORK_START_H; // 7PM-9AM = 10 hours, but we use 4h min
    if(outMin<endMin||workedHours<4) return{type:"permission",label:"Permission"};
  } else {
    if(outMin<endMin)return{type:"permission",label:"Permission"};
  }
  return{type:"full",label:"Full Day"};
}
function localMonthStr(date){const d=date||new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`}

let DB = loadData();
let SESSION = null;

function getLocation(){
  return new Promise((res,rej)=>{
    if(!navigator.geolocation){rej("Geolocation not supported.");return}
    navigator.geolocation.getCurrentPosition(
      p=>{const lat=p.coords.latitude,lng=p.coords.longitude;if(lat<-90||lat>90||lng<-180||lng>180){rej("Invalid location received.");return}res({lat,lng});},
      e=>{if(e.code===1)rej("Location denied. Please allow location.");else if(e.code===2)rej("Location unavailable.");else rej("Location timed out.");},
      {timeout:30000,enableHighAccuracy:true}
    );
  });
}
function exportCSV(rows,filename){
  if(!rows||!rows.length){
    const t=h("div",{style:{position:"fixed",bottom:"1.5rem",left:"50%",transform:"translateX(-50%)",background:"#ff5f6d",color:"#fff",padding:".65rem 1.4rem",borderRadius:"10px",fontWeight:"700",fontSize:".9rem",zIndex:"9999",boxShadow:"0 4px 20px #00000044"}}, "No data to export.");
    document.body.appendChild(t);setTimeout(()=>t.remove(),2500);return;
  }
  const keys=Object.keys(rows[0]);
  const body=rows.map(r=>keys.map(k=>{const v=r[k]==null?"":String(r[k]);return v.includes(",")||v.includes('"')?`"${v.replace(/"/g,'""')}"`:`${v}`}).join(",")).join("\n");
  const blob=new Blob([keys.join(",")+"\n"+body],{type:"text/csv"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=filename;a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function h(tag,attrs,children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object"){Object.assign(el.style,v)}
    else if(k.startsWith("on")&&typeof v==="function"){el.addEventListener(k.slice(2).toLowerCase(),v)}
    else if(k==="className"){el.className=v}
    else if(k==="htmlFor"){el.htmlFor=v}
    else{el.setAttribute(k,v)}
  });
  if(children){(Array.isArray(children)?children:[children]).forEach(c=>{
    if(c==null||c===false||c===undefined)return;
    el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
  })}
  return el;
}
function el(tag,cls,children,style){return h(tag,{className:cls,...(style?{style}:{})},children)}
function render(node){const app=document.getElementById("app");app.innerHTML="";app.appendChild(node)}

function route(){
  if(!SESSION){if(autoSyncInterval){clearInterval(autoSyncInterval);autoSyncInterval=null;}renderLogin();return;}
  startAutoSync();
  if(SESSION.role==="admin"){renderAdmin();return}
  renderUser();
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function renderLogin(){
  const wrap=el("div","page");
  const card=el("div","card");
  const logo=h("div",{style:{marginBottom:"1rem"}});
  logo.innerHTML=`
    <div style="font-family:'Sora',sans-serif;font-weight:900;font-size:3rem;letter-spacing:-.02em;line-height:1">
      <span style="color:#e63329">V</span><span style="color:#f5a623">I</span><span style="color:#2563eb">B</span><span style="color:#16a34a">E</span>
    </div>
    <div style="font-size:.85rem;font-weight:700;letter-spacing:.18em;color:#94a3b8;text-transform:uppercase;margin-top:.2rem;text-align:center">Attendance</div>
  `;
  const sub=el("div","subtitle","Sign in to mark your attendance");
  const errBox=el("div","alert alert-error hidden","");
  const lbU=h("label",{},"Username");
  const inU=h("input",{type:"text",placeholder:"Enter username",autocomplete:"username"});
  const lbP=h("label",{},"Password");
  const pwWrap=h("div",{style:{position:"relative",marginBottom:"1.2rem"}});
  const inP=h("input",{type:"password",placeholder:"Enter password",autocomplete:"current-password"});
  inP.style.marginBottom="0";inP.style.paddingRight="3rem";
  const eyeBtn=h("button",{type:"button",style:{position:"absolute",right:".75rem",top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:"var(--muted)",fontSize:"1.1rem",padding:"0",lineHeight:"1"}},"👁");
  let pwVisible=false;
  eyeBtn.addEventListener("click",()=>{pwVisible=!pwVisible;inP.type=pwVisible?"text":"password";eyeBtn.textContent=pwVisible?"🙈":"👁"});
  pwWrap.appendChild(inP);pwWrap.appendChild(eyeBtn);
  const locWarn=el("div","alert alert-warn hidden","📍 Please click Allow when location permission appears.");
  const btn=h("button",{className:"btn btn-primary"},"Sign In");

  function doLogin(){
    const u=inU.value.trim(),p=inP.value.trim();
    errBox.classList.add("hidden");
    if(!u||!p){errBox.textContent="Please enter username and password.";errBox.classList.remove("hidden");return}
    const localFound=DB.users.find(x=>x.username===u&&x.password===p);
    if(!localFound){
      btn.disabled=true;btn.textContent="Verifying…";
      loadFromSheet().then(()=>{
        const found2=DB.users.find(x=>x.username===u&&x.password===p);
        if(!found2){errBox.textContent="Incorrect username or password.";errBox.classList.remove("hidden");btn.disabled=false;btn.textContent="Sign In";return}
        proceedLogin(found2,u,p);
      }).catch(()=>{errBox.textContent="Incorrect username or password.";errBox.classList.remove("hidden");btn.disabled=false;btn.textContent="Sign In";});
      return;
    }
    proceedLogin(localFound,u,p);
  }

  function withLoginTimeout(promise, ms=6000){
    // Resolves when promise resolves OR after ms — never hangs
    return Promise.race([promise, new Promise(res=>setTimeout(res, ms))]);
  }

  function proceedLogin(found, u, p){
    if(found.role==="admin"){
      btn.disabled=true;btn.textContent="Syncing data…";
      withLoginTimeout(loadFromSheet()).finally(()=>{
        const u2=DB.users.find(x=>x.username===found.username)||found;
        SESSION={username:u2.username,fullName:u2.fullName&&u2.fullName.trim()?u2.fullName.trim():u2.username,role:"admin"};
        route();
      });
      return;
    }
    btn.disabled=true;btn.textContent="Syncing data…";locWarn.classList.remove("hidden");
    withLoginTimeout(loadFromSheet()).finally(()=>{
      btn.textContent="Getting location…";
      getLocation().then(loc=>{
        const u2=DB.users.find(x=>x.username===found.username)||found;
        const fn=u2.fullName&&u2.fullName.trim()?u2.fullName.trim():u2.username.charAt(0).toUpperCase()+u2.username.slice(1).toLowerCase();
        SESSION={username:u2.username,fullName:fn,role:"user",location:loc};
        // Clear any stale checkout flag from previous session
        sessionStorage.removeItem("vibeLastCheckout_"+SESSION.username);
        route();
      }).catch(msg=>{errBox.textContent=msg;errBox.classList.remove("hidden");btn.disabled=false;btn.textContent="Sign In";locWarn.classList.add("hidden");});
    });
  }
  btn.addEventListener("click",doLogin);
  [inU,inP].forEach(i=>i.addEventListener("keydown",e=>{if(e.key==="Enter")doLogin()}));
  [logo,sub,errBox,lbU,inU,lbP,pwWrap,btn,locWarn].forEach(x=>card.appendChild(x));
  wrap.appendChild(card);render(wrap);
}

// ── USER DASH ─────────────────────────────────────────────────────────────────
function renderUser(){
  const myRecs=()=>DB.attendance.filter(r=>r.username===SESSION.username).sort((a,b)=>b.timestamp-a.timestamp);
  const todayRecs=()=>{
    const s=new Date().toDateString();
    const recs=myRecs().filter(r=>new Date(r.timestamp).toDateString()===s);
    // Remove ghost check-ins: any check-in that appears AFTER the latest checkout
    const sessionCheckoutTs=parseInt(sessionStorage.getItem("vibeLastCheckout_"+SESSION.username)||"0");
    const outs=recs.filter(r=>r.type==="out");
    const lastOutTs=outs.length?Math.max(...outs.map(r=>r.timestamp)):0;
    const cutoff=Math.max(sessionCheckoutTs,lastOutTs);
    if(!cutoff)return recs;
    // Keep: all outs, and all ins that are NOT after the last checkout (i.e. valid earlier check-ins)
    // Also keep any ins that came AFTER cutoff only if they are genuinely new (future re-checkins)
    // Since this is "today" and user has checked out, drop any in record created suspiciously close after checkout
    return recs.filter(r=>{
      if(r.type==="out")return true;
      // Keep check-in if it came BEFORE the last checkout (it's the original check-in)
      if(r.timestamp<=cutoff)return true;
      // Drop ghost check-ins that appeared after checkout (from sheet sync artifacts)
      return false;
    });
  };
  const isIn=()=>{
    const t=todayRecs();
    // Check sessionStorage first — most reliable ground truth
    const sessionCheckoutTs=parseInt(sessionStorage.getItem("vibeLastCheckout_"+SESSION.username)||"0");
    if(sessionCheckoutTs){
      // User checked out this session — only IN if there's a check-in strictly AFTER that checkout
      const ins=t.filter(r=>r.type==="in"&&r.timestamp>sessionCheckoutTs);
      return ins.length>0;
    }
    if(!t.length)return false;
    const outs=t.filter(r=>r.type==="out");
    const ins=t.filter(r=>r.type==="in");
    if(!ins.length)return false;
    if(!outs.length)return true;
    const lastOutTs=Math.max(...outs.map(r=>r.timestamp));
    const lastInTs=Math.max(...ins.map(r=>r.timestamp));
    return lastInTs>lastOutTs;
  };
  const dash=el("div","dash");
  const tb=el("div","topbar");
  tb.appendChild(el("div","topbar-brand","📋 AttendanceVibe"));
  const tbR=el("div","topbar-right");
  // Show full name if available
  const meUser = DB.users.find(u => u.username === SESSION.username);
  // Show fullName if set, otherwise show username styled nicely

  tbR.appendChild(document.createTextNode(displayName+" "));
  tbR.appendChild(el("span","badge badge-green","User"));
  const soBtn=h("button",{className:"btn btn-ghost btn-sm",style:{marginLeft:".5rem"}},"Sign Out");
  soBtn.addEventListener("click",()=>{
    window._userRefresh=null;window._calMonth=null;
    // Clear all stale state so next login starts fresh
    delete window._recQuick;delete window._recUser;delete window._recMonth;
    delete window._userSearch;delete window._geoWarn;

  const refBtn=h("button",{className:"btn btn-ghost btn-sm"},"🔄 Refresh");
  refBtn.addEventListener("click",async()=>{

  themeBtn.title="Toggle light/dark mode";

    const isLight=document.body.classList.toggle("light-mode");
    themeBtn.textContent=isLight?"🌙":"☀️";

  let _checkoutInProgress=false; // survives refresh() calls within same session

  function refresh(){

    const monthSurveysU=mySurveys.filter(s=>normD(s.date).startsWith(curMKS));
    const monthPolicyU=monthSurveysU.reduce((s,r)=>s+(parseInt(r.policy)||0),0);
    const monthRsaU=monthSurveysU.reduce((s,r)=>s+(parseInt(r.rsa)||0),0);
    const monthGpaU=monthSurveysU.reduce((s,r)=>s+(parseInt(r.gpa)||0),0);
    const absentDays=(DB.absences||[]).filter(a=>{
      if(a.username!==SESSION.username||!a.date||!a.date.startsWith(curMKS))return false;

    const monthLblU=nowS.toLocaleString("default",{month:"long",year:"numeric"});

    const grid=el("div","grid2",null,{marginBottom:".8rem"});

    grid.appendChild(b1);grid.appendChild(b2);content.appendChild(grid);

    const grid2=el("div","grid3",null,{marginBottom:"1.5rem"});
    const bp=el("div","stat-box policy");bp.innerHTML=`<div class="num">${monthPolicyU}</div><div class="lbl">📜 ${monthLblU} Policy</div>`;
    const br=el("div","stat-box rsa");br.innerHTML=`<div class="num">${monthRsaU}</div><div class="lbl">🔐 ${monthLblU} RSA</div>`;
    const bg=el("div","stat-box gpa");bg.innerHTML=`<div class="num">${monthGpaU}</div><div class="lbl">🎓 ${monthLblU} GPA</div>`;
    grid2.appendChild(bp);grid2.appendChild(br);grid2.appendChild(bg);content.appendChild(grid2);

    const tabs=el("div","tabs");
    ["today","monthly","calendar"].forEach(t=>{
      const btn=h("button",{className:"tab"+(curTab===t?" active":"")},t==="today"?"📅 Today":t==="monthly"?"📊 Monthly Data":"📆 Calendar");
      btn.addEventListener("click",()=>{curTab=t;refresh()});
      tabs.appendChild(btn);
    });
    content.appendChild(tabs);

    if(curTab==="today"){
      // ── LOCATION BANNER ──
      const todayIn=todayRecs().find(r=>r.type==="in");
      const meUserForBanner=DB.users.find(u=>u.username===SESSION.username);
      const desig=(meUserForBanner?.designation||"").trim().toLowerCase();
      const assignedOfficeName=meUserForBanner?.officeName||"";
      // Only show location banner when user is currently checked IN
      if(todayIn && isIn()){
        const officeLbl=todayIn.geoName&&todayIn.geoName!=="No office location set"
          ?todayIn.geoName
          :(assignedOfficeName||meUserForBanner?.location||"");
        if(officeLbl){
          if(todayIn.geoOk){
            const banner=el("div","geo-banner geo-ok");
            const desigBadge=meUserForBanner?.designation?`<span style="font-size:.72rem;background:#4f8ef722;color:var(--accent);border:1px solid #4f8ef744;border-radius:5px;padding:.1rem .4rem;margin-left:.4rem;font-weight:700">${meUserForBanner.designation}</span>`:"";
            banner.innerHTML=`<span class="geo-icon">✅</span><div><strong>🏢 ${officeLbl}</strong>${desigBadge}<br><span style="font-size:.8rem;color:var(--muted)">Within range${todayIn.geoDist?" · "+todayIn.geoDist+"m":""}</span></div>`;
            content.appendChild(banner);
          } else {
            // Outside range — show warning only while checked in, hidden after checkout (isIn() guard above handles this)
            const banner=el("div","geo-banner geo-fail");
            const desigBadge=meUserForBanner?.designation?`<span style="font-size:.72rem;background:#4f8ef722;color:var(--accent);border:1px solid #4f8ef744;border-radius:5px;padding:.1rem .4rem;margin-left:.4rem;font-weight:700">${meUserForBanner.designation}</span>`:"";
            banner.innerHTML=`<span class="geo-icon">⚠️</span><div><strong>🏢 ${officeLbl}</strong>${desigBadge}<br><span style="font-size:.8rem;color:var(--muted)">Outside range${todayIn.geoDist?" · "+todayIn.geoDist+"m away":""}</span></div>`;
            content.appendChild(banner);

        }
      }

      const checkedIn=isIn();
      const mainBtn=h("button",{className:"btn "+(checkedIn?"btn-danger":"btn-success")},checkedIn?"⏹ Check Out":"▶ Check In");
      mainBtn.addEventListener("click",()=>{
        if(checkedIn){
          if(_checkoutInProgress||!isIn()){refresh();return;}
          _checkoutInProgress=true;
          mainBtn.disabled=true;mainBtn.textContent="Opening survey…";
          showSurvey(answers=>{
            mainBtn.textContent="Checking out…";
            getLocation().then(loc=>{
              const todayCheckins2=DB.attendance.filter(r=>r.username===SESSION.username&&r.type==="in"&&new Date(r.timestamp).toDateString()===new Date().toDateString());
              const checkInTs2=todayCheckins2.length?Math.min(...todayCheckins2.map(r=>r.timestamp)):Date.now();
              const surveyDate2=localDateStr(new Date(checkInTs2));
              const _tsNow=Date.now();
              const sur={id:_tsNow,username:SESSION.username,timestamp:_tsNow,date:surveyDate2,...answers};
              DB.surveys.push(sur);gsPost({action:"addSurvey",data:sur});save(DB);
              const meUserRec2=DB.users.find(u=>u.username===SESSION.username);
              const geo2=checkUserGeofence(loc.lat,loc.lng,SESSION.username);
              const hasPersonalGeo2=meUserRec2?.geoLat&&meUserRec2?.geoLng;
              const desig2=(meUserRec2?.designation||"").trim().toLowerCase();
              const isFreeRoam2=desig2==="team leader"||desig2==="trainee";
              const checkoutWarn=null; // no location warning on checkout
              const _tsOut=_tsNow+1;
              const rec_out={id:_tsOut,username:SESSION.username,type:"out",timestamp:_tsOut,location:loc,geoOk:geo2.ok,geoName:geo2.name||"",geoDist:geo2.dist??null};
              DB.attendance.push(rec_out);save(DB);
              gsPost({action:"addAttendance",data:{...rec_out,lat:loc?.lat||"",lng:loc?.lng||""}});
              // Store checkout timestamp in sessionStorage so isIn() can trust it over ghost sheet records
              sessionStorage.setItem("vibeLastCheckout_"+SESSION.username, String(_tsOut));
              delete window._geoWarn;
              _checkoutInProgress=false;
              refresh();
            }).catch(()=>{
              // Location failed — still save survey and check out without location
              const todayCheckins3=DB.attendance.filter(r=>r.username===SESSION.username&&r.type==="in"&&new Date(r.timestamp).toDateString()===new Date().toDateString());

              DB.surveys.push(sur2);gsPost({action:"addSurvey",data:sur2});save(DB);
              const _tsOutN=Date.now()+1;
              const rec_outn={id:_tsOutN,username:SESSION.username,type:"out",timestamp:_tsOutN,location:null};
              DB.attendance.push(rec_outn);save(DB);
              gsPost({action:"addAttendance",data:{...rec_outn,lat:"",lng:""}});

            const desig=(meUserRec?.designation||"").trim().toLowerCase();
            const isFreeRoam=desig==="team leader"||desig==="trainee";

            let geoWarning=null;
            // Only warn if geo check FAILED (outside their assigned radius)
            if(!geo.ok&&geo.name&&geo.name!=="No office location set"&&geo.dist!=null){
              geoWarning=`⚠️ You are ${geo.dist}m away from "${geo.name}". Check-in recorded.`;
            }

            const _tsIn=Date.now();
            const rec_in={id:_tsIn,username:SESSION.username,type:"in",timestamp:_tsIn,location:{...loc,workLocation:userWorkLoc},geoOk:geo.ok,geoName:geo.name,geoDist:geo.dist??null};
            DB.attendance.push(rec_in);save(DB);

          if(!todayDayMap.in||r.timestamp<todayDayMap.in){todayDayMap.in=r.timestamp;todayDayMap.inRec=r;}
        });
        // Second pass: latest checkout from DB records
        tr.filter(r=>r.type==="out").forEach(r=>{
          if(!todayDayMap.out||r.timestamp>todayDayMap.out){todayDayMap.out=r.timestamp;todayDayMap.outRec=r;todayDayMap.outLoc=r.location||null;}
        });
        // Also check sessionStorage — if user checked out this session and it's more recent, use it
        const _sessionOut=parseInt(sessionStorage.getItem("vibeLastCheckout_"+SESSION.username)||"0");
        if(_sessionOut&&_sessionOut>(todayDayMap.out||0)){
          // Find the actual record in DB for this timestamp
          const _sessionOutRec=myRecs().find(r=>r.type==="out"&&r.timestamp===_sessionOut)||myRecs().find(r=>r.type==="out"&&Math.abs(r.timestamp-_sessionOut)<2000);
          todayDayMap.out=_sessionOut;
          if(_sessionOutRec){todayDayMap.outRec=_sessionOutRec;todayDayMap.outLoc=_sessionOutRec.location||null;}
        }
        const arr=getArrivalStatus(todayDayMap.in);
        const dep=getDepartureStatus(todayDayMap.out, todayDayMap.in);
        const inRec=todayDayMap.inRec;
        const outRec=todayDayMap.outRec;
        const inLoc=inRec?.location||null;
        const outLoc=todayDayMap.outLoc||(outRec?.location)||null;

        // Rich summary card

          cell.appendChild(h("div",{style:{fontSize:".7rem",color:"var(--muted)",fontWeight:"700",textTransform:"uppercase",letterSpacing:".07em",marginBottom:".35rem"}},icon+" "+label));
          cell.appendChild(h("div",{style:{fontFamily:"var(--mono)",fontSize:"1.1rem",fontWeight:"700",color:color||"var(--text)"}},value));
          return cell;
        }
        sGrid.appendChild(summaryCell("▶","Check In", todayDayMap.in?new Date(todayDayMap.in).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):"—", "var(--accent2)", true));
        sGrid.appendChild(summaryCell("⏹","Check Out", todayDayMap.out?new Date(todayDayMap.out).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):"—", "var(--danger)", false));

        const arrVal=arr?arr.label:"—";
        const arrColor=arr?.type==="ontime"?"var(--gpa)":arr?.type==="halfday"?"var(--warn)":"var(--danger)";
        const depVal=dep?dep.label:"—";
        const depColor=dep?.type==="full"?"var(--gpa)":dep?.type==="permission"?"var(--policy)":"var(--muted)";
        sGrid.appendChild(summaryCell("⏰","Arrival", arrVal, arrColor, true));
        sGrid.appendChild(summaryCell("🚪","Departure", depVal, depColor, false));
        summaryCard.appendChild(sGrid);

        // Location row
        const locRow=h("div",{style:{padding:"1rem",borderTop:"1px solid var(--border)",display:"grid",gridTemplateColumns:"1fr 1fr",gap:"1rem"}});
        function locInfo(rec, rawLoc, label, color){
          const wrap=h("div",{});
          wrap.appendChild(h("div",{style:{fontSize:".7rem",color:"var(--muted)",fontWeight:"700",textTransform:"uppercase",letterSpacing:".07em",marginBottom:".3rem"}},"📍 "+label));

          if(lat&&lng){
            const coordStr=`${lat.toFixed(4)}, ${lng.toFixed(4)}`;
            const mapsUrl=`https://maps.google.com/?q=${lat},${lng}`;
            const officeName=rec?.geoName&&rec.geoName!=="No office location set"?rec.geoName:"";
            if(officeName) wrap.appendChild(h("div",{style:{fontSize:".8rem",fontWeight:"700",color:color,marginBottom:"2px"}},officeName));
            const link=h("a",{href:mapsUrl,target:"_blank",style:{fontSize:".75rem",fontFamily:"var(--mono)",color:"var(--muted)",textDecoration:"none"}},`📍 ${coordStr}`);
            wrap.appendChild(link);
          } else {
            wrap.appendChild(h("div",{style:{fontSize:".8rem",color:"var(--muted)"}}, "—"));
          }
          return wrap;
        }
        locRow.appendChild(locInfo(inRec, inLoc, "In Location", "var(--accent2)"));
        locRow.appendChild(locInfo(outRec, outLoc, "Out Location", "var(--danger)"));
        summaryCard.appendChild(locRow);
        content.appendChild(summaryCard);

        // Individual record timeline
        tr.forEach(r=>{
          const rc=el("div","record-card");
          const dot=el("span","status-dot "+(r.type==="in"?"dot-in":"dot-out"));
          const info=h("div",{style:{flex:1}});
          const label=h("div",{style:{fontWeight:"600",fontSize:".88rem"}},r.type==="in"?"✅ Checked In":"🔴 Checked Out");
          const locLbl=r.geoName&&r.geoName!=="No office location set"
            ?`📍 ${r.geoName}`
            :(r.location?`📍 ${r.location.lat.toFixed(4)}, ${r.location.lng.toFixed(4)}`:"No location");
          const locEl=el("div","rec-loc",locLbl);
          info.appendChild(label);info.appendChild(locEl);
          const time=el("div","rec-time",new Date(r.timestamp).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}));
          rc.appendChild(dot);rc.appendChild(info);rc.appendChild(time);content.appendChild(rc);
        });
      }
    } else if(curTab==="monthly"){
      const allM=[...new Set(myRecs().map(r=>{const d=new Date(r.timestamp);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`}))].sort().reverse();
      if(!allM.includes(curMonthKey))allM.unshift(curMonthKey);
      const bar=el("div","month-bar");
      const lbl=h("label",{},"Month:");lbl.style.margin="0";
      const sel=h("select",{});
      allM.forEach(m=>{const o=h("option",{value:m},new Date(m+"-01").toLocaleString("default",{month:"long",year:"numeric"}));if(m===selMonth)o.selected=true;sel.appendChild(o)});
      sel.addEventListener("change",()=>{selMonth=sel.value;refresh()});
      bar.appendChild(lbl);bar.appendChild(sel);content.appendChild(bar);

      const mRecs=myRecs().filter(r=>{const d=new Date(r.timestamp);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`===selMonth});
      const mSurveys=(DB.surveys||[]).filter(s=>s.username===SESSION.username&&s.date&&s.date.startsWith(selMonth));
      const g3=el("div","grid3",null,{marginBottom:"1.2rem"});
      const policySum=mSurveys.reduce((s,r)=>s+(parseInt(r.policy)||0),0);
      const rsaSum=mSurveys.reduce((s,r)=>s+(parseInt(r.rsa)||0),0);
      const gpaSum=mSurveys.reduce((s,r)=>s+(parseInt(r.gpa)||0),0);
      [["policy","📜 Policy",policySum],["rsa","🔐 RSA",rsaSum],["gpa","🎓 GPA",gpaSum]].forEach(([cls,lbl,v])=>{
        const b=el("div","stat-box "+cls);b.innerHTML=`<div class="num">${v}</div><div class="lbl">${lbl} Total</div>`;g3.appendChild(b);
      });
      content.appendChild(g3);

      const dayMap={};
      // First pass: check-ins
      mRecs.filter(r=>r.type==="in").forEach(r=>{
        const k=new Date(r.timestamp).toDateString();
        if(!dayMap[k])dayMap[k]={date:new Date(r.timestamp),in:null,out:null,loc:null,outLoc:null,inRec:null,outRec:null};
        if(!dayMap[k].in||r.timestamp<dayMap[k].in){
          dayMap[k].in=r.timestamp;dayMap[k].loc=r.location;dayMap[k].inRec=r;
          if(r.outLocation&&!dayMap[k].outLoc)dayMap[k].outLoc=r.outLocation;
          if(r.outTimestamp&&!dayMap[k].out)dayMap[k].out=r.outTimestamp;
        }
      });
      // Second pass: always apply the LATEST checkout per day
      mRecs.filter(r=>r.type==="out").forEach(r=>{
        const outDate=new Date(r.timestamp).toDateString();
        const matchKey=Object.keys(dayMap).find(k2=>new Date(dayMap[k2].date).toDateString()===outDate);
        const target=matchKey?dayMap[matchKey]:null;
        if(!target)return;
        if(!target.out||r.timestamp>target.out){target.out=r.timestamp;target.outLoc=r.location||r.outLocation||null;target.outRec=r;}
      });
      const days=Object.values(dayMap).sort((a,b)=>b.date-a.date);
      const st1=el("div","section-title",`Attendance — ${new Date(selMonth+"-01").toLocaleString("default",{month:"long",year:"numeric"})}`);
      content.appendChild(st1);
      if(!days.length){content.appendChild(el("div","empty","No attendance for this month."))}
      else{
        const tw=h("div",{style:{overflowX:"auto",background:"var(--card)",borderRadius:"12px",border:"1px solid var(--border)"}});
        const tbl=el("table","month-table");
        tbl.innerHTML=`<thead><tr><th>Date</th><th>Check In</th><th>Check Out</th><th>⏱ Hours</th><th>⏰ Arrival</th><th>🚪 Departure</th><th>📍 In Location</th><th>📍 Out Location</th></tr></thead>`;
        const tb2=document.createElement("tbody");
        days.forEach(d=>{
          const tr2=document.createElement("tr");
          const mins=d.in&&d.out?Math.round((d.out-d.in)/60000):null;
          const hrs=mins?`${Math.floor(mins/60)}h ${mins%60}m`:"—";
          const hrsVal=mins?mins/60:null;
          const hrsColor=hrsVal>=8?"var(--gpa)":hrsVal>=4?"var(--warn)":"var(--danger)";
          const hrsBg=hrsVal>=8?"#38d9a922":hrsVal>=4?"#ffd16622":"#ff5f6d22";
          const hrsBorder=hrsVal>=8?"#38d9a944":hrsVal>=4?"#ffd16644":"#ff5f6d44";
          const hrsCell=mins?`<span style="font-size:.72rem;padding:.15rem .45rem;border-radius:6px;background:${hrsBg};color:${hrsColor};border:1px solid ${hrsBorder};font-family:var(--mono);font-weight:700">${hrs}</span>`:`<span style="color:var(--muted);font-size:.75rem">—</span>`;
          const arr=getArrivalStatus(d.in);
          const dep=getDepartureStatus(d.out, d.in);
          const arrCell=arr?`<span class="timing-pill tp-${arr.type}">${arr.label}</span>`:"—";
          const depCell=dep?`<span class="timing-pill tp-${dep.type==="full"?"ontime":dep.type}">${dep.label}</span>`:"—";
          const geoRec=d.inRec||myRecs().find(r=>r.type==="in"&&r.timestamp===d.in);
          const inLoc=d.loc||(geoRec?.location)||null;
          // Build in-location cell with office badge — fallback to live check if no stored geoName
          let inGeoName=geoRec?.geoName&&geoRec.geoName!=="No office location set"?geoRec.geoName:"";
          let inGeoOk=!!geoRec?.geoOk, inGeoDist=geoRec?.geoDist??null;
          if(!inGeoName&&inLoc?.lat){
            const gLive=checkUserGeofence(inLoc.lat,inLoc.lng,SESSION.username);
            if(gLive&&gLive.name&&gLive.name!=="No office location set"){inGeoName=gLive.name;inGeoOk=!!gLive.ok;inGeoDist=gLive.dist??null;}
          }
          const inDistStr=inGeoDist!=null?` · ${inGeoDist}m`:"";
          const inGeoCell=inGeoName
            ?`<div style="display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:8px;font-size:.72rem;font-weight:700;background:${inGeoOk?"#38d9a922":"#ff5f6d22"};color:${inGeoOk?"var(--gpa)":"var(--danger)"};border:1px solid ${inGeoOk?"#38d9a955":"#ff5f6d55"};margin-bottom:2px">${inGeoOk?"✅":"❌"} ${inGeoName}${inDistStr}</div>${inLoc?.lat?`<br><a href="https://maps.google.com/?q=${inLoc.lat},${inLoc.lng}" target="_blank" style="font-size:.7rem;color:var(--muted);text-decoration:none;font-family:var(--mono)">📍 ${inLoc.lat.toFixed(4)}, ${inLoc.lng.toFixed(4)}</a>`:""}`
            :(inLoc?.lat?`<a href="https://maps.google.com/?q=${inLoc.lat},${inLoc.lng}" target="_blank" style="font-size:.75rem;color:var(--accent2);text-decoration:none;font-family:var(--mono)">📍 ${inLoc.lat.toFixed(4)}, ${inLoc.lng.toFixed(4)}</a>`:`<span style="color:var(--muted);font-size:.75rem">—</span>`);
          const outLoc=d.outLoc||(d.outRec?.location)||null;
          // Build out-location cell with office badge
          let outGeoName=d.outRec?.geoName&&d.outRec.geoName!=="No office location set"?d.outRec.geoName:"";
          let outGeoOk=!!d.outRec?.geoOk, outGeoDist=d.outRec?.geoDist??null;
          if(!outGeoName&&outLoc?.lat){
            const gLive2=checkUserGeofence(outLoc.lat,outLoc.lng,SESSION.username);
            if(gLive2&&gLive2.name&&gLive2.name!=="No office location set"){outGeoName=gLive2.name;outGeoOk=!!gLive2.ok;outGeoDist=gLive2.dist??null;}
          }
          const outDistStr=outGeoDist!=null?` · ${outGeoDist}m`:"";
          const outGeoCell=outGeoName
            ?`<div style="display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:8px;font-size:.72rem;font-weight:700;background:${outGeoOk?"#38d9a922":"#ff5f6d22"};color:${outGeoOk?"var(--gpa)":"var(--danger)"};border:1px solid ${outGeoOk?"#38d9a955":"#ff5f6d55"};margin-bottom:2px">${outGeoOk?"✅":"❌"} ${outGeoName}${outDistStr}</div>${outLoc?.lat?`<br><a href="https://maps.google.com/?q=${outLoc.lat},${outLoc.lng}" target="_blank" style="font-size:.7rem;color:var(--muted);text-decoration:none;font-family:var(--mono)">📍 ${outLoc.lat.toFixed(4)}, ${outLoc.lng.toFixed(4)}</a>`:""}`
            :(outLoc?.lat?`<a href="https://maps.google.com/?q=${outLoc.lat},${outLoc.lng}" target="_blank" style="font-size:.75rem;color:var(--danger);text-decoration:none;font-family:var(--mono)">📍 ${outLoc.lat.toFixed(4)}, ${outLoc.lng.toFixed(4)}</a>`:`<span style="color:var(--muted);font-size:.75rem">—</span>`);
          tr2.innerHTML=`<td style="font-family:var(--mono);font-size:.8rem">${d.date.toLocaleDateString("en-GB",{weekday:"short",day:"2-digit",month:"short"})}</td>
            <td style="color:var(--accent2);font-family:var(--mono);font-size:.82rem">${d.in?new Date(d.in).toLocaleTimeString([],({"hour":"2-digit","minute":"2-digit"})):"—"}</td>
            <td style="color:var(--danger);font-family:var(--mono);font-size:.82rem">${d.out?new Date(d.out).toLocaleTimeString([],({"hour":"2-digit","minute":"2-digit"})):"—"}</td>
            <td>${hrsCell}</td>
            <td>${arrCell}</td>
            <td>${depCell}</td>
            <td>${inGeoCell}</td>
            <td>${outGeoCell}</td>`;
          tb2.appendChild(tr2);
        });
        tbl.appendChild(tb2);tw.appendChild(tbl);content.appendChild(tw);
      }

      if(mSurveys.length){
        const st2=el("div","section-title","Survey Responses");content.appendChild(st2);
        const tw2=h("div",{style:{overflowX:"auto",background:"var(--card)",borderRadius:"12px",border:"1px solid var(--border)"}});
        const tbl2=el("table","month-table");
        tbl2.innerHTML=`<thead><tr><th>Date</th><th>📜 Policy</th><th>🔐 RSA</th><th>🎓 GPA</th></tr></thead>`;
        const tb3=document.createElement("tbody");
        [...mSurveys].sort((a,b)=>b.timestamp-a.timestamp).forEach(s=>{
          const tr3=document.createElement("tr");
          tr3.innerHTML=`<td style="font-family:var(--mono);font-size:.8rem">${s.date}</td>
            <td><span class="pill pill-pend">${s.policy||"—"}</span></td>
            <td><span class="pill pill-yes">${s.rsa||"—"}</span></td>
            <td><span class="pill" style="background:#34d39922;color:#34d399;border:1px solid #34d39944">${s.gpa||"—"}</span></td>`;
          tb3.appendChild(tr3);
        });
        tbl2.appendChild(tb3);tw2.appendChild(tbl2);content.appendChild(tw2);
      }
    }

    // ── CALENDAR TAB ──────────────────────────────────────────────────────────
    if(curTab==="calendar"){
      // Month navigator
      if(!window._calMonth)window._calMonth=curMKS;
      const calNav=h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"1rem"}});
      const prevBtn=h("button",{className:"btn btn-ghost btn-sm"},"◀");
      const nextBtn=h("button",{className:"btn btn-ghost btn-sm"},"▶");
      const calTitle=h("div",{style:{fontWeight:"700",fontSize:"1rem",color:"var(--text)"}},
        new Date(window._calMonth+"-01").toLocaleString("default",{month:"long",year:"numeric"}));
      prevBtn.addEventListener("click",()=>{
        const d=new Date(window._calMonth+"-01");d.setMonth(d.getMonth()-1);
        window._calMonth=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;refresh();});
      nextBtn.addEventListener("click",()=>{
        const d=new Date(window._calMonth+"-01");d.setMonth(d.getMonth()+1);
        window._calMonth=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;refresh();});
      calNav.appendChild(prevBtn);calNav.appendChild(calTitle);calNav.appendChild(nextBtn);
      content.appendChild(calNav);

      // Build attendance map for this month
      const calRecs=myRecs().filter(r=>{const d=new Date(r.timestamp);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`===window._calMonth});
      const calDayMap={};
      calRecs.forEach(r=>{
        const k=localDateStr(new Date(r.timestamp));
        if(!calDayMap[k])calDayMap[k]={in:null,out:null};
        if(r.type==="in"&&(!calDayMap[k].in||r.timestamp<calDayMap[k].in))calDayMap[k].in=r.timestamp;
        if(r.type==="out"&&(!calDayMap[k].out||r.timestamp>calDayMap[k].out))calDayMap[k].out=r.timestamp;
      });
      const calAbsent=new Set((DB.absences||[]).filter(a=>a.username===SESSION.username&&a.date&&a.date.startsWith(window._calMonth)).map(a=>a.date));

      // Calendar grid
      const calYear=parseInt(window._calMonth.split("-")[0]);
      const calMonthIdx=parseInt(window._calMonth.split("-")[1])-1;
      const firstDay=new Date(calYear,calMonthIdx,1).getDay();
      const daysInMonth=new Date(calYear,calMonthIdx+1,0).getDate();
      const todayDateStr=localDateStr(new Date());

      const calWrap=h("div",{style:{background:"var(--card)",borderRadius:"14px",border:"1px solid var(--border)",padding:"1rem"}});
      // Day headers
      const dayHeaders=h("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"2px",marginBottom:"4px"}});
      ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach(d=>{
        dayHeaders.appendChild(h("div",{style:{textAlign:"center",fontSize:".7rem",fontWeight:"700",color:"var(--muted)",padding:".3rem 0"}},d));
      });
      calWrap.appendChild(dayHeaders);

      const calGrid=h("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"3px"}});

      // Empty cells before first day
      for(let i=0;i<firstDay;i++) calGrid.appendChild(h("div",{}));

      // Day cells
      for(let day=1;day<=daysInMonth;day++){
        const dateStr=`${window._calMonth}-${String(day).padStart(2,"0")}`;
        const dayData=calDayMap[dateStr];
        const isAbsent=calAbsent.has(dateStr);
        const isToday=dateStr===todayDateStr;
        const isWeekend=new Date(calYear,calMonthIdx,day).getDay()===0;
        const isFuture=dateStr>todayDateStr;

        let bg="transparent",color="var(--text)",border="1px solid transparent",dot=null;
        if(isToday){border="2px solid var(--accent)";color="var(--accent)";}
        if(isFuture){color="var(--muted)";}
        else if(isWeekend&&!dayData){color="var(--muted)";}
        else if(dayData?.in&&dayData?.out){bg="#38d9a922";color="var(--gpa)";border="1px solid #38d9a944";}
        else if(dayData?.in&&!dayData?.out){bg="#4f8ef722";color="var(--accent)";border="1px solid #4f8ef744";}
        else if(isAbsent){bg="#ff5f6d22";color="var(--danger)";border="1px solid #ff5f6d44";}

        const cell=h("div",{style:{
          textAlign:"center",borderRadius:"8px",padding:".4rem .1rem",cursor:dayData?"pointer":"default",
          background:bg,border,color,fontSize:".85rem",fontWeight:isToday?"800":"600",
          transition:"all .15s",minHeight:"2.2rem",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"
        }},String(day));

        // Show check-in time as tiny label
        if(dayData?.in){
          const timeStr=new Date(dayData.in).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
          cell.appendChild(h("div",{style:{fontSize:".55rem",color:"var(--accent2)",fontFamily:"var(--mono)",marginTop:"1px"}},timeStr));
        }

        // Click to show detail popup
        if(dayData||isAbsent){
          cell.addEventListener("click",()=>{
            // Remove existing popup
            document.querySelectorAll(".cal-popup").forEach(p=>p.remove());
            const popup=el("div","cal-popup");
            popup.style.cssText=`position:fixed;inset:0;background:#00000088;display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem`;
            const box=h("div",{style:{background:"var(--card)",border:"1px solid var(--border)",borderRadius:"16px",padding:"1.5rem",width:"100%",maxWidth:"320px",position:"relative"}});
            const closeBtn=h("button",{className:"x-btn"},"✕");closeBtn.addEventListener("click",()=>popup.remove());
            const dateLabel=new Date(calYear,calMonthIdx,day).toLocaleDateString("en-GB",{weekday:"long",day:"2-digit",month:"long",year:"numeric"});
            box.appendChild(closeBtn);
            box.appendChild(h("div",{style:{fontSize:"1.1rem",fontWeight:"700",marginBottom:"1rem",paddingRight:"2rem"}},dateLabel));
            if(isAbsent&&!dayData?.in){
              box.appendChild(h("div",{style:{color:"var(--danger)",fontWeight:"700",fontSize:".9rem"}},"🔴 Absent"));
            } else {
              const rows=[
                ["Check In", dayData?.in?new Date(dayData.in).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):"—","var(--accent2)"],
                ["Check Out", dayData?.out?new Date(dayData.out).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):"—","var(--danger)"],
              ];
              rows.forEach(([lbl,val,col])=>{
                const row=h("div",{style:{display:"flex",justifyContent:"space-between",padding:".5rem 0",borderBottom:"1px solid var(--border)"}});
                row.appendChild(h("span",{style:{color:"var(--muted)",fontSize:".85rem"}},lbl));
                row.appendChild(h("span",{style:{color:col,fontFamily:"var(--mono)",fontWeight:"700",fontSize:".85rem"}},val));
                box.appendChild(row);
              });
              // Survey data for that day
              const survey=(DB.surveys||[]).find(s=>s.username===SESSION.username&&s.date===dateStr);
              if(survey){
                box.appendChild(h("div",{style:{marginTop:".8rem",fontSize:".78rem",fontWeight:"700",color:"var(--muted)",letterSpacing:".06em",textTransform:"uppercase"}},"Survey"));
                [["📜 Policy",survey.policy||0,"var(--policy)"],["🔐 RSA",survey.rsa||0,"var(--rsa)"],["🎓 GPA",survey.gpa||0,"var(--gpa)"]].forEach(([lbl,val,col])=>{
                  const row=h("div",{style:{display:"flex",justifyContent:"space-between",padding:".4rem 0",borderBottom:"1px solid var(--border)"}});
                  row.appendChild(h("span",{style:{color:"var(--muted)",fontSize:".85rem"}},lbl));
                  row.appendChild(h("span",{style:{color:col,fontFamily:"var(--mono)",fontWeight:"700",fontSize:".85rem"}},String(val)));
                  box.appendChild(row);
                });
              }
            }
            popup.appendChild(box);
            popup.addEventListener("click",e=>{if(e.target===popup)popup.remove();});
            document.body.appendChild(popup);
          });
          cell.addEventListener("mouseenter",()=>{if(dayData)cell.style.opacity=".8";});
          cell.addEventListener("mouseleave",()=>{cell.style.opacity="1";});
        }
        calGrid.appendChild(cell);
      }
      calWrap.appendChild(calGrid);

      // Legend
      const legend=h("div",{style:{display:"flex",gap:".75rem",flexWrap:"wrap",marginTop:"1rem",fontSize:".72rem"}});
      [["#38d9a922","#38d9a944","var(--gpa)","Full Day"],["#4f8ef722","#4f8ef744","var(--accent)","Checked In"],["#ff5f6d22","#ff5f6d44","var(--danger)","Absent"]].forEach(([bg,border,col,lbl])=>{
        const item=h("div",{style:{display:"flex",alignItems:"center",gap:".3rem"}});
        item.appendChild(h("span",{style:{width:"12px",height:"12px",borderRadius:"3px",background:bg,border:`1px solid ${border}`,display:"inline-block"}}));
        item.appendChild(h("span",{style:{color:"var(--muted)"}},lbl));
        legend.appendChild(item);
      });
      calWrap.appendChild(legend);
      content.appendChild(calWrap);
    }
  }
  refresh();render(dash);
}

// ── SURVEY EDIT MODAL ────────────────────────────────────────────────────────

  const mo=el("div","modal",null,{maxWidth:"420px"});
  const xb=h("button",{className:"x-btn"},"✕");xb.addEventListener("click",()=>ov.remove());
  mo.appendChild(xb);
  mo.appendChild(h("div",{style:{fontSize:"1.5rem",marginBottom:".4rem"}},"✏️"));
  mo.appendChild(h("h2",{},"Edit Survey Entry"));
  const sub=el("div","sub","");
  sub.innerHTML=`User: <strong>${survey.username}</strong> &nbsp;·&nbsp; Date: <strong>${survey.date}</strong>`;
  mo.appendChild(sub);
  function numField(labelTxt, cls, val) {
    const wrap=h("div",{style:{marginBottom:"1.2rem"}});
    const ql=el("div","q-label "+cls,labelTxt);
    const inp=h("input",{type:"number",min:"0",value:val});

    return {wrap,inp};
  }
  const {wrap:w1,inp:i1}=numField("📜 Policy Count","q-policy",survey.policy||0);
  const {wrap:w2,inp:i2}=numField("🔐 RSA Count","q-rsa",survey.rsa||0);
  const {wrap:w3,inp:i3}=numField("🎓 GPA Count","q-gpa",survey.gpa||0);
  const saveBtn=h("button",{className:"btn btn-primary",style:{marginTop:".5rem"}},"💾 Save Changes");
  saveBtn.addEventListener("click",()=>{
    const idx=DB.surveys.findIndex(s=>s.id===survey.id);
    if(idx>=0){DB.surveys[idx]={...DB.surveys[idx],policy:i1.value,rsa:i2.value,gpa:i3.value};save(DB);syncToSheet();}
    ov.remove();onSave();
  });
  const delBtn=h("button",{className:"btn btn-danger",style:{marginTop:".6rem"}},"🗑 Delete This Entry");
  delBtn.addEventListener("click",()=>{
    if(!confirm("Delete this survey entry?"))return;
    DB.surveys=DB.surveys.filter(s=>s.id!==survey.id);save(DB);syncToSheet();ov.remove();onSave();
  });
  const cancelBtn=h("button",{className:"btn btn-ghost",style:{marginTop:".6rem"}},"Cancel");
  cancelBtn.addEventListener("click",()=>ov.remove());
  [w1,w2,w3,saveBtn,delBtn,cancelBtn].forEach(x=>mo.appendChild(x));
  ov.appendChild(mo);document.body.appendChild(ov);
}

  function getAdminPollMs(){ const h=new Date().getHours(),m=new Date().getMinutes(),t=h*60+m; return(t>=525&&t<=570)?60000:15000; }

  function refresh(){
    window._adminRefresh=refresh;
    content.innerHTML="";
    const regularUsers=DB.users.filter(u=>u.role!=="admin");
    // Merge queued (not-yet-synced) records so admin sees them immediately
    const _adminQueue = loadQueue();

      .filter(item => item.action === "addAttendance" && item.data)
      .map(item => item.data)
      .filter(r => r.username && r.timestamp);
    const _queuedSurveys = _adminQueue
      .filter(item => item.action === "addSurvey" && item.data)
      .map(item => item.data)
      .filter(s => s.username);
    const _queuedIds = new Set(_queuedAttend.map(r => String(r.id||"")));
    const _queuedSurveyIds = new Set(_queuedSurveys.map(s => String(s.id||"")));
    const _baseAttend = DB.attendance.filter(r => !_queuedIds.has(String(r.id||"")));
    const _baseSurveys = (DB.surveys||[]).filter(s => !_queuedSurveyIds.has(String(s.id||"")));
    const allAttend = [..._baseAttend, ..._queuedAttend].sort((a,b)=>b.timestamp-a.timestamp);

// Run BEFORE markAbsences to avoid conflicting state
(function cleanEarlyAbsences(){
  const now = new Date();
  if (now.getDay() === 0) return; // Skip Sunday only (Saturday is a working day)
  const nowMin = now.getHours() * 60 + now.getMinutes();
  const startMin = WORK_START_H * 60 + WORK_START_M;
  if (nowMin < startMin) {
    const todayStr = localDateStr(now);
    // Only remove auto-marked absences, not manually-added ones
    DB.absences = (DB.absences || []).filter(a => !(a.date === todayStr && a.auto === true));
    save(DB);
  }
})();

document.getElementById("app").appendChild(loadDiv);
const timeout=setTimeout(()=>{route();},5000);
loadFromSheet().then(()=>{clearTimeout(timeout);route();}).catch(()=>{clearTimeout(timeout);route();});





if('serviceWorker' in navigator){
  const host = window.location.hostname;
  const isRealHost = host !== 'www.claudeusercontent.com' && host !== '' && host !== 'localhost' || window.location.protocol === 'https:' && host.includes('github.io');
  if(isRealHost){
    window.addEventListener('load',()=>{
      navigator.serviceWorker.register('./sw.js')
        .then(reg=>{
          console.log('✅ VIBE SW registered');
          navigator.serviceWorker.addEventListener('message',e=>{
            if(e.data?.type==='FLUSH_QUEUE') flushQueue();
          });

          // ── Force update check every time the page loads ──────────────────
          reg.update();

          // If a new SW is waiting (update already downloaded), activate it immediately
          if(reg.waiting){
            reg.waiting.postMessage({type:'SKIP_WAITING'});
          }

          // Listen for a new SW installing — when it finishes, activate + reload
          reg.addEventListener('updatefound',()=>{
            const newSW=reg.installing;
            if(!newSW) return;
            newSW.addEventListener('statechange',()=>{
              if(newSW.state==='installed'&&navigator.serviceWorker.controller){
                // New version ready — show a toast then reload
                const toast=document.createElement('div');
                toast.style.cssText='position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#4f8ef7;color:#fff;padding:.75rem 1.4rem;border-radius:12px;font-weight:700;font-size:.9rem;z-index:9999;box-shadow:0 4px 20px #00000044;display:flex;align-items:center;gap:.6rem;font-family:Sora,sans-serif';
                toast.innerHTML='🔄 New version available — updating…';
                document.body.appendChild(toast);
                newSW.postMessage({type:'SKIP_WAITING'});
                setTimeout(()=>window.location.reload(),1500);
              }
            });
          });

          // When controller changes (new SW took over), reload to get fresh assets
          let refreshing=false;
          navigator.serviceWorker.addEventListener('controllerchange',()=>{
            if(!refreshing){ refreshing=true; window.location.reload(); }
          });
        })
        .catch(e=>console.log('SW error:',e));
    });
  }
}
</script>
