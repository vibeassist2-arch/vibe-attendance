      const sel=h("select",{});
      allM.forEach(m=>{const o=h("option",{value:m},new Date(m+"-01").toLocaleString("default",{month:"long",year:"numeric"}));if(m===selMonth)o.selected=true;sel.appendChild(o)});
      sel.addEventListener("change",()=>{selMonth=sel.value;refresh()});
      bar.appendChild(lbl);bar.appendChild(sel);content.appendChild(bar);

      const mRecs=myRecs().filter(r=>{const d=new Date(r.timestamp);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`===selMonth});
      const mSurveys=(DB.surveys||[]).filter(s=>s.username===SESSION.username&&s.date&&s.date.startsWith(selMonth));
      const g3=el("div","grid3",null,{marginBottom:"1.2rem"});
      const policySum=mSurveys.reduce((s,r)=>s+(parseInt(r.policy)||0),0);
      const rsaSum=mSurveys.reduce((s,r)=>s+(parseInt(r.rsa)||0),0);
      const gpaSum=mSurveys.reduce((s,r)=>s+(parseInt(r.gpa)||0),0);
      [["policy","📜 Policy",policySum],["rsa","🔐 RSA",rsaSum],["gpa","🎓 GPA",gpaSum]].forEach(([cls,lbl,v])=>{
        const b=el("div","stat-box "+cls);b.innerHTML=`<div class="num">${v}</div><div class="lbl">${lbl} Total</div>`;g3.appendChild(b);
      });
      content.appendChild(g3);

      const dayMap={};
      // First pass: check-ins
      mRecs.filter(r=>r.type==="in").forEach(r=>{
        const k=new Date(r.timestamp).toDateString();
        if(!dayMap[k])dayMap[k]={date:new Date(r.timestamp),in:null,out:null,loc:null,outLoc:null,inRec:null,outRec:null};
        if(!dayMap[k].in||r.timestamp<dayMap[k].in){
          dayMap[k].in=r.timestamp;dayMap[k].loc=r.location;dayMap[k].inRec=r;
          // FIX: build proper outRec stub with coordinates so Out Location renders
          if(r.outLocation&&!dayMap[k].outLoc){
            dayMap[k].outLoc=r.outLocation;
            if(!dayMap[k].outRec)dayMap[k].outRec={location:r.outLocation,geoName:r.geoName||"",geoOk:r.geoOk||false,geoDist:r.geoDist??null};
          }
          if(r.outTimestamp&&!dayMap[k].out)dayMap[k].out=r.outTimestamp;
        }
      });
      // Second pass: always apply the LATEST checkout per day
      // FIX: match by toDateString() of checkout directly (same key format) — avoids false mismatches
      mRecs.filter(r=>r.type==="out").forEach(r=>{
        const outKey=new Date(r.timestamp).toDateString();
        const target=dayMap[outKey]||null;
        if(!target)return;
        if(!target.out||r.timestamp>target.out){target.out=r.timestamp;target.outLoc=r.location||r.outLocation||null;target.outRec=r;}
      });
      const days=Object.values(dayMap).sort((a,b)=>b.date-a.date);
      const st1=el("div","section-title",`Attendance — ${new Date(selMonth+"-01").toLocaleString("default",{month:"long",year:"numeric"})}`);
      content.appendChild(st1);
      if(!days.length){content.appendChild(el("div","empty","No attendance for this month."))}
      else{
        const tw=h("div",{style:{overflowX:"auto",background:"var(--card)",borderRadius:"12px",border:"1px solid var(--border)"}});
        const tbl=el("table","month-table");
        tbl.innerHTML=`<thead><tr><th>Date</th><th>Check In</th><th>Check Out</th><th>⏰ Arrival</th><th>🚪 Departure</th><th>📍 In Location</th><th>📍 Out Location</th></tr></thead>`;
        const tb2=document.createElement("tbody");
        days.forEach(d=>{
          const tr2=document.createElement("tr");
          const mins=d.in&&d.out?Math.round((d.out-d.in)/60000):null;
          const hrs=mins?`${Math.floor(mins/60)}h ${mins%60}m`:"—";
          const hrsVal=mins?mins/60:null;
          const hrsColor=!mins?"var(--muted)":hrsVal>=8?"var(--gpa)":hrsVal>=4?"var(--warn)":"var(--danger)";
          const hrsBg=!mins?"transparent":hrsVal>=8?"#38d9a922":hrsVal>=4?"#ffd16622":"#ff5f6d22";
          const hrsBorder=!mins?"transparent":hrsVal>=8?"#38d9a944":hrsVal>=4?"#ffd16644":"#ff5f6d44";
          const hrsCell=mins?`<span style="font-size:.72rem;padding:.15rem .45rem;border-radius:6px;background:${hrsBg};color:${hrsColor};border:1px solid ${hrsBorder};font-family:var(--mono);font-weight:700">${hrs}</span>`:`<span style="color:var(--muted);font-size:.75rem">—</span>`;
          const arr=getArrivalStatus(d.in);
          const dep=getDepartureStatus(d.out, d.in);
          const arrCell=arr?`<span class="timing-pill tp-${arr.type}">${arr.label}</span>`:"—";
          const depCell=dep?`<span class="timing-pill tp-${dep.type==="full"?"ontime":dep.type}">${dep.label}</span>`:"—";
          const geoRec=d.inRec||myRecs().find(r=>r.type==="in"&&r.timestamp===d.in);
          const inLoc=d.loc||(geoRec?.location)||null;
          // Only show office name if GPS coordinates exist
          let inGeoName=inLoc?.lat&&geoRec?.geoName&&geoRec.geoName!=="No office location set"&&geoRec.geoName!==""?geoRec.geoName:"";
          let inGeoOk=!!geoRec?.geoOk, inGeoDist=geoRec?.geoDist??null;
          const inDistStr=inGeoDist!=null?` · ${inGeoDist}m`:"";
          const inGeoCell=inLoc?.lat
            ?`<a href="https://maps.google.com/?q=${inLoc.lat},${inLoc.lng}" target="_blank" style="font-size:.75rem;font-family:var(--mono);color:var(--accent2);text-decoration:none">📍 ${parseFloat(inLoc.lat).toFixed(4)}, ${parseFloat(inLoc.lng).toFixed(4)}</a>${inGeoName?`<div style="font-size:.7rem;color:var(--gpa);font-weight:700">🏢 ${inGeoName}</div>`:""}`
            :`<span style="color:var(--muted);font-size:.75rem">—</span>`;
          const outLoc=d.outLoc||(d.outRec?.location)||null;
          // Only show office name if GPS coordinates exist
          let outGeoName=outLoc?.lat&&d.outRec?.geoName&&d.outRec.geoName!=="No office location set"&&d.outRec.geoName!==""?d.outRec.geoName:"";
          let outGeoOk=!!d.outRec?.geoOk, outGeoDist=d.outRec?.geoDist??null;
          const outDistStr=outGeoDist!=null?` · ${outGeoDist}m`:"";
          const outGeoCell=outLoc?.lat
            ?`<a href="https://maps.google.com/?q=${outLoc.lat},${outLoc.lng}" target="_blank" style="font-size:.75rem;font-family:var(--mono);color:var(--danger);text-decoration:none">📍 ${parseFloat(outLoc.lat).toFixed(4)}, ${parseFloat(outLoc.lng).toFixed(4)}</a>${outGeoName?`<div style="font-size:.7rem;color:var(--gpa);font-weight:700">🏢 ${outGeoName}</div>`:""}`
            :`<span style="color:var(--muted);font-size:.75rem">—</span>`;
          tr2.innerHTML=`<td style="font-family:var(--mono);font-size:.8rem">${d.date.toLocaleDateString("en-GB",{weekday:"short",day:"2-digit",month:"short"})}</td>
            <td style="color:var(--accent2);font-family:var(--mono);font-size:.82rem">${d.in?new Date(d.in).toLocaleTimeString([],({"hour":"2-digit","minute":"2-digit"})):"—"}</td>
            <td style="color:var(--danger);font-family:var(--mono);font-size:.82rem">${d.out?new Date(d.out).toLocaleTimeString([],({"hour":"2-digit","minute":"2-digit"})):"—"}</td>
            <td>${arrCell}</td>
            <td>${depCell}</td>
            <td>${inGeoCell}</td>
            <td>${outGeoCell}</td>`;
          tb2.appendChild(tr2);
        });
        tbl.appendChild(tb2);tw.appendChild(tbl);content.appendChild(tw);
      }

      if(mSurveys.length){
        const st2=el("div","section-title","Survey Responses");content.appendChild(st2);
        const tw2=h("div",{style:{overflowX:"auto",background:"var(--card)",borderRadius:"12px",border:"1px solid var(--border)"}});
        const tbl2=el("table","month-table");
        tbl2.innerHTML=`<thead><tr><th>Date</th><th>📜 Policy</th><th>🔐 RSA</th><th>🎓 GPA</th></tr></thead>`;
        const tb3=document.createElement("tbody");
        [...mSurveys].sort((a,b)=>b.timestamp-a.timestamp).forEach(s=>{
          const tr3=document.createElement("tr");
          tr3.innerHTML=`<td style="font-family:var(--mono);font-size:.8rem">${s.date}</td>
            <td><span class="pill pill-pend">${s.policy??0}</span></td>
            <td><span class="pill pill-yes">${s.rsa??0}</span></td>
            <td><span class="pill pill-gpa">${s.gpa??0}</span></td>`;
          tb3.appendChild(tr3);
        });
        tbl2.appendChild(tb3);tw2.appendChild(tbl2);content.appendChild(tw2);
      }
    }

    // ── CALENDAR TAB ──────────────────────────────────────────────────────────
    if(curTab==="calendar"){
      // Month navigator
      if(!window._calMonth)window._calMonth=curMKS;
      const calNav=h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"1rem"}});
      const prevBtn=h("button",{className:"btn btn-ghost btn-sm"},"◀");
      const nextBtn=h("button",{className:"btn btn-ghost btn-sm"},"▶");
      const calTitle=h("div",{style:{fontWeight:"700",fontSize:"1rem",color:"var(--text)"}},
        new Date(window._calMonth+"-01").toLocaleString("default",{month:"long",year:"numeric"}));
      prevBtn.addEventListener("click",()=>{
        const d=new Date(window._calMonth+"-01");d.setMonth(d.getMonth()-1);
        window._calMonth=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;refresh();});
      nextBtn.addEventListener("click",()=>{
        const d=new Date(window._calMonth+"-01");d.setMonth(d.getMonth()+1);
        window._calMonth=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;refresh();});
      // FIX: disable next button when already at current month — no future navigation
      if(window._calMonth>=curMKS) nextBtn.disabled=true;
      calNav.appendChild(prevBtn);calNav.appendChild(calTitle);calNav.appendChild(nextBtn);
      content.appendChild(calNav);

      // Build attendance map for this month
      const calRecs=myRecs().filter(r=>{const d=new Date(r.timestamp);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`===window._calMonth});
      const calDayMap={};
      calRecs.forEach(r=>{
        const k=localDateStr(new Date(r.timestamp));
        if(!calDayMap[k])calDayMap[k]={in:null,out:null};
        if(r.type==="in"&&(!calDayMap[k].in||r.timestamp<calDayMap[k].in))calDayMap[k].in=r.timestamp;
        if(r.type==="out"&&(!calDayMap[k].out||r.timestamp>calDayMap[k].out))calDayMap[k].out=r.timestamp;
      });
      const calAbsent=new Set((DB.absences||[]).filter(a=>a.username===SESSION.username&&a.date&&a.date.startsWith(window._calMonth)).map(a=>a.date));

      // Calendar grid
      const calYear=parseInt(window._calMonth.split("-")[0]);
      const calMonthIdx=parseInt(window._calMonth.split("-")[1])-1;
      const firstDay=new Date(calYear,calMonthIdx,1).getDay();
      const daysInMonth=new Date(calYear,calMonthIdx+1,0).getDate();
      const todayDateStr=localDateStr(new Date());

      const calWrap=h("div",{style:{background:"var(--card)",borderRadius:"14px",border:"1px solid var(--border)",padding:"1rem"}});
      // Day headers
      const dayHeaders=h("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"2px",marginBottom:"4px"}});
      ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach(d=>{
        dayHeaders.appendChild(h("div",{style:{textAlign:"center",fontSize:".7rem",fontWeight:"700",color:"var(--muted)",padding:".3rem 0"}},d));
      });
      calWrap.appendChild(dayHeaders);

      const calGrid=h("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"3px"}});

      // Empty cells before first day
      for(let i=0;i<firstDay;i++) calGrid.appendChild(h("div",{}));

      // Day cells
      for(let day=1;day<=daysInMonth;day++){
        const dateStr=`${window._calMonth}-${String(day).padStart(2,"0")}`;
        const dayData=calDayMap[dateStr];
        const isAbsent=calAbsent.has(dateStr);
        const isToday=dateStr===todayDateStr;
        const isWeekend=new Date(calYear,calMonthIdx,day).getDay()===0;
        const isFuture=dateStr>todayDateStr;

        let bg="transparent",color="var(--text)",border="1px solid transparent",dot=null;
        if(isToday){border="2px solid var(--accent)";color="var(--accent)";}
        if(isFuture){color="var(--muted)";}
        else if(isWeekend&&!dayData){color="var(--muted)";}
        else if(dayData?.in&&dayData?.out){bg="#38d9a922";color="var(--gpa)";border="1px solid #38d9a944";}
        else if(dayData?.in&&!dayData?.out){bg="#4f8ef722";color="var(--accent)";border="1px solid #4f8ef744";}
        else if(isAbsent){bg="#ff5f6d22";color="var(--danger)";border="1px solid #ff5f6d44";}

        const cell=h("div",{style:{
          textAlign:"center",borderRadius:"8px",padding:".4rem .1rem",cursor:dayData?"pointer":"default",
          background:bg,border,color,fontSize:".85rem",fontWeight:isToday?"800":"600",
          transition:"all .15s",minHeight:"2.2rem",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"
        }},String(day));

        // Show check-in time as tiny label
        if(dayData?.in){
          const timeStr=new Date(dayData.in).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
          cell.appendChild(h("div",{style:{fontSize:".55rem",color:"var(--accent2)",fontFamily:"var(--mono)",marginTop:"1px"}},timeStr));
        }

        // Click to show detail popup
        if(dayData||isAbsent){
          cell.addEventListener("click",()=>{
            // Remove existing popup
            document.querySelectorAll(".cal-popup").forEach(p=>p.remove());
            const popup=el("div","cal-popup");
            popup.style.cssText=`position:fixed;inset:0;background:#00000088;display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem`;
            const box=h("div",{style:{background:"var(--card)",border:"1px solid var(--border)",borderRadius:"16px",padding:"1.5rem",width:"100%",maxWidth:"320px",position:"relative"}});
            const closeBtn=h("button",{className:"x-btn"},"✕");closeBtn.addEventListener("click",()=>popup.remove());
            const dateLabel=new Date(calYear,calMonthIdx,day).toLocaleDateString("en-GB",{weekday:"long",day:"2-digit",month:"long",year:"numeric"});
            box.appendChild(closeBtn);
            box.appendChild(h("div",{style:{fontSize:"1.1rem",fontWeight:"700",marginBottom:"1rem",paddingRight:"2rem"}},dateLabel));
            if(isAbsent&&!dayData?.in){
              box.appendChild(h("div",{style:{color:"var(--danger)",fontWeight:"700",fontSize:".9rem"}},"🔴 Absent"));
            } else {
              const rows=[
                ["Check In", dayData?.in?new Date(dayData.in).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):"—","var(--accent2)"],
                ["Check Out", dayData?.out?new Date(dayData.out).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):"—","var(--danger)"],
              ];
              rows.forEach(([lbl,val,col])=>{
                const row=h("div",{style:{display:"flex",justifyContent:"space-between",padding:".5rem 0",borderBottom:"1px solid var(--border)"}});
                row.appendChild(h("span",{style:{color:"var(--muted)",fontSize:".85rem"}},lbl));
                row.appendChild(h("span",{style:{color:col,fontFamily:"var(--mono)",fontWeight:"700",fontSize:".85rem"}},val));
                box.appendChild(row);
              });
              // Survey data for that day
              const survey=(DB.surveys||[]).find(s=>s.username===SESSION.username&&s.date===dateStr);
              if(survey){
                box.appendChild(h("div",{style:{marginTop:".8rem",fontSize:".78rem",fontWeight:"700",color:"var(--muted)",letterSpacing:".06em",textTransform:"uppercase"}},"Survey"));
                [["📜 Policy",survey.policy||0,"var(--policy)"],["🔐 RSA",survey.rsa||0,"var(--rsa)"],["🎓 GPA",survey.gpa||0,"var(--gpa)"]].forEach(([lbl,val,col])=>{
                  const row=h("div",{style:{display:"flex",justifyContent:"space-between",padding:".4rem 0",borderBottom:"1px solid var(--border)"}});
                  row.appendChild(h("span",{style:{color:"var(--muted)",fontSize:".85rem"}},lbl));
                  row.appendChild(h("span",{style:{color:col,fontFamily:"var(--mono)",fontWeight:"700",fontSize:".85rem"}},String(val)));
                  box.appendChild(row);
                });
              }
            }
            popup.appendChild(box);
            popup.addEventListener("click",e=>{if(e.target===popup)popup.remove();});
            document.body.appendChild(popup);
          });
          cell.addEventListener("mouseenter",()=>{if(dayData)cell.style.opacity=".8";});
          cell.addEventListener("mouseleave",()=>{cell.style.opacity="1";});
        }
        calGrid.appendChild(cell);
      }
      calWrap.appendChild(calGrid);

      // Legend
      const legend=h("div",{style:{display:"flex",gap:".75rem",flexWrap:"wrap",marginTop:"1rem",fontSize:".72rem"}});
      [["#38d9a922","#38d9a944","var(--gpa)","Full Day"],["#4f8ef722","#4f8ef744","var(--accent)","Checked In"],["#ff5f6d22","#ff5f6d44","var(--danger)","Absent"]].forEach(([bg,border,col,lbl])=>{
        const item=h("div",{style:{display:"flex",alignItems:"center",gap:".3rem"}});
        item.appendChild(h("span",{style:{width:"12px",height:"12px",borderRadius:"3px",background:bg,border:`1px solid ${border}`,display:"inline-block"}}));
        item.appendChild(h("span",{style:{color:"var(--muted)"}},lbl));
        legend.appendChild(item);
      });
      calWrap.appendChild(legend);
      content.appendChild(calWrap);
    }
    // Restart sync badge timer after every refresh (it was cleared at the top of refresh())
    window._syncBadgeTimerRef = setInterval(()=>{ updateSyncBadge(); }, 5000);
  }
  refresh();render(dash);
}

// ── SURVEY EDIT MODAL ────────────────────────────────────────────────────────
function openSurveyEditModal(survey, onSave) {
  const ov=el("div","modal-overlay");
  const mo=el("div","modal",null,{maxWidth:"420px"});
  const xb=h("button",{className:"x-btn"},"✕");xb.addEventListener("click",()=>ov.remove());
  mo.appendChild(xb);
  mo.appendChild(h("div",{style:{fontSize:"1.5rem",marginBottom:".4rem"}},"✏️"));
  mo.appendChild(h("h2",{},"Edit Survey Entry"));
  const sub=el("div","sub","");
  sub.innerHTML=`User: <strong>${survey.username}</strong> &nbsp;·&nbsp; Date: <strong>${survey.date}</strong>`;
  mo.appendChild(sub);
  function numField(labelTxt, cls, val) {
    const wrap=h("div",{style:{marginBottom:"1.2rem"}});
    const ql=el("div","q-label "+cls,labelTxt);
    const inp=h("input",{type:"number",min:"0",value:val});
    inp.style.marginBottom="0";wrap.appendChild(ql);wrap.appendChild(inp);
    return {wrap,inp};
  }
  const {wrap:w1,inp:i1}=numField("📜 Policy Count","q-policy",survey.policy||0);
  const {wrap:w2,inp:i2}=numField("🔐 RSA Count","q-rsa",survey.rsa||0);
  const {wrap:w3,inp:i3}=numField("🎓 GPA Count","q-gpa",survey.gpa||0);
  const saveBtn=h("button",{className:"btn btn-primary",style:{marginTop:".5rem"}},"💾 Save Changes");
  saveBtn.addEventListener("click",()=>{
    const idx=DB.surveys.findIndex(s=>s.id===survey.id);
    if(idx>=0){
      DB.surveys[idx]={...DB.surveys[idx],policy:parseInt(i1.value)||0,rsa:parseInt(i2.value)||0,gpa:parseInt(i3.value)||0};
      save(DB);syncToSheet();
      // Also update the queued copy if it hasn't been flushed yet, so admin view reflects the edit immediately
      const q=loadQueue();
      const qi=q.findIndex(item=>item.action==="addSurvey"&&item.data?.id===survey.id);
      if(qi>=0){q[qi].data={...q[qi].data,policy:DB.surveys[idx].policy,rsa:DB.surveys[idx].rsa,gpa:DB.surveys[idx].gpa};saveQueue(q);}
    }
    ov.remove();onSave();
  });
  const delBtn=h("button",{className:"btn btn-danger",style:{marginTop:".6rem"}},"🗑 Delete This Entry");
  delBtn.addEventListener("click",()=>{
    if(!confirm("Delete this survey entry?"))return;
    DB.surveys=DB.surveys.filter(s=>s.id!==survey.id);save(DB);syncToSheet();ov.remove();onSave();
  });
  const cancelBtn=h("button",{className:"btn btn-ghost",style:{marginTop:".6rem"}},"Cancel");
  cancelBtn.addEventListener("click",()=>ov.remove());
  [w1,w2,w3,saveBtn,delBtn,cancelBtn].forEach(x=>mo.appendChild(x));
  ov.appendChild(mo);document.body.appendChild(ov);
}

// ── QUEUE INSPECTOR — admin can see/retry/clear stuck pending records ──────────
function openQueueInspector(onClose){
  const ov=el("div","modal-overlay");
  const mo=el("div","modal",null,{maxWidth:"580px"});
  const xb=h("button",{className:"x-btn"},"✕");
  xb.addEventListener("click",()=>{ov.remove();if(onClose)onClose();});
  mo.appendChild(xb);
  mo.appendChild(h("h2",{},"⏳ Pending Sync Queue"));
  const desc=h("div",{style:{fontSize:".8rem",color:"var(--muted)",marginBottom:"1rem",lineHeight:"1.6"}});
  desc.textContent="These records are saved locally and waiting to upload to Google Sheets. Tap Retry All to push them now, or Clear All if data is already on the sheet.";
  mo.appendChild(desc);

  const statusEl=h("div",{style:{fontSize:".8rem",fontWeight:"700",marginBottom:".75rem",minHeight:"1.2rem"}});
  mo.appendChild(statusEl);

  const listWrap=h("div",{style:{maxHeight:"340px",overflowY:"auto",borderRadius:"10px",border:"1px solid var(--border)",background:"var(--surface)"}});
  mo.appendChild(listWrap);

  function renderList(){
    listWrap.innerHTML="";
    const q=loadQueue();
    if(!q.length){
      listWrap.appendChild(h("div",{style:{padding:"1.5rem",color:"var(--muted)",textAlign:"center",fontSize:".85rem"}},"✅ Queue is empty — all data synced!"));
      return;
    }
    q.forEach((item,i)=>{
      const row=h("div",{style:{display:"flex",alignItems:"flex-start",gap:".75rem",padding:".75rem 1rem",borderBottom:i<q.length-1?"1px solid var(--border)":"none"}});
      const icon=h("div",{style:{fontSize:"1.1rem",flexShrink:"0",marginTop:".05rem"}},
        item.action==="addAttendance"?(item.data?.type==="out"?"🚪":"🟢"):
        item.action==="addSurvey"?"📜":
        item.action==="addAbsence"?"❌":
        item.action==="removeAbsence"?"✅":"📤"
      );
      const info=h("div",{style:{flex:1,minWidth:0}});
      const actionLabel={addAttendance:"Check "+(item.data?.type==="out"?"Out":"In"),addSurvey:"Survey",addAbsence:"Mark Absent",removeAbsence:"Remove Absence",fullSync:"Full Sync"}[item.action]||item.action;
      const name=item.data?.username||(item.data?.data?.users?"Full Sync":"?");
      const ts=item.ts?new Date(item.ts).toLocaleString([],({"month":"short","day":"2-digit","hour":"2-digit","minute":"2-digit"})):"(no timestamp)";
      const retries=item._retries||0;
      info.appendChild(h("div",{style:{fontWeight:"700",fontSize:".85rem",color:"var(--text)"}},actionLabel+" · "+name));
      info.appendChild(h("div",{style:{fontSize:".72rem",color:"var(--muted)",marginTop:".15rem"}},ts+(retries>0?" · "+retries+" retries":"")));
      const delBtn=h("button",{style:{flexShrink:0,padding:".25rem .6rem",border:"1.5px solid #ff5f6d44",borderRadius:"8px",background:"#ff5f6d11",color:"var(--danger)",fontFamily:"var(--font)",fontSize:".72rem",fontWeight:"700",cursor:"pointer"}},"✕ Drop");
      delBtn.addEventListener("click",()=>{
        const qq=loadQueue();
        const newQ=qq.filter((_,j)=>j!==i);
        saveQueue(newQ);
        statusEl.textContent="Dropped 1 item.";
        statusEl.style.color="var(--danger)";
        renderList();
        if(onClose)onClose();
      });
      row.appendChild(icon);row.appendChild(info);row.appendChild(delBtn);
      listWrap.appendChild(row);
    });
  }
  // Helper: drop absence queue items + DB.absences + fire removeAbsence directly to sheet (no queue)
  function purgeAbsencesForUsers(toDrop, todayStr){
    if(!toDrop.size) return 0;
    const q = loadQueue();
    // Remove addAbsence AND removeAbsence queue items for these users
    const filtered = q.filter(item => {
      if(item.action==="addAbsence"||item.action==="removeAbsence"){
        const uname = item.data?.username||"";
        const date  = item.data?.date||"";
        if(date===todayStr && toDrop.has(uname)) return false;
      }
      return true;
    });
    saveQueue(filtered);
    // Remove from local DB immediately
    DB.absences = (DB.absences||[]).filter(a => !(a.date===todayStr && toDrop.has(a.username)));
    save(DB);
    // Persist cleared usernames so Today Absent list stays correct even if check-ins never arrive
    try {
      const _key = "vibeClearedAbsent__"+todayStr;
      const existing = new Set(JSON.parse(localStorage.getItem(_key)||"[]"));
      toDrop.forEach(u => existing.add(u));
      localStorage.setItem(_key, JSON.stringify([...existing]));
      // Auto-expire: clean up keys older than 2 days
      Object.keys(localStorage).filter(k=>k.startsWith("vibeClearedAbsent__")&&k<"vibeClearedAbsent__"+todayStr)
        .forEach(k=>localStorage.removeItem(k));
    } catch(_){}
    // Fire removeAbsence directly to sheet (bypass queue so it doesn't get stuck)
    const url = getScriptUrl();
    if(url){
      toDrop.forEach(uname => {
        const payload = { action:"removeAbsence", data:{ username:uname, date:todayStr } };
        fetch(url, { method:"POST", redirect:"follow", headers:{"Content-Type":"text/plain"}, body:JSON.stringify(payload) })
          .catch(()=>{}); // fire-and-forget — DB is already cleaned locally
      });
    }
    return q.length - filtered.length;
  }

  // On open: silently drop all removeAbsence queue items — these are always fired directly to sheet
  // Keeping them in the queue only causes phantom pending counts with no benefit
  (function dropStaleRemoveAbsence(){
    const q = loadQueue();
    const cleaned = q.filter(i => i.action !== "removeAbsence");
    if(cleaned.length < q.length){
      saveQueue(cleaned);
    }
  })();

  // Auto-purge on open: check local DB + queue + sheet for who actually checked in
  (async function autoAbsencePurge(){
    const todayStr = localDateStr(new Date());
    const toDrop = new Set();
    const q = loadQueue();

    // Local DB check-ins today
    const localCheckedIn = new Set(
      (DB.attendance||[])
        .filter(r => r.username && r.timestamp && (r.type==="in"||r.type==="out") && localDateStr(new Date(r.timestamp))===todayStr)
        .map(r => String(r.username))
    );
    // Other queued check-ins today
    const queuedCheckIns = new Set(
      q.filter(i => i.action==="addAttendance" && i.data?.username && i.data?.timestamp &&
                    (i.data?.type==="in"||i.data?.type==="out") &&
                    localDateStr(new Date(i.data.timestamp))===todayStr)
       .map(i => String(i.data.username))
    );

    q.forEach(item => {
      if(item.action==="addAbsence"){
        const uname = item.data?.username||"";
        const date  = item.data?.date||"";
        if(date===todayStr && (localCheckedIn.has(uname)||queuedCheckIns.has(uname))) toDrop.add(uname);
      }
    });

    // Also fetch sheet to catch check-ins that synced but aren't in local DB
    try {
      statusEl.textContent = "Checking sheet for present users…";
      statusEl.style.color = "var(--muted)";
      const result = await gsFetch({action:"getAll"});
      if(result && result.ok){
        const sheetCheckedIn = new Set(
          (result.attendance||[])
            .filter(r => r.username && r.timestamp && localDateStr(new Date(parseInt(r.timestamp)||0))===todayStr)
            .map(r => String(r.username))
        );
        q.forEach(item => {
          if(item.action==="addAbsence"){
            const uname = item.data?.username||"";
            const date  = item.data?.date||"";
            if(date===todayStr && sheetCheckedIn.has(uname)) toDrop.add(uname);
          }
        });
      }
    } catch(_){}

    if(toDrop.size > 0){
      const dropped = purgeAbsencesForUsers(toDrop, todayStr);
      statusEl.textContent = `✅ Auto-cleared ${dropped} absence(s) — those users already checked in.`;
      statusEl.style.color = "var(--gpa)";
      renderList();
    } else {
      statusEl.textContent = "";
    }
  })();
  renderList();

  // Action buttons
  const btnRow=h("div",{style:{display:"flex",gap:".6rem",marginTop:"1rem",flexWrap:"wrap"}});

  const retryBtn=h("button",{className:"btn btn-primary",style:{flex:"1",minWidth:"120px"}},"🔄 Retry All Now");
  retryBtn.addEventListener("click",async()=>{
    retryBtn.disabled=true;retryBtn.textContent="Checking sheet...";
    statusEl.textContent="Comparing queue against Google Sheets...";statusEl.style.color="var(--accent)";

    // Step 1: verify what's already on sheet and purge those
    const purged = await verifyAndPurgeQueue();
    if(purged > 0){
      statusEl.textContent=`Found ${purged} item(s) already on sheet — removed. Flushing rest...`;
      renderList();
    }

    // Step 2: flush remaining
    retryBtn.textContent="Syncing...";
    await flushQueue();
    await loadFromSheet();

    const remaining=loadQueue().length;
    if(remaining===0){
      statusEl.textContent="✅ All synced! Queue is now empty.";statusEl.style.color="var(--gpa)";
    } else {
      // Step 3: one more verify pass after flush
      const purged2 = await verifyAndPurgeQueue();
      const final=loadQueue().length;
      if(final===0){
        statusEl.textContent="✅ All confirmed on sheet and cleared.";statusEl.style.color="var(--gpa)";
      } else {
        // Count absences vs other stuck items
        const remainingQ = loadQueue();
        const absCount = remainingQ.filter(i=>i.action==="addAbsence"||i.action==="removeAbsence").length;
        const otherCount = remainingQ.length - absCount;
        if(absCount > 0 && otherCount === 0){
          // All remaining are absences — users confirmed present on sheet, auto-drop
          const todayStr2 = localDateStr(new Date());
          const toDrop2 = new Set(remainingQ.filter(i=>i.action==="addAbsence").map(i=>i.data?.username||"").filter(Boolean));
          purgeAbsencesForUsers(toDrop2, todayStr2);
          saveQueue(loadQueue().filter(i=>i.action!=="removeAbsence"||!toDrop2.has(i.data?.username||"")));
          statusEl.textContent="✅ Auto-cleared "+absCount+" absence(s) — reloading dashboard…";statusEl.style.color="var(--gpa)";
          renderList();
          // Reload sheet + re-render admin so Today Absent list reflects the check-ins
          await loadFromSheet();
          if(typeof window._adminRefresh==="function") window._adminRefresh();
          else if(typeof window._userRefresh==="function") window._userRefresh();
          else if(SESSION && SESSION.role==="admin") renderAdmin();
          statusEl.textContent="✅ Auto-cleared "+absCount+" absence(s) — Today Absent list updated.";statusEl.style.color="var(--gpa)";
        } else if(absCount > 0){
          statusEl.textContent="⚠️ "+final+" item(s) pending: "+absCount+" absence(s) + "+otherCount+" other. Tap the Drop Absences button below.";statusEl.style.color="var(--warn)";
        } else {
          statusEl.textContent="⚠️ "+final+" item(s) still pending — check Script URL below or tap Clear All.";statusEl.style.color="var(--warn)";
        }
      }
    }
    retryBtn.textContent="🔄 Retry All Now";retryBtn.disabled=false;
    renderList();
    if(onClose)onClose();
  });

  const clearBtn=h("button",{className:"btn btn-ghost",style:{flex:"1",minWidth:"120px",border:"1.5px solid #ff5f6d44",color:"var(--danger)"}},"🗑 Clear All");
  clearBtn.addEventListener("click",()=>{
    if(!confirm("Clear ALL "+loadQueue().length+" pending items?\n\nOnly do this if you've confirmed the data already exists in Google Sheets. This cannot be undone."))return;
    saveQueue([]);
    statusEl.textContent="Queue cleared.";statusEl.style.color="var(--muted)";
    renderList();
    if(onClose)onClose();
  });

  // Quick action: drop ALL absence records from queue + DB + sheet
  const absOnly=loadQueue().filter(i=>i.action==="addAbsence"||i.action==="removeAbsence").length;
  const dropAbsBtn=h("button",{className:"btn btn-ghost",style:{flex:"1",minWidth:"120px",border:"1.5px solid #ffd16644",color:"var(--warn)",display:absOnly>0?"":"none"}},`❌ Drop ${absOnly} Absence${absOnly!==1?"s":""}`);
  dropAbsBtn.addEventListener("click",()=>{
    if(!confirm(`Drop all ${absOnly} absence record(s) from queue?\n\nThis will also remove them from the Today Absent list and send a cleanup to Google Sheets.\n\nDo this only if those users actually checked in.`))return;
    const todayStr = localDateStr(new Date());
    // Collect all usernames from queued addAbsence items
    const toDrop = new Set(
      loadQueue().filter(i=>i.action==="addAbsence").map(i=>i.data?.username||"").filter(Boolean)
    );
    const dropped = purgeAbsencesForUsers(toDrop, todayStr);
    // Also drop removeAbsence items from queue
    const cleaned = loadQueue().filter(i=>i.action!=="removeAbsence"||!toDrop.has(i.data?.username||""));
    saveQueue(cleaned);
    statusEl.textContent=`Dropped ${dropped} absence record(s) — Today Absent list updated.`;
    statusEl.style.color="var(--warn)";
    dropAbsBtn.style.display="none";
    renderList();
    if(onClose)onClose();
  });

  const closeBtn=h("button",{className:"btn btn-ghost",style:{flex:"1",minWidth:"120px"}},"Close");
  closeBtn.addEventListener("click",()=>{ov.remove();if(onClose)onClose();});

  btnRow.appendChild(retryBtn);btnRow.appendChild(dropAbsBtn);btnRow.appendChild(clearBtn);btnRow.appendChild(closeBtn);
  mo.appendChild(btnRow);

  // Show current Script URL for diagnostics
  const scriptUrl=getScriptUrl();
  const diagEl=h("div",{style:{marginTop:"1rem",padding:".6rem .9rem",borderRadius:"8px",background:"var(--surface)",border:"1px solid var(--border)",fontSize:".72rem",color:"var(--muted)",wordBreak:"break-all"}});
  diagEl.innerHTML="<strong>Script URL:</strong> "+(scriptUrl?scriptUrl.slice(0,60)+"...":"❌ Not configured");
  mo.appendChild(diagEl);

  ov.appendChild(mo);
  ov.addEventListener("click",e=>{if(e.target===ov){ov.remove();if(onClose)onClose();}});
  document.body.appendChild(ov);
}

// ── USER DATA MODAL — admin view of any user's full synced data ───────────────
function openUserDataModal(u, allAttend, allSurveys){
  const ov=el("div","modal-overlay");
  const mo=el("div","modal",null,{maxWidth:"560px"});
  const xb=h("button",{className:"x-btn"},"✕");xb.addEventListener("click",()=>ov.remove());
  mo.appendChild(xb);

  const displayName=(u.fullName&&u.fullName.trim())?u.fullName.trim():(u.username.charAt(0).toUpperCase()+u.username.slice(1).toLowerCase());
  const titleEl=h("h2",{},displayName);
  const subEl=h("div",{style:{color:"var(--muted)",fontSize:".82rem",marginBottom:"1.2rem",display:"flex",flexWrap:"wrap",gap:".5rem",alignItems:"center"}});
  subEl.appendChild(h("span",{style:{background:"#4f8ef722",color:"var(--accent)",border:"1px solid #4f8ef744",borderRadius:"6px",padding:".1rem .45rem",fontSize:".75rem",fontFamily:"var(--mono)"}},"ID: "+(u.userId||u.username)));
  if(u.designation)subEl.appendChild(h("span",{},"🏷 "+u.designation));
  if(u.location)subEl.appendChild(h("span",{},"📍 "+u.location));
  mo.appendChild(titleEl);mo.appendChild(subEl);

  // Get this user's data
  const userAttend=allAttend.filter(r=>r.username===u.username).sort((a,b)=>b.timestamp-a.timestamp);
  const userSurveys=(allSurveys||[]).filter(s=>s.username===u.username).sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  const userAbsences=(DB.absences||[]).filter(a=>a.username===u.username).sort((a,b)=>(b.date||"").localeCompare(a.date||""));

  // Summary stats
  const now=new Date();
  const curMon=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
  const presentDays=new Set(userAttend.filter(r=>r.type==="in").map(r=>new Date(r.timestamp).toDateString())).size;
  const monthSurveys=userSurveys.filter(s=>(s.date||"").startsWith(curMon));
  const monthPolicy=monthSurveys.reduce((s,r)=>s+(parseInt(r.policy)||0),0);
  const monthRsa=monthSurveys.reduce((s,r)=>s+(parseInt(r.rsa)||0),0);
  const monthGpa=monthSurveys.reduce((s,r)=>s+(parseInt(r.gpa)||0),0);
  const monthAbsences=userAbsences.filter(a=>(a.date||"").startsWith(curMon)).length;

  const statsGrid=h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:".6rem",marginBottom:"1.2rem"}});
  function statBox(num,lbl,col){
    const b=h("div",{style:{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"10px",padding:".75rem 1rem"}});
    b.appendChild(h("div",{style:{fontSize:"1.5rem",fontWeight:"900",fontFamily:"var(--mono)",color:col}},String(num)));
    b.appendChild(h("div",{style:{fontSize:".72rem",color:"var(--muted)",marginTop:".15rem"}},lbl));
    return b;
  }
  statsGrid.appendChild(statBox(presentDays,"Total Present","var(--accent2)"));
  statsGrid.appendChild(statBox(monthAbsences,"Absent This Month","var(--danger)"));
  statsGrid.appendChild(statBox(monthPolicy,"Policy This Month","var(--policy)"));
  statsGrid.appendChild(statBox(monthRsa+" / "+monthGpa,"RSA / GPA This Month","var(--rsa)"));
  mo.appendChild(statsGrid);

  // Tabs inside modal
  let modalTab="attendance";
  const tabRow=h("div",{style:{display:"flex",gap:".4rem",marginBottom:"1rem",flexWrap:"wrap"}});
  const tabDefs=[["attendance","📋 Attendance ("+userAttend.filter(r=>r.type==="in").length+" days)"],["surveys","📜 Surveys ("+userSurveys.length+")"],["absences","❌ Absences ("+userAbsences.length+")"]];
  const tabBody=h("div",{});
  mo.appendChild(tabRow);mo.appendChild(tabBody);

  function renderModalTab(){
    tabBody.innerHTML="";
    // Update tab styles
    tabRow.querySelectorAll("button").forEach((b,i)=>{
      b.style.background=tabDefs[i][0]===modalTab?"var(--accent)":"transparent";
      b.style.color=tabDefs[i][0]===modalTab?"#fff":"var(--muted)";
      b.style.borderColor=tabDefs[i][0]===modalTab?"var(--accent)":"var(--border)";
      b.style.fontWeight=tabDefs[i][0]===modalTab?"700":"500";
    });

    if(modalTab==="attendance"){
      // Group by date — show check-in + check-out per day
      const byDay={};
      userAttend.forEach(r=>{
        const dk=new Date(r.timestamp).toDateString();
        if(!byDay[dk])byDay[dk]={date:new Date(r.timestamp),ins:[],outs:[]};
        if(r.type==="in")byDay[dk].ins.push(r);
        else byDay[dk].outs.push(r);
      });
      const days=Object.values(byDay).sort((a,b)=>b.date-a.date);
      if(!days.length){tabBody.appendChild(el("div","empty","No attendance records found."));return;}

      const tbl=h("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:".82rem"}});
      const thead=h("thead",{});
      thead.innerHTML="<tr><th class='attend-th'>Date</th><th class='attend-th'>Check In</th><th class='attend-th'>Check Out</th><th class='attend-th'>Arrival</th><th class='attend-th'>Departure</th></tr>";
      tbl.appendChild(thead);
      const tbody=h("tbody",{});
      days.forEach(({date,ins,outs})=>{
        const inTs=ins.length?Math.min(...ins.map(r=>r.timestamp)):null;
        const outTs=outs.length?Math.max(...outs.map(r=>r.timestamp)):null;
        const arr=getArrivalStatus(inTs);
        const dep=getDepartureStatus(outTs,inTs);
        const arrColor=arr?.type==="ontime"?"var(--gpa)":arr?.type==="halfday"?"var(--warn)":"var(--danger)";
        const depColor=dep?.type==="full"?"var(--gpa)":dep?.type==="permission"?"var(--policy)":"var(--muted)";
        const tr=h("tr",{});
        tr.innerHTML=`
          <td class='attend-td'>${date.toLocaleDateString("en-GB",{weekday:"short",day:"2-digit",month:"short"})}</td>
          <td class='attend-td' style='color:var(--accent2);font-family:var(--mono)'>${inTs?new Date(inTs).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):"—"}</td>
          <td class='attend-td' style='color:var(--danger);font-family:var(--mono)'>${outTs?new Date(outTs).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):"—"}</td>
          <td class='attend-td'><span style='color:${arrColor};font-weight:700;font-size:.78rem'>${arr?arr.label:"—"}</span></td>
          <td class='attend-td'><span style='color:${depColor};font-weight:700;font-size:.78rem'>${dep?dep.label:"—"}</span></td>`;
        tbody.appendChild(tr);
      });
      tbl.appendChild(tbody);
      const wrap=h("div",{style:{overflowX:"auto",maxHeight:"360px",overflowY:"auto",borderRadius:"10px",border:"1px solid var(--border)"}});
      wrap.appendChild(tbl);tabBody.appendChild(wrap);

    } else if(modalTab==="surveys"){
      if(!userSurveys.length){tabBody.appendChild(el("div","empty","No survey entries found."));return;}
      const tbl=h("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:".82rem"}});
      const thead=h("thead",{});
      thead.innerHTML="<tr><th class='attend-th'>Date</th><th class='attend-th'>📜 Policy</th><th class='attend-th'>🔐 RSA</th><th class='attend-th'>🎓 GPA</th></tr>";
      tbl.appendChild(thead);
      const tbody=h("tbody",{});
      userSurveys.forEach(s=>{
        const tr=h("tr",{});
        tr.innerHTML=`
          <td class='attend-td'>${s.date}</td>
          <td class='attend-td' style='color:var(--policy);font-weight:700;font-family:var(--mono)'>${parseInt(s.policy)||0}</td>
          <td class='attend-td' style='color:var(--rsa);font-weight:700;font-family:var(--mono)'>${parseInt(s.rsa)||0}</td>
          <td class='attend-td' style='color:var(--gpa);font-weight:700;font-family:var(--mono)'>${parseInt(s.gpa)||0}</td>`;
        tbody.appendChild(tr);
      });
      tbl.appendChild(tbody);
      const wrap=h("div",{style:{overflowX:"auto",maxHeight:"360px",overflowY:"auto",borderRadius:"10px",border:"1px solid var(--border)"}});
      wrap.appendChild(tbl);tabBody.appendChild(wrap);

    } else if(modalTab==="absences"){
      if(!userAbsences.length){tabBody.appendChild(el("div","empty","No absences recorded."));return;}
      const tbl=h("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:".82rem"}});
      const thead=h("thead",{});
      thead.innerHTML="<tr><th class='attend-th'>Date</th><th class='attend-th'>Type</th></tr>";
      tbl.appendChild(thead);
      const tbody=h("tbody",{});
      userAbsences.forEach(a=>{
        const tr=h("tr",{});
        const typeLabel=a.auto?"Auto-marked":"Manual";
        const typeColor=a.auto?"var(--warn)":"var(--danger)";
        tr.innerHTML=`
          <td class='attend-td'>${a.date}</td>
          <td class='attend-td'><span style='color:${typeColor};font-weight:700;font-size:.78rem'>${typeLabel}</span></td>`;
        tbody.appendChild(tr);
      });
      tbl.appendChild(tbody);
      const wrap=h("div",{style:{overflowX:"auto",maxHeight:"360px",overflowY:"auto",borderRadius:"10px",border:"1px solid var(--border)"}});
      wrap.appendChild(tbl);tabBody.appendChild(wrap);
    }
  }

  tabDefs.forEach(([key,lbl])=>{
    const tb=h("button",{style:{padding:".4rem .85rem",borderRadius:"8px",border:"1.5px solid var(--border)",background:"transparent",color:"var(--muted)",fontFamily:"var(--font)",fontSize:".8rem",cursor:"pointer",transition:"all .15s",fontWeight:"500"}},lbl);
    tb.addEventListener("click",()=>{modalTab=key;renderModalTab();});
    tabRow.appendChild(tb);
  });
  renderModalTab();

  // Force-sync button so admin can pull freshest data for this user
  const syncRowEl=h("div",{style:{marginTop:"1rem",paddingTop:"1rem",borderTop:"1px solid var(--border)",display:"flex",gap:".5rem",alignItems:"center"}});
  const syncUserBtn=h("button",{className:"btn btn-ghost btn-sm"},"🔄 Sync Latest Data");
  syncUserBtn.addEventListener("click",async()=>{
    syncUserBtn.disabled=true;syncUserBtn.textContent="Syncing...";
    await flushQueue();
    await loadFromSheet();
    syncUserBtn.textContent="Done!";
    // Refresh modal data in place
    const freshAttend=[...DB.attendance,...loadQueue().filter(i=>i.action==="addAttendance"&&i.data?.username).map(i=>i.data)].filter(r=>r.username===u.username).sort((a,b)=>b.timestamp-a.timestamp);
    const freshSurveys=(DB.surveys||[]).filter(s=>s.username===u.username).sort((a,b)=>(b.date||"").localeCompare(a.date||""));
    ov.remove();
    openUserDataModal(u,freshAttend,freshSurveys);
  });
  syncRowEl.appendChild(syncUserBtn);
  syncRowEl.appendChild(h("span",{style:{fontSize:".75rem",color:"var(--muted)"}},"Data synced from Google Sheets"));
  mo.appendChild(syncRowEl);

  ov.appendChild(mo);
  ov.addEventListener("click",e=>{if(e.target===ov)ov.remove();});
  document.body.appendChild(ov);
}

    // ── USERS TAB ──
    if(curTab==="users"){
      // ── CREATE USER FORM (new field order: Full Name → User ID → Password) ──

      const {fg:fg1, inp:iName} = makeField(1,"👤","Full Name",{type:"text",placeholder:"e.g. Arjun Sharma"});

      const {fg:fg3, inp:iPW}   = makeField(3,"🔑","Password",{type:"password",placeholder:"Set a password"});

      // Optional fields (designation & location) — collapsible for cleanliness
      const optToggle=h("button",{type:"button",style:{background:"none",border:"none",color:"var(--muted)",fontFamily:"var(--font)",fontSize:".8rem",cursor:"pointer",padding:"0 0 .8rem",display:"flex",alignItems:"center",gap:".3rem"}},"＋ Add designation & location (optional)");
      const optFields=h("div",{style:{display:"none"}});
      const {fg:fg4, inp:iDS} = makeField("","🏷","Designation",{type:"text",placeholder:"e.g. Sales Executive"});

      optFields.appendChild(fg4);optFields.appendChild(fg5);
      let optOpen=false;

        optOpen=!optOpen;

      });

      const addBtn=h("button",{className:"btn btn-primary"},"✚ Create User");
      addBtn.addEventListener("click",()=>{
        const name=iName.value.trim();
        const uid=iUID.value.trim();

        if(!uid){errB.textContent="User ID is required.";errB.classList.remove("hidden");return}
        if(!pw){errB.textContent="Password is required.";errB.classList.remove("hidden");return}
        // Use User ID as the login username
        if(DB.users.find(x=>x.username===uid)){errB.textContent="User ID already exists. Choose a different one.";errB.classList.remove("hidden");return}
        DB.users.push({username:uid,password:pw,fullName:name,userId:uid,designation:des,location:loc2,role:"user",geoLat:"",geoLng:"",geoRadius:200,officeName:""});
        save(DB);syncToSheet();
        sucB.textContent=`✅ User "${name}" (ID: ${uid}) created successfully.`;sucB.classList.remove("hidden");
        iName.value="";iUID.value="";iPW.value="";iDS.value="";iLoc.value="";
        refresh();

      [fg1,fg2,fg3,optToggle,optFields,addBtn].forEach(x=>fc.appendChild(x));
      content.appendChild(fc);


      // User list with search
      const userListHeader=h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:".6rem",marginBottom:".8rem",marginTop:"1.5rem"}});
      const userTitle=el("div","section-title",`All Users (${regularUsers.length})`);
      userTitle.style.margin="0";
      const searchWrap=h("div",{style:{position:"relative",flex:"1",maxWidth:"260px",minWidth:"160px"}});
      const searchInp=h("input",{type:"text",placeholder:"Search name or ID…"});
      searchInp.style.cssText="width:100%;padding:.45rem .9rem .45rem 2rem;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--font);font-size:.82rem;outline:none;box-sizing:border-box";
      if(window._userSearch)searchInp.value=window._userSearch;
      const searchIcon=h("span",{style:{position:"absolute",left:".6rem",top:"50%",transform:"translateY(-50%)",pointerEvents:"none",fontSize:".9rem"}},"🔍");
      searchWrap.appendChild(searchIcon);
      searchWrap.appendChild(searchInp);
      userListHeader.appendChild(userTitle);
      userListHeader.appendChild(searchWrap);
      content.appendChild(userListHeader);

      const userListWrap=h("div",{});
      content.appendChild(userListWrap);

      function renderUserList(query=""){
        userListWrap.innerHTML="";
        const q=query.toLowerCase().trim();
        const filtered=regularUsers.filter(u=>{
          if(!q) return true;
          const name=(u.fullName||u.username).toLowerCase();
          const id=(u.userId||u.username).toLowerCase();
          const desig=(u.designation||"").toLowerCase();
          return name.includes(q)||id.includes(q)||desig.includes(q);
        });
        userTitle.textContent=`All Users (${filtered.length}${q?" found":""} of ${regularUsers.length})`;
        if(!filtered.length){
          userListWrap.appendChild(el("div","empty",q?`No users match "${query}".`:"No users yet."));
          return;

        filtered.forEach(u=>{
          const row=el("div","user-row");
          const info=h("div",{style:{flex:1,minWidth:0}});
          const nameEl=el("div","uname",(u.fullName&&u.fullName.trim()?u.fullName.trim():(u.username.charAt(0).toUpperCase()+u.username.slice(1).toLowerCase())));
          const metaRow=h("div",{style:{display:"flex",alignItems:"center",gap:".5rem",flexWrap:"wrap",marginTop:".2rem"}});
          metaRow.appendChild(h("span",{style:{fontSize:".72rem",color:"var(--accent)",fontFamily:"var(--mono)",background:"#4f8ef722",border:"1px solid #4f8ef744",borderRadius:"6px",padding:".1rem .45rem"}},"ID: "+(u.userId||u.username)));
          if(u.designation)metaRow.appendChild(h("span",{style:{fontSize:".72rem",color:"var(--muted)"}},"🏷 "+u.designation));
          if(u.location)metaRow.appendChild(h("span",{style:{fontSize:".72rem",color:"var(--muted)"}},"📍 "+u.location));
          let pwVisible = false;
          const pwPill=h("span",{style:{fontSize:".7rem",background:"#ffd16622",color:"var(--warn)",border:"1px solid #ffd16644",borderRadius:"6px",padding:".1rem .45rem",fontFamily:"var(--mono)",cursor:"pointer",userSelect:"none",display:"inline-flex",alignItems:"center",gap:".3rem"}});
          const pwText=h("span",{},"••••••");
          const pwEye=h("span",{style:{fontSize:".8rem"}},"👁");
          pwPill.appendChild(h("span",{},"🔑 "));
          pwPill.appendChild(pwText);
          pwPill.appendChild(pwEye);
          pwPill.title="Tap to show/hide password";
          pwPill.addEventListener("click",()=>{
            pwVisible=!pwVisible;
            pwText.textContent=pwVisible?(u.password||"(no password)"):"••••••";
            pwEye.textContent=pwVisible?"🙈":"👁";
            pwPill.style.background=pwVisible?"#ff5f6d22":"#ffd16622";
            pwPill.style.color=pwVisible?"var(--danger)":"var(--warn)";
            pwPill.style.border=pwVisible?"1px solid #ff5f6d44":"1px solid #ffd16644";
          });
          metaRow.appendChild(pwPill);
          info.appendChild(nameEl);info.appendChild(metaRow);
          row.appendChild(info);
          const btns=h("div",{style:{display:"flex",gap:".5rem",flexShrink:0,flexWrap:"wrap"}});
          // ── View Data button — shows full attendance/survey history for this user ──
          const vBtn=h("button",{className:"btn btn-primary btn-sm"},"👁 View");
          vBtn.addEventListener("click",()=>openUserDataModal(u, allAttend, allSurveys));
          const eBtn=h("button",{className:"btn btn-ghost btn-sm"},"✏️ Edit");
          eBtn.addEventListener("click",()=>openEditModal(u));
          const dBtn=h("button",{className:"btn btn-danger btn-sm"},"Delete");
          dBtn.addEventListener("click",()=>{
            if(!confirm(`Delete "${u.fullName||u.username}"?`))return;
            DB.users=DB.users.filter(x=>x.username!==u.username);
            DB.attendance=DB.attendance.filter(r=>r.username!==u.username);
            DB.surveys=(DB.surveys||[]).filter(r=>r.username!==u.username);
            DB.absences=(DB.absences||[]).filter(r=>r.username!==u.username);
            // FIX: purge deleted user's records from queue — prevents re-upload of deleted data on next flush
            const dq=loadQueue().filter(item=>!item.data||item.data.username!==u.username);
            saveQueue(dq);
            save(DB);syncToSheet();refresh();
          });
          btns.appendChild(vBtn);btns.appendChild(eBtn);btns.appendChild(dBtn);row.appendChild(btns);userListWrap.appendChild(row);
        });
      }

      renderUserList(window._userSearch||"");
      searchInp.addEventListener("input",()=>{window._userSearch=searchInp.value;renderUserList(searchInp.value);});

    }

    // ── RECORDS TAB ──
    if(curTab==="records"){
      const now2=new Date();
      const curMK=`${now2.getFullYear()}-${String(now2.getMonth()+1).padStart(2,"0")}`;
      const months=[...new Set(allAttend.map(r=>{const d=new Date(r.timestamp);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`}))].sort().reverse();
      if(!months.includes(curMK))months.unshift(curMK);
      if(!window._recMonth)window._recMonth=curMK;
      if(!window._recUser)window._recUser="all";
      // _recQuick: "today"|"yesterday"|"week"|"month"|null (null = use month dropdown)
      if(window._recQuick===undefined)window._recQuick="today";

      // ── Quick filter buttons ──────────────────────────────────────────────────
      const quickFilters=[
        {key:"today",     label:"📅 Today"},
        {key:"yesterday", label:"⏮ Yesterday"},
        {key:"week",      label:"📆 Last 7 Days"},
        {key:"month",     label:"🗓 This Month"},
        {key:"lastmonth", label:"🗓 Last Month"},
      ];
      const qRow=h("div",{style:{display:"flex",gap:".45rem",flexWrap:"wrap",marginBottom:".75rem"}});
      quickFilters.forEach(({key,label})=>{
        const active=window._recQuick===key;
        const qb=h("button",{style:{
          padding:".38rem .85rem",borderRadius:"8px",border:"1.5px solid "+(active?"var(--accent)":"var(--border)"),
          background:active?"var(--accent)":"transparent",color:active?"#fff":"var(--muted)",
          fontFamily:"var(--font)",fontSize:".82rem",fontWeight:active?"700":"500",cursor:"pointer",transition:"all .15s"
        }},label);
        qb.addEventListener("click",()=>{window._recQuick=key;refresh();});
        qRow.appendChild(qb);
      });
      content.appendChild(qRow);

      // ── Month + User selects (hidden when quick filter active, shown only for custom) ──
      const bar=el("div","month-bar");bar.style.display=window._recQuick?"none":"flex";
      const ml=h("label",{},"Month:");ml.style.margin="0";
      const ms=h("select",{});months.forEach(m=>{const o=h("option",{value:m},new Date(m+"-01").toLocaleString("default",{month:"long",year:"numeric"}));if(m===window._recMonth)o.selected=true;ms.appendChild(o)});
      ms.addEventListener("change",()=>{window._recMonth=ms.value;window._recQuick=null;refresh()});
      const ul=h("label",{},"\u00a0\u00a0User:");ul.style.margin="0";
      const us=h("select",{});
      [h("option",{value:"all"},"All Users"),...regularUsers.map(u=>{
        const o=h("option",{value:u.username},(u.fullName?u.fullName+" ("+u.username+")":u.username));
        if(u.username===window._recUser)o.selected=true;return o;
      })].forEach(o=>us.appendChild(o));
      us.addEventListener("change",()=>{window._recUser=us.value;refresh()});
      [ml,ms,ul,us].forEach(x=>bar.appendChild(x));

      // ── User filter row (always visible) ─────────────────────────────────────
      const uRow=h("div",{style:{display:"flex",alignItems:"center",gap:".5rem",marginBottom:"1rem",flexWrap:"wrap"}});
      const ul2=h("label",{style:{fontSize:".8rem",color:"var(--muted)",fontWeight:"700",margin:"0"}},"👤 User:");
      const us2=h("select",{style:{width:"auto",minWidth:"180px",marginBottom:"0",padding:".45rem .9rem",fontSize:".85rem"}});
      [h("option",{value:"all"},"All Users"),...regularUsers.map(u=>{
        const o=h("option",{value:u.username},(u.fullName?u.fullName+" ("+u.username+")":u.username));
        if(u.username===window._recUser)o.selected=true;return o;
      })].forEach(o=>us2.appendChild(o));
      us2.addEventListener("change",()=>{window._recUser=us2.value;refresh()});
      uRow.appendChild(ul2);uRow.appendChild(us2);
      content.appendChild(uRow);
      content.appendChild(bar);

      // ── Compute date range from quick filter ──────────────────────────────────
      const todayStart=new Date(now2.getFullYear(),now2.getMonth(),now2.getDate()).getTime();
      const todayEnd=todayStart+86400000-1;
      const ystStart=todayStart-86400000;
      const ystEnd=todayStart-1;
      const weekStart=todayStart-6*86400000;
      const monthStart=new Date(now2.getFullYear(),now2.getMonth(),1).getTime();
      const monthEnd=new Date(now2.getFullYear(),now2.getMonth()+1,0,23,59,59,999).getTime();

      const lastMonthStart=new Date(now2.getFullYear(),now2.getMonth()-1,1).getTime();
      const lastMonthEnd=new Date(now2.getFullYear(),now2.getMonth(),0,23,59,59,999).getTime();

      function inQuickRange(ts){
        if(window._recQuick==="today")     return ts>=todayStart&&ts<=todayEnd;
        if(window._recQuick==="yesterday") return ts>=ystStart&&ts<=ystEnd;
        if(window._recQuick==="week")      return ts>=weekStart&&ts<=todayEnd;
        if(window._recQuick==="month")     return ts>=monthStart&&ts<=monthEnd;
        if(window._recQuick==="lastmonth") return ts>=lastMonthStart&&ts<=lastMonthEnd;
        const d=new Date(ts);const m=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;return m===window._recMonth;
      }

      const filteredIn=allAttend.filter(r=>r.type==="in"&&inQuickRange(r.timestamp)&&(window._recUser==="all"||r.username===window._recUser));
      // Build a set of username+date keys (and also username+nextDay for overnight shifts)
      const filteredInKeys=new Set();
      filteredIn.forEach(r=>{
        const d=new Date(r.timestamp);
        filteredInKeys.add(r.username+"__"+d.toDateString());
        // Also include next calendar day in case checkout crosses midnight
        const next=new Date(d); next.setDate(next.getDate()+1);
        filteredInKeys.add(r.username+"__"+next.toDateString());
      });
      // Grab checkout records for any matching day
      const filteredOut=allAttend.filter(r=>r.type==="out"&&(window._recUser==="all"||r.username===window._recUser)&&filteredInKeys.has(r.username+"__"+new Date(r.timestamp).toDateString()));
      const filtered=[...filteredIn,...filteredOut];

      const dayMap2={};
      // First pass: build entries from check-in records
      filteredIn.forEach(r=>{
        const k=r.username+"__"+new Date(r.timestamp).toDateString();
        if(!dayMap2[k])dayMap2[k]={username:r.username,date:new Date(r.timestamp),in:null,out:null,loc:null,outLoc:null,inRec:null,outRec:null};
        if(!dayMap2[k].in||r.timestamp<dayMap2[k].in){
          dayMap2[k].in=r.timestamp;dayMap2[k].loc=r.location;dayMap2[k].inRec=r;
          // FIX: if check-in row has embedded outTimestamp/outLocation (sheet stores both in one row),
          // populate outLoc correctly with actual location data — not a bare stub
          if(r.outTimestamp&&!dayMap2[k].out){
            dayMap2[k].out=r.outTimestamp;
          }
          if(r.outLocation&&!dayMap2[k].outLoc){
            dayMap2[k].outLoc=r.outLocation;
            if(!dayMap2[k].outRec){
              // Build a proper outRec stub with actual coordinates so locCell() can render them
              dayMap2[k].outRec={
                location:r.outLocation,
                geoName:r.geoName||"",
                geoOk:r.geoOk||false,
                geoDist:r.geoDist??null
              };
            }
          }
        }
      });
      // Second pass: apply checkout records — always take the LATEST checkout per day
      // FIX: match by username+date string directly (same key format as dayMap2) so checkout
      // records for same calendar day always link correctly regardless of time
      filteredOut.forEach(r=>{
        const outDayKey=r.username+"__"+new Date(r.timestamp).toDateString();
        // Direct key match first (fastest, most reliable)
        let target=dayMap2[outDayKey]||null;
        // Fallback: scan all entries for this user in case check-in was stored under a different date key
        if(!target){
          const matchKey=Object.keys(dayMap2).find(k2=>
            k2.startsWith(r.username+"__")&&
            Math.abs(dayMap2[k2].in - r.timestamp) < 24*60*60*1000 // within 24h of check-in
          );
          target=matchKey?dayMap2[matchKey]:null;
        }
        if(!target)return; // orphan checkout with no matching check-in — skip
        if(!target.out||r.timestamp>target.out){
          target.out=r.timestamp;
          // FIX: prefer r.location (the checkout GPS point) then r.outLocation fallback
          target.outLoc=r.location||r.outLocation||null;
          target.outRec=r;
        }
      });
      const rows=Object.values(dayMap2).sort((a,b)=>b.date-a.date);

      const periodLabel=window._recQuick==="today"?"Today":window._recQuick==="yesterday"?"Yesterday":window._recQuick==="week"?"Last 7 Days":window._recQuick==="month"?now2.toLocaleString("default",{month:"long",year:"numeric"}):window._recQuick==="lastmonth"?new Date(now2.getFullYear(),now2.getMonth()-1,1).toLocaleString("default",{month:"long",year:"numeric"}):new Date(window._recMonth+"-01").toLocaleString("default",{month:"long",year:"numeric"});

      const sg=el("div","grid3",null,{marginBottom:"1.2rem"});
      const present=rows.filter(r=>r.in).length;
      const full=rows.filter(r=>r.in&&r.out).length;
      const totalMin=rows.filter(r=>r.in&&r.out).reduce((s,r)=>s+Math.round((r.out-r.in)/60000),0);
      const avg=full>0?(totalMin/full/60).toFixed(1):"—";
      [["stat-box","📋 Present · "+periodLabel,present],["stat-box gpa","Full Days",full],["stat-box rsa","Avg Hours",avg]].forEach(([cls,l,v])=>{
        const b=el("div",cls);b.innerHTML=`<div class="num">${v}</div><div class="lbl">${l}</div>`;sg.appendChild(b);
      });
      content.appendChild(sg);

      const absentRecs=(DB.absences||[]).filter(a=>{
        const aDate=new Date(a.date+"T00:00:00");
        const aTs=aDate.getTime();
        const isWeekend=aDate.getDay()===0;
        const userExists=regularUsers.find(u=>u.username===a.username);
        return userExists&&!isWeekend&&inQuickRange(aTs)&&(window._recUser==="all"||a.username===window._recUser);
      });
      if(absentRecs.length){
        const abSt=el("div","section-title","Absent Days",{marginTop:"1.2rem"});content.appendChild(abSt);
        const abWrap=h("div",{style:{background:"var(--card)",borderRadius:"12px",border:"1px solid #ff5f6d44",overflow:"hidden",marginBottom:"1rem"}});
        const abTbl=document.createElement("table");abTbl.style.cssText="width:100%;border-collapse:collapse;font-size:.85rem";
        const abHead=document.createElement("thead");abHead.innerHTML='<tr><th class="attend-th">Date</th><th class="attend-th">User</th><th class="attend-th">Status</th></tr>';
        abTbl.appendChild(abHead);
        const abBody=document.createElement("tbody");
        absentRecs.sort((a,b)=>b.date.localeCompare(a.date)).forEach((a,i)=>{
          const tr2=document.createElement("tr");if(i%2)tr2.style.background="#ffffff05";
          const uInfo=regularUsers.find(u=>u.username===a.username);
          const displayN=(uInfo&&uInfo.fullName&&uInfo.fullName.trim())?uInfo.fullName.trim():(a.username.charAt(0).toUpperCase()+a.username.slice(1).toLowerCase());
          tr2.innerHTML=`<td class="attend-td" style="font-family:var(--mono);font-size:.8rem">${a.date}</td>
            <td class="attend-td" style="font-weight:700;color:var(--accent)">${displayN}${uInfo?.designation?`<div style="font-size:.7rem;color:var(--muted)">${uInfo.designation}</div>`:""}</td>
            <td class="attend-td"><span style="padding:.2rem .6rem;border-radius:20px;font-size:.75rem;font-weight:700;background:#ff5f6d22;color:var(--danger);border:1px solid #ff5f6d44">🔴 Absent</span></td>`;
          abBody.appendChild(tr2);
        });
        abTbl.appendChild(abBody);abWrap.appendChild(abTbl);content.appendChild(abWrap);
      }

      if(!rows.length){content.appendChild(el("div","empty","No records for this filter."))}
      else{
        content.appendChild(el("div","section-title",`Attendance — ${periodLabel} · ${rows.length} records`));
        const PAGE=50;let pg=0;
        const tw=h("div",{style:{overflowX:"auto",background:"var(--card)",borderRadius:"12px",border:"1px solid var(--border)"}});
        const tbl=document.createElement("table");tbl.style.width="100%";tbl.style.borderCollapse="collapse";tbl.style.fontSize=".85rem";
        const thead=document.createElement("thead");
        const hrow=document.createElement("tr");
        ["Date","Name / ID","Check In","Check Out","⏰ Arrival","🚪 Departure","📍 In Location","📍 Out Location"].forEach(h2=>{const th=h("th",{className:"attend-th"},h2);hrow.appendChild(th)});
        thead.appendChild(hrow);tbl.appendChild(thead);
        const tbody=document.createElement("tbody");

        function renderPage(){
          tbody.innerHTML="";
          const pageRows=rows.slice(pg*PAGE,(pg+1)*PAGE);
          pageRows.forEach((r,i)=>{
            const tr2=document.createElement("tr");if(i%2)tr2.style.background="#ffffff05";
            const mins=r.in&&r.out?Math.round((r.out-r.in)/60000):null;
            const hrs=mins?`${Math.floor(mins/60)}h ${mins%60}m`:"—";
            const hrsVal=mins?mins/60:null;
            const hrsColor=!mins?"var(--muted)":hrsVal>=8?"var(--gpa)":hrsVal>=4?"var(--warn)":"var(--danger)";
            const hrsBg=!mins?"transparent":hrsVal>=8?"#38d9a922":hrsVal>=4?"#ffd16622":"#ff5f6d22";
            const hrsBorder=!mins?"transparent":hrsVal>=8?"#38d9a944":hrsVal>=4?"#ffd16644":"#ff5f6d44";
            const uInfo=regularUsers.find(u=>u.username===r.username);
            const displayN=(uInfo&&uInfo.fullName)?uInfo.fullName:r.username;
            const arr=getArrivalStatus(r.in);
            const dep=getDepartureStatus(r.out, r.in);
            const arrCell=arr?`<span class="timing-pill tp-${arr.type}">${arr.label}</span>`:"—";

// If before 9 AM, clear any today's absences that were wrongly pre-marked
// Run BEFORE markAbsences to avoid conflicting state
(function cleanEarlyAbsences(){
  const now = new Date();
  if (now.getDay() === 0) return; // Skip Sunday only (Saturday is a working day)
  // FIX: guard against running on empty/corrupt DB — no users = nothing to clean
  if (!DB || !DB.users || !DB.users.length) return;
  const nowMin = now.getHours() * 60 + now.getMinutes();
  const startMin = WORK_START_H * 60 + WORK_START_M;
  if (nowMin < startMin) {
    const todayStr = localDateStr(now);
    const before = (DB.absences||[]).length;
    // Only remove auto-marked absences, not manually-added ones
    DB.absences = (DB.absences || []).filter(a => !(a.date === todayStr && a.auto === true));
    // FIX: only save if something actually changed — avoids unnecessary write on every page load
    if(DB.absences.length !== before) save(DB);
  }
})();

document.getElementById("app").appendChild(loadDiv);
function safeRoute(){
  try{
    // Only run markAbsences at startup if no check-ins are pending in queue
    const _todayStr = localDateStr(new Date());
    const _hasQueuedIns = loadQueue().some(i =>
      i.action === "addAttendance" && i.data?.timestamp &&
      localDateStr(new Date(i.data.timestamp)) === _todayStr
    );
    if(!_hasQueuedIns) markAbsences();
    route();
  }
  catch(e){
    console.error("VIBE: startup crash",e);
    SESSION=null; clearSession();
    try{ route(); }catch(_){ document.getElementById("app").innerHTML='<div style="color:#e8eaf6;font-family:Sora,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh">App failed to load. Please refresh the page.</div>'; }
  }
}
const timeout=setTimeout(safeRoute, 5000);
(async()=>{
  try{ if(navigator.onLine) await flushQueue(); } catch(_){}
  try{
    await loadFromSheet();
    clearTimeout(timeout);
    safeRoute();
  } catch(_){
    clearTimeout(timeout);
    safeRoute();
  }
})();





if('serviceWorker' in navigator){
  const host = window.location.hostname;
  const isRealHost = window.location.protocol === 'https:'
    && host !== 'www.claudeusercontent.com'
    && host !== ''
    && host !== 'localhost';
  if(isRealHost){
    // FIX: attach FLUSH_QUEUE listener at top level BEFORE registration completes
    // so background sync events that fire early (e.g. on page load) are never missed
    navigator.serviceWorker.addEventListener('message',e=>{
      if(e.data?.type==='FLUSH_QUEUE') flushQueue();
    });
    window.addEventListener('load',()=>{
      navigator.serviceWorker.register('./sw.js')
        .then(reg=>{
          console.log('✅ VIBE SW registered');
          // Note: FLUSH_QUEUE listener already attached above — no duplicate needed

          // ── Force update check in background — never interrupt active session ──
          reg.update();

          // Track whether a controller existed BEFORE this page load
          // controllerchange on first install = no previous controller = skip reload
          const hadControllerOnLoad = !!navigator.serviceWorker.controller;

          // Do NOT activate waiting SW immediately — would fire controllerchange and reload mid-session
          // It activates on next page open naturally

          // Listen for a new SW installing — notify user, let THEM tap to reload
          reg.addEventListener('updatefound',()=>{
            const newSW=reg.installing;
            if(!newSW) return;
            newSW.addEventListener('statechange',()=>{
              if(newSW.state==='installed'&&navigator.serviceWorker.controller){
                const toast=document.createElement('div');
                toast.style.cssText='position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#4f8ef7;color:#fff;padding:.75rem 1.4rem;border-radius:12px;font-weight:700;font-size:.9rem;z-index:9999;box-shadow:0 4px 20px #00000044;display:flex;align-items:center;gap:.6rem;font-family:Sora,sans-serif;cursor:pointer';
                toast.innerHTML='🔄 Update ready — tap to refresh';
                toast.addEventListener('click',()=>{ newSW.postMessage({type:'SKIP_WAITING'}); });
                document.body.appendChild(toast);
                setTimeout(()=>toast.remove(),8000);
              }
            });
          });

          // Only reload on controllerchange if there was already a controller on load
          // Prevents first-install activation from kicking logged-in users to login screen
          let refreshing=false;
          navigator.serviceWorker.addEventListener('controllerchange',()=>{
            if(!refreshing&&hadControllerOnLoad){ refreshing=true; window.location.reload(); }
          });
        })
        .catch(e=>console.log('SW error:',e));
    });
  }
}
