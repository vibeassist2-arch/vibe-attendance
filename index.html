<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>VIBE Attendance</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0f1a;--surface:#131929;--card:#1a2236;--border:#243050;
  --accent:#4f8ef7;--accent2:#38d9a9;--danger:#ff5f6d;--warn:#ffd166;
  --policy:#a78bfa;--rsa:#fb923c;--gpa:#34d399;
  --text:#e8eaf6;--muted:#7a8bad;
  --font:'Sora',sans-serif;--mono:'JetBrains Mono',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;
  background-image:radial-gradient(ellipse at 20% 50%,#1a2a5e22 0%,transparent 60%),
                   radial-gradient(ellipse at 80% 20%,#0d3b2e22 0%,transparent 50%);}
.hidden{display:none!important}
.page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2.5rem;width:100%;max-width:420px;box-shadow:0 8px 40px #00000055;animation:slideUp .4s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
h1{font-size:1.7rem;font-weight:700;margin-bottom:.25rem}
h2{font-size:1.3rem;font-weight:600;margin-bottom:1.2rem}
.subtitle{color:var(--muted);font-size:.85rem;margin-bottom:2rem}
label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:.4rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
input,select{width:100%;padding:.75rem 1rem;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--font);font-size:.95rem;margin-bottom:1.2rem;outline:none;transition:border-color .2s}
input:focus,select:focus{border-color:var(--accent)}
select option{background:var(--surface);color:var(--text)}
.btn{width:100%;padding:.85rem;border:none;border-radius:10px;font-family:var(--font);font-size:.95rem;font-weight:600;cursor:pointer;transition:opacity .2s,transform .1s;margin-top:.3rem}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#fff}
.btn-success{background:var(--accent2);color:#0b1a14}
.btn-danger{background:var(--danger);color:#fff}
.btn-ghost{background:var(--border);color:var(--text)}
.btn-sm{width:auto;padding:.45rem .9rem;font-size:.82rem}
.btn-policy{background:var(--policy);color:#fff}
.btn-rsa{background:var(--rsa);color:#fff}
.btn-gpa{background:var(--gpa);color:#0b1a14}
.alert{padding:.8rem 1rem;border-radius:10px;font-size:.87rem;margin-bottom:1.2rem;line-height:1.5}
.alert-error{background:#ff5f6d22;border:1px solid #ff5f6d66;color:#ff9aa2}
.alert-success{background:#38d9a922;border:1px solid #38d9a966;color:#70efcd}
.alert-warn{background:#ffd16622;border:1px solid #ffd16666;color:#ffe08a}
.dash{min-height:100vh;display:flex;flex-direction:column}
.vibe-header{background:#fff;border-bottom:3px solid #e5e7eb;padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.vibe-logo-text{font-family:var(--font);font-weight:900;font-size:2rem;letter-spacing:-.02em;line-height:1}
.vibe-tagline{font-size:.55rem;font-weight:700;letter-spacing:.12em;color:#64748b;text-transform:uppercase;margin-top:2px}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.topbar-brand{font-weight:700;font-size:1.1rem}
.topbar-right{display:flex;align-items:center;gap:.75rem}
.badge{background:var(--accent);color:#fff;font-size:.7rem;padding:.2rem .55rem;border-radius:20px;font-weight:600}
.badge-green{background:var(--accent2);color:#0b1a14}
.content{padding:1.5rem;flex:1;max-width:960px;width:100%;margin:0 auto}
.section-title{font-size:.75rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem;margin-top:1.5rem}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.8rem}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem}
.stat-box .num{font-size:1.8rem;font-weight:700;font-family:var(--mono);color:var(--accent)}
.stat-box .lbl{font-size:.78rem;color:var(--muted);margin-top:.2rem}
.stat-box.policy .num{color:var(--policy)}
.stat-box.rsa .num{color:var(--rsa)}
.stat-box.gpa .num{color:var(--gpa)}
.home-card{background:#fff;border-radius:14px;border:2px solid #e5e7eb;padding:1.4rem 1.5rem;box-shadow:0 2px 12px #0000000a}
.home-card .big-num{font-size:2.4rem;font-weight:900;font-family:var(--mono)}
.home-card .card-label{font-size:.82rem;font-weight:700;color:#374151;margin-top:.25rem;text-transform:uppercase;letter-spacing:.06em}
.name-pill{display:inline-block;font-size:.7rem;padding:.15rem .5rem;border-radius:20px;font-weight:600;margin:.15rem .1rem}
.home-nav-btn{padding:.6rem 1.3rem;border-radius:10px;border:none;font-family:var(--font);font-size:.88rem;font-weight:700;cursor:pointer;transition:all .18s}
.record-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem 1.2rem;margin-bottom:.6rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;font-size:.88rem}
.record-card .rec-time{font-family:var(--mono);color:var(--accent);font-size:.82rem}
.record-card .rec-loc{color:var(--muted);font-size:.78rem;margin-top:.15rem}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-in{background:var(--accent2);box-shadow:0 0 6px var(--accent2)}
.dot-out{background:var(--danger);box-shadow:0 0 6px var(--danger)}
.user-row{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:.9rem 1.2rem;margin-bottom:.5rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem}
.user-row .uname{font-weight:600;font-size:.9rem}
.user-row .urole{font-size:.75rem;color:var(--muted)}
.empty{text-align:center;color:var(--muted);padding:2rem;font-size:.9rem}
.tabs{display:flex;gap:.5rem;margin-bottom:1.5rem;flex-wrap:wrap}
.tab{padding:.5rem 1rem;border-radius:8px;background:transparent;border:1.5px solid var(--border);color:var(--muted);font-family:var(--font);font-size:.85rem;cursor:pointer;transition:all .2s}
.tab.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.modal-overlay{position:fixed;inset:0;background:#00000099;backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2rem;width:100%;max-width:480px;box-shadow:0 24px 80px #00000088;animation:slideUp .3s ease;max-height:90vh;overflow-y:auto;position:relative}
.modal h2{margin-bottom:.5rem;font-size:1.25rem}
.modal .sub{color:var(--muted);font-size:.85rem;margin-bottom:1.5rem}
.q-label{font-size:.82rem;font-weight:700;margin-bottom:.6rem;padding:.35rem .75rem;border-radius:6px;display:inline-block;letter-spacing:.03em}
.q-policy{background:#a78bfa22;color:var(--policy);border:1px solid #a78bfa44}
.q-rsa{background:#fb923c22;color:var(--rsa);border:1px solid #fb923c44}
.q-gpa{background:#34d39922;color:var(--gpa);border:1px solid #34d39944}
.month-table{width:100%;border-collapse:collapse;font-size:.83rem}
.month-table th{text-align:left;padding:.6rem .9rem;background:var(--surface);color:var(--muted);font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;border-bottom:1px solid var(--border)}
.month-table td{padding:.65rem .9rem;border-bottom:1px solid #1e2a3f;vertical-align:middle}
.month-table tr:last-child td{border-bottom:none}
.month-table tr:hover td{background:#1e2a3f55}
.pill{display:inline-block;padding:.2rem .55rem;border-radius:20px;font-size:.72rem;font-weight:700;font-family:var(--mono)}
.pill-yes{background:#38d9a922;color:var(--gpa);border:1px solid #38d9a944}
.pill-no{background:#ff5f6d22;color:var(--danger);border:1px solid #ff5f6d44}
.pill-pend{background:#ffd16622;color:var(--warn);border:1px solid #ffd16644}
.dl-card{border:1px solid var(--border);border-radius:14px;padding:1.2rem 1.4rem;background:var(--card);display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:.7rem}
.dl-card .dl-name{font-weight:700;font-size:.95rem}
.dl-card .dl-count{font-size:.78rem;color:var(--muted);margin-top:.15rem}
.month-bar{display:flex;gap:.75rem;align-items:center;margin-bottom:1.2rem;flex-wrap:wrap}
.month-bar select{margin-bottom:0;width:auto;min-width:160px}
.month-bar label{margin:0;text-transform:none;font-size:.85rem}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid #ffffff44;border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:.5rem}
@keyframes spin{to{transform:rotate(360deg)}}
.x-btn{position:absolute;top:1.1rem;right:1.2rem;background:var(--border);border:none;color:var(--muted);border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;transition:background .15s,color .15s}
.x-btn:hover{background:var(--danger);color:#fff}
.attend-th{text-align:left;padding:.75rem 1rem;background:#1e2d4a;color:#e8eaf6;font-weight:700;font-size:.8rem;letter-spacing:.04em;border-bottom:2px solid var(--accent);white-space:nowrap}
.attend-td{padding:.7rem 1rem;border-bottom:1px solid #1e2a3f;vertical-align:middle}

/* ── NEW: Create User card styling ── */
.create-user-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.8rem;margin-bottom:1.5rem}
.create-user-card h2{font-size:1.1rem;margin-bottom:1.4rem;display:flex;align-items:center;gap:.5rem}
.field-group{margin-bottom:1.1rem}
.field-group label{font-size:.72rem;color:var(--muted);font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:.35rem;display:flex;align-items:center;gap:.4rem}
.field-group label .field-icon{font-size:.9rem}
.field-group input{margin-bottom:0;padding:.7rem 1rem}
.field-step{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:var(--accent);color:#fff;font-size:.65rem;font-weight:700;flex-shrink:0}

@media(max-width:600px){.grid2,.grid3{grid-template-columns:1fr}.home-cards{grid-template-columns:1fr!important}}
</style>
</head>
<body>

<div id="app"></div>

<script>
const KEY = "vibeAttendanceData";
let SCRIPT_URL = "https://script.google.com/macros/s/AKfycby23p4CGlRYA3Uxy1xhnTrRMzHIKV_vEOf7lflKxlSBSshhEKFszyy9XIdA3s1SIhPc/exec";
localStorage.setItem("vibeScriptUrl", SCRIPT_URL);

async function gsFetch(params) {
  if (!SCRIPT_URL) return null;
  try {
    const res = await fetch(SCRIPT_URL + "?" + new URLSearchParams(params), { method: "GET", redirect: "follow" });
    return JSON.parse(await res.text());
  } catch(e) { console.error("GS GET error", e); return null; }
}
async function gsPost(body) {
  if (!SCRIPT_URL) return null;
  try {
    const res = await fetch(SCRIPT_URL, { method: "POST", redirect: "follow", headers: { "Content-Type": "text/plain" }, body: JSON.stringify(body) });
    return JSON.parse(await res.text());
  } catch(e) { console.error("GS POST error", e); return null; }
}

function markAbsences() {
  const today = new Date();
  const todayStr = localDateStr(today);
  if (today.getDay() === 0) return;
  if (!DB.absences) DB.absences = [];
  const regularUsers = DB.users.filter(u => u.role !== "admin");
  regularUsers.forEach(u => {
    const checkedIn = DB.attendance.find(r => r.username === u.username && r.type === "in" && localDateStr(new Date(r.timestamp)) === todayStr);
    if (checkedIn) {
      DB.absences = DB.absences.filter(a => !(a.username === u.username && a.date === todayStr));
    } else {
      if (!DB.absences.find(a => a.username === u.username && a.date === todayStr)) {
        DB.absences.push({ id: Date.now() + Math.random(), username: u.username, date: todayStr, auto: true });
      }
    }
  });
  save(DB);
}

setInterval(markAbsences, 60000);

let autoSyncInterval = null;
function startAutoSync() {
  if (autoSyncInterval) clearInterval(autoSyncInterval);
  autoSyncInterval = setInterval(async () => {
    if (SESSION && SCRIPT_URL) {
      await loadFromSheet();
      if (SESSION.role === "admin") renderAdmin();
      else renderUser();
    }
  }, 5 * 60 * 1000);
}

async function syncToSheet() {
  if (!SCRIPT_URL) return;
  return await gsPost({ action:"fullSync", data: DB });
}

async function loadFromSheet() {
  if (!SCRIPT_URL) return false;
  try {
    const result = await gsFetch({ action:"getAll" });
    if (!result || !result.ok) return false;

    const sheetUsers = (result.users||[]).map(u => ({
      username: String(u.username||"").trim(),
      password: String(u.password||"").trim(),
      fullName: (u.fullName||u.full_name||u.FullName||u.name||"").trim(),
      userId: (u.userId||u.user_id||u.UserId||u.username||"").trim(),
      designation: u.designation||"",
      location: u.location||"",
      role: u.role||"user"
    })).filter(u => u.username);

    if (sheetUsers.length) {
      const localAdmins = DB.users.filter(u => u.role === "admin" && !sheetUsers.find(s => s.username === u.username));
      DB.users = [...sheetUsers, ...localAdmins];
    }

    const sheetAttend = (result.attendance||[]).map(r => {
      const lat = parseFloat(r.lat), lng = parseFloat(r.lng);
      const outLat = parseFloat(r.outLat), outLng = parseFloat(r.outLng);
      const validLoc = (r.lat && r.lng && lat >= -90 && lat <= 90 && lng >= -180 && lng <= 180) ? {lat, lng} : null;
      const validOutLoc = (r.outLat && r.outLng && outLat >= -90 && outLat <= 90 && outLng >= -180 && outLng <= 180) ? {lat: outLat, lng: outLng} : null;
      return { id: r.id, username: r.username, type: r.type, timestamp: parseInt(r.timestamp)||0, location: validLoc, outLocation: validOutLoc };
    }).filter(r => r.username && r.timestamp);
    DB.attendance = sheetAttend;

    const sheetSurveys = (result.surveys||[]).map(s => {
      const ts = parseInt(s.timestamp)||0;
      let d = ts ? localDateStr(new Date(ts)) : (s.date || "").slice(0,10);
      return { id: s.id, username: s.username, date: d, timestamp: ts, policy: s.policy||0, rsa: s.rsa||0, gpa: s.gpa||0 };
    }).filter(s => s.username);

    const surveyMap = {};
    sheetSurveys.forEach(s => {
      const key = s.username + "__" + s.date;
      const existing = surveyMap[key];
      if (!existing) { surveyMap[key] = s; }
      else {
        const existTotal = (parseInt(existing.policy)||0) + (parseInt(existing.rsa)||0) + (parseInt(existing.gpa)||0);
        const newTotal = (parseInt(s.policy)||0) + (parseInt(s.rsa)||0) + (parseInt(s.gpa)||0);
        if (newTotal > existTotal || (newTotal === existTotal && s.timestamp > existing.timestamp)) surveyMap[key] = s;
      }
    });
    DB.surveys = Object.values(surveyMap);
    save(DB);
    return true;
  } catch(e) { console.error("loadFromSheet error:", e); return false; }
}

function loadData(){try{const r=localStorage.getItem(KEY);if(!r)return def();return JSON.parse(r)}catch{return def()}}
function def(){return{users:[{username:"admin",password:"admin123",role:"admin"}],attendance:[],surveys:[],absences:[]}}
function save(d){try{localStorage.setItem(KEY,JSON.stringify(d))}catch(e){}}
function localDateStr(date){const d=date||new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}
function localMonthStr(date){const d=date||new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`}

let DB = loadData();
let SESSION = null;

function getLocation(){
  return new Promise((res,rej)=>{
    if(!navigator.geolocation){rej("Geolocation not supported.");return}
    navigator.geolocation.getCurrentPosition(
      p=>{const lat=p.coords.latitude,lng=p.coords.longitude;if(lat<-90||lat>90||lng<-180||lng>180){rej("Invalid location received.");return}res({lat,lng});},
      e=>{if(e.code===1)rej("Location denied. Please allow location.");else if(e.code===2)rej("Location unavailable.");else rej("Location timed out.");},
      {timeout:10000,enableHighAccuracy:true}
    );
  });
}
function exportCSV(rows,filename){
  if(!rows||!rows.length){alert("No data.");return}
  const keys=Object.keys(rows[0]);
  const body=rows.map(r=>keys.map(k=>{const v=r[k]==null?"":String(r[k]);return v.includes(",")||v.includes('"')?`"${v.replace(/"/g,'""')}"`:`${v}`}).join(",")).join("\n");
  const blob=new Blob([keys.join(",")+"\n"+body],{type:"text/csv"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=filename;a.click();
}
function h(tag,attrs,children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object"){Object.assign(el.style,v)}
    else if(k.startsWith("on")&&typeof v==="function"){el.addEventListener(k.slice(2).toLowerCase(),v)}
    else if(k==="className"){el.className=v}
    else if(k==="htmlFor"){el.htmlFor=v}
    else{el.setAttribute(k,v)}
  });
  if(children){(Array.isArray(children)?children:[children]).forEach(c=>{
    if(c==null||c===false||c===undefined)return;
    el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
  })}
  return el;
}
function el(tag,cls,children,style){return h(tag,{className:cls,...(style?{style}:{})},children)}
function render(node){const app=document.getElementById("app");app.innerHTML="";app.appendChild(node)}

function route(){
  if(!SESSION){if(autoSyncInterval){clearInterval(autoSyncInterval);autoSyncInterval=null;}renderLogin();return;}
  startAutoSync();
  if(SESSION.role==="admin"){renderAdmin();return}
  renderUser();
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function renderLogin(){
  const wrap=el("div","page");
  const card=el("div","card");
  const logo=h("div",{style:{marginBottom:"1rem"}});
  logo.innerHTML=`
    <div style="font-family:'Sora',sans-serif;font-weight:900;font-size:3rem;letter-spacing:-.02em;line-height:1">
      <span style="color:#e63329">V</span><span style="color:#f5a623">I</span><span style="color:#2563eb">B</span><span style="color:#16a34a">E</span>
    </div>
    <div style="font-size:.85rem;font-weight:700;letter-spacing:.18em;color:#94a3b8;text-transform:uppercase;margin-top:.2rem;text-align:center">Attendance</div>
  `;
  const sub=el("div","subtitle","Sign in to mark your attendance");
  const errBox=el("div","alert alert-error hidden","");
  const lbU=h("label",{},"Username");
  const inU=h("input",{type:"text",placeholder:"Enter username",autocomplete:"username"});
  const lbP=h("label",{},"Password");
  const pwWrap=h("div",{style:{position:"relative",marginBottom:"1.2rem"}});
  const inP=h("input",{type:"password",placeholder:"Enter password",autocomplete:"current-password"});
  inP.style.marginBottom="0";inP.style.paddingRight="3rem";
  const eyeBtn=h("button",{type:"button",style:{position:"absolute",right:".75rem",top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:"var(--muted)",fontSize:"1.1rem",padding:"0",lineHeight:"1"}},"👁");
  let pwVisible=false;
  eyeBtn.addEventListener("click",()=>{pwVisible=!pwVisible;inP.type=pwVisible?"text":"password";eyeBtn.textContent=pwVisible?"🙈":"👁"});
  pwWrap.appendChild(inP);pwWrap.appendChild(eyeBtn);
  const locWarn=el("div","alert alert-warn hidden","📍 Please click Allow when location permission appears.");
  const btn=h("button",{className:"btn btn-primary"},"Sign In");

  function doLogin(){
    const u=inU.value.trim(),p=inP.value.trim();
    errBox.classList.add("hidden");
    if(!u||!p){errBox.textContent="Please enter username and password.";errBox.classList.remove("hidden");return}
    const localFound=DB.users.find(x=>x.username===u&&x.password===p);
    if(!localFound){
      btn.disabled=true;btn.textContent="Verifying…";
      loadFromSheet().then(()=>{
        const found2=DB.users.find(x=>x.username===u&&x.password===p);
        if(!found2){errBox.textContent="Incorrect username or password.";errBox.classList.remove("hidden");btn.disabled=false;btn.textContent="Sign In";return}
        proceedLogin(found2,u,p);
      }).catch(()=>{errBox.textContent="Incorrect username or password.";errBox.classList.remove("hidden");btn.disabled=false;btn.textContent="Sign In";});
      return;
    }
    proceedLogin(localFound,u,p);
  }

  function proceedLogin(found){
    if(found.role==="admin"){
      btn.disabled=true;btn.textContent="Syncing data…";
      loadFromSheet().finally(()=>{const u2=DB.users.find(x=>x.username===found.username)||found;SESSION={username:u2.username,fullName:u2.fullName&&u2.fullName.trim()?u2.fullName.trim():u2.username,role:"admin"};route();});
      return;
    }
    btn.disabled=true;btn.textContent="Syncing data…";locWarn.classList.remove("hidden");
    loadFromSheet().finally(()=>{
      btn.textContent="Getting location…";
      getLocation().then(loc=>{const u2=DB.users.find(x=>x.username===found.username)||found;const fn=u2.fullName&&u2.fullName.trim()?u2.fullName.trim():u2.username.charAt(0).toUpperCase()+u2.username.slice(1).toLowerCase();SESSION={username:u2.username,fullName:fn,role:"user",location:loc};route();})
        .catch(msg=>{errBox.textContent=msg;errBox.classList.remove("hidden");btn.disabled=false;btn.textContent="Sign In";locWarn.classList.add("hidden");});
    });
  }
  btn.addEventListener("click",doLogin);
  [inU,inP].forEach(i=>i.addEventListener("keydown",e=>{if(e.key==="Enter")doLogin()}));
  [logo,sub,errBox,lbU,inU,lbP,pwWrap,btn,locWarn].forEach(x=>card.appendChild(x));
  wrap.appendChild(card);render(wrap);
}

// ── CHECKOUT SURVEY ───────────────────────────────────────────────────────────
function showSurvey(onSubmit){
  const overlay=el("div","modal-overlay");
  const modal=el("div","modal");
  const xBtn=h("button",{className:"x-btn"},"✕");
  xBtn.addEventListener("click",()=>overlay.remove());
  const title=h("h2",{},"Checking out, "+(SESSION.fullName||SESSION.username)+"!");
  const sub=el("div","sub","Enter today's counts before checking out");
  function field(lbl,cls,placeholder){
    const wrap=h("div",{style:{marginBottom:"1.2rem"}});
    const ql=el("div","q-label "+cls,lbl);
    const inp=h("input",{type:"number",min:"0",placeholder});
    inp.style.marginBottom="0";
    wrap.appendChild(ql);wrap.appendChild(inp);
    return{wrap,inp};
  }
  const {wrap:w1,inp:i1}=field("📜 Today's Policy Count","q-policy","e.g. 5");
  const {wrap:w2,inp:i2}=field("🔐 Today's RSA Count","q-rsa","e.g. 3");
  const {wrap:w3,inp:i3}=field("🎓 Today's GPA Count","q-gpa","e.g. 2");
  const submitBtn=h("button",{className:"btn btn-primary",disabled:true,style:{marginTop:".5rem"}},"Please fill all 3 fields");
  function checkFill(){
    const ok=i1.value!==""&&i2.value!==""&&i3.value!=="";
    submitBtn.disabled=!ok;submitBtn.textContent=ok?"✓ Submit & Check Out":"Please fill all 3 fields";
  }
  [i1,i2,i3].forEach(i=>i.addEventListener("input",checkFill));
  submitBtn.addEventListener("click",()=>{onSubmit({policy:i1.value,rsa:i2.value,gpa:i3.value});overlay.remove();});
  [xBtn,title,sub,w1,w2,w3,submitBtn].forEach(x=>modal.appendChild(x));
  overlay.appendChild(modal);document.body.appendChild(overlay);
}

// ── USER DASH ─────────────────────────────────────────────────────────────────
function renderUser(){
  const myRecs=()=>DB.attendance.filter(r=>r.username===SESSION.username).sort((a,b)=>b.timestamp-a.timestamp);
  const todayStr=new Date().toDateString();
  const todayRecs=()=>myRecs().filter(r=>new Date(r.timestamp).toDateString()===todayStr);
  const isIn=()=>{const t=todayRecs();return t.length>0&&t[0].type==="in"};
  const dash=el("div","dash");
  const tb=el("div","topbar");
  tb.appendChild(el("div","topbar-brand","📋 AttendanceVibe"));
  const tbR=el("div","topbar-right");
  // Show full name if available
  const meUser = DB.users.find(u => u.username === SESSION.username);
  // Show fullName if set, otherwise show username styled nicely
  const displayName = SESSION.fullName && SESSION.fullName.trim() ? SESSION.fullName.trim() : (meUser && meUser.fullName && meUser.fullName.trim() ? meUser.fullName.trim() : SESSION.username);
  tbR.appendChild(document.createTextNode(displayName+" "));
  tbR.appendChild(el("span","badge badge-green","User"));
  const soBtn=h("button",{className:"btn btn-ghost btn-sm",style:{marginLeft:".5rem"}},"Sign Out");
  soBtn.addEventListener("click",()=>{SESSION=null;route()});
  const refBtn=h("button",{className:"btn btn-ghost btn-sm"},"🔄 Refresh");
  refBtn.addEventListener("click",async()=>{
    refBtn.disabled=true;refBtn.textContent="⏳ Syncing…";
    await loadFromSheet();
    const u2r=DB.users.find(x=>x.username===SESSION.username);if(u2r&&u2r.fullName&&u2r.fullName.trim())SESSION.fullName=u2r.fullName.trim();
    refBtn.textContent="✅ Done";
    setTimeout(()=>{refBtn.textContent="🔄 Refresh";refBtn.disabled=false;},2000);
    refresh();
  });
  tbR.appendChild(refBtn);tbR.appendChild(soBtn);
  tb.appendChild(tbR);dash.appendChild(tb);
  const content=el("div","content");
  dash.appendChild(content);
  let curTab="today";
  const now=new Date();
  const curMonthKey=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
  let selMonth=curMonthKey;

  function refresh(){
    content.innerHTML="";
    const allRecs=myRecs();
    const totalDays=[...new Set(allRecs.filter(r=>r.type==="in").map(r=>new Date(r.timestamp).toDateString()))].length;
    const nowS=new Date();
    const curMKS=`${nowS.getFullYear()}-${String(nowS.getMonth()+1).padStart(2,"0")}`;
    const mySurveys=(DB.surveys||[]).filter(s=>s.username===SESSION.username);
    const normD=d=>{if(!d)return"";const s=String(d);return s.includes("T")?s.slice(0,10):s.slice(0,10);}
    const monthSurveysU=mySurveys.filter(s=>normD(s.date).startsWith(curMKS));
    const monthPolicyU=monthSurveysU.reduce((s,r)=>s+(parseInt(r.policy)||0),0);
    const monthRsaU=monthSurveysU.reduce((s,r)=>s+(parseInt(r.rsa)||0),0);
    const monthGpaU=monthSurveysU.reduce((s,r)=>s+(parseInt(r.gpa)||0),0);
    const absentDays=(DB.absences||[]).filter(a=>a.username===SESSION.username&&a.date&&a.date.startsWith(curMKS)).length;
    const monthLblU=nowS.toLocaleString("default",{month:"long",year:"numeric"});

    const grid=el("div","grid2",null,{marginBottom:".8rem"});
    const b1=el("div","stat-box");b1.innerHTML=`<div class="num" style="color:var(--accent2)">${totalDays}</div><div class="lbl">Total Present</div>`;
    const b2=el("div","stat-box");b2.innerHTML=`<div class="num" style="color:var(--danger)">${absentDays}</div><div class="lbl">Absent (${monthLblU})</div>`;
    grid.appendChild(b1);grid.appendChild(b2);content.appendChild(grid);

    const grid2=el("div","grid3",null,{marginBottom:"1.5rem"});
    const bp=el("div","stat-box policy");bp.innerHTML=`<div class="num">${monthPolicyU}</div><div class="lbl">📜 ${monthLblU} Policy</div>`;
    const br=el("div","stat-box rsa");br.innerHTML=`<div class="num">${monthRsaU}</div><div class="lbl">🔐 ${monthLblU} RSA</div>`;
    const bg=el("div","stat-box gpa");bg.innerHTML=`<div class="num">${monthGpaU}</div><div class="lbl">🎓 ${monthLblU} GPA</div>`;
    grid2.appendChild(bp);grid2.appendChild(br);grid2.appendChild(bg);content.appendChild(grid2);

    const tabs=el("div","tabs");
    ["today","monthly"].forEach(t=>{
      const btn=h("button",{className:"tab"+(curTab===t?" active":"")},t==="today"?"📅 Today":"📊 Monthly Data");
      btn.addEventListener("click",()=>{curTab=t;refresh()});
      tabs.appendChild(btn);
    });
    content.appendChild(tabs);

    if(curTab==="today"){
      const checkedIn=isIn();
      const mainBtn=h("button",{className:"btn "+(checkedIn?"btn-danger":"btn-success")},checkedIn?"⏹ Check Out":"▶ Check In");
      mainBtn.addEventListener("click",()=>{
        if(checkedIn){
          showSurvey(answers=>{
            const todayCheckins=DB.attendance.filter(r=>r.username===SESSION.username&&r.type==="in"&&new Date(r.timestamp).toDateString()===new Date().toDateString());
            const checkInTs=todayCheckins.length?Math.min(...todayCheckins.map(r=>r.timestamp)):Date.now();
            const surveyDate=localDateStr(new Date(checkInTs));
            const sur={id:Date.now(),username:SESSION.username,timestamp:Date.now(),date:surveyDate,...answers};
            DB.surveys.push(sur);gsPost({action:"addSurvey",data:sur});save(DB);
            getLocation().then(loc=>{
              const rec_out={id:Date.now(),username:SESSION.username,type:"out",timestamp:Date.now(),location:loc};
              DB.attendance.push(rec_out);save(DB);
              gsPost({action:"addAttendance",data:{...rec_out,lat:loc?.lat||"",lng:loc?.lng||""}});refresh();
            }).catch(()=>{
              const rec_outn={id:Date.now(),username:SESSION.username,type:"out",timestamp:Date.now(),location:null};
              DB.attendance.push(rec_outn);save(DB);
              gsPost({action:"addAttendance",data:{...rec_outn,lat:"",lng:""}});refresh();
            });
          });
        } else {
          mainBtn.disabled=true;mainBtn.innerHTML='<span class="spinner"></span>Getting location…';
          getLocation().then(loc=>{
            const rec_in={id:Date.now(),username:SESSION.username,type:"in",timestamp:Date.now(),location:loc};
            DB.attendance.push(rec_in);save(DB);
            gsPost({action:"addAttendance",data:{...rec_in,lat:loc?.lat||"",lng:loc?.lng||""}});refresh();
          }).catch(msg=>{mainBtn.disabled=false;mainBtn.textContent="▶ Check In";alert(msg)});
        }
      });
      content.appendChild(mainBtn);
      const st=el("div","section-title","Today's Activity",{marginTop:"2rem"});
      content.appendChild(st);
      const tr=todayRecs();
      if(!tr.length){content.appendChild(el("div","empty","No records today. Check in to get started!"))}
      else tr.forEach(r=>{
        const rc=el("div","record-card");
        const dot=el("span","status-dot "+(r.type==="in"?"dot-in":"dot-out"));
        const info=h("div",{style:{flex:1}});
        info.appendChild(document.createTextNode(r.type==="in"?"Checked In":"Checked Out"));
        const loc=el("div","rec-loc",r.location?`📍 ${r.location.lat.toFixed(4)}, ${r.location.lng.toFixed(4)}`:"No location");
        info.appendChild(loc);
        const time=el("div","rec-time",new Date(r.timestamp).toLocaleTimeString());
        rc.appendChild(dot);rc.appendChild(info);rc.appendChild(time);content.appendChild(rc);
      });
    } else {
      const allM=[...new Set(myRecs().map(r=>{const d=new Date(r.timestamp);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`}))].sort().reverse();
      if(!allM.includes(curMonthKey))allM.unshift(curMonthKey);
      const bar=el("div","month-bar");
      const lbl=h("label",{},"Month:");lbl.style.margin="0";
      const sel=h("select",{});
      allM.forEach(m=>{const o=h("option",{value:m},new Date(m+"-01").toLocaleString("default",{month:"long",year:"numeric"}));if(m===selMonth)o.selected=true;sel.appendChild(o)});
      sel.addEventListener("change",()=>{selMonth=sel.value;refresh()});
      bar.appendChild(lbl);bar.appendChild(sel);content.appendChild(bar);

      const mRecs=myRecs().filter(r=>{const d=new Date(r.timestamp);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`===selMonth});
      const mSurveys=(DB.surveys||[]).filter(s=>s.username===SESSION.username&&s.date&&s.date.startsWith(selMonth));
      const g3=el("div","grid3",null,{marginBottom:"1.2rem"});
      const policySum=mSurveys.reduce((s,r)=>s+(parseInt(r.policy)||0),0);
      const rsaSum=mSurveys.reduce((s,r)=>s+(parseInt(r.rsa)||0),0);
      const gpaSum=mSurveys.reduce((s,r)=>s+(parseInt(r.gpa)||0),0);
      [["policy","📜 Policy",policySum],["rsa","🔐 RSA",rsaSum],["gpa","🎓 GPA",gpaSum]].forEach(([cls,lbl,v])=>{
        const b=el("div","stat-box "+cls);b.innerHTML=`<div class="num">${v}</div><div class="lbl">${lbl} Total</div>`;g3.appendChild(b);
      });
      content.appendChild(g3);

      const dayMap={};
      mRecs.forEach(r=>{const k=new Date(r.timestamp).toDateString();if(!dayMap[k])dayMap[k]={date:new Date(r.timestamp),in:null,out:null,loc:null};
        if(r.type==="in"&&(!dayMap[k].in||r.timestamp<dayMap[k].in)){dayMap[k].in=r.timestamp;dayMap[k].loc=r.location}
        if(r.type==="out"&&(!dayMap[k].out||r.timestamp>dayMap[k].out))dayMap[k].out=r.timestamp;
      });
      const days=Object.values(dayMap).sort((a,b)=>b.date-a.date);
      const st1=el("div","section-title",`Attendance — ${new Date(selMonth+"-01").toLocaleString("default",{month:"long",year:"numeric"})}`);
      content.appendChild(st1);
      if(!days.length){content.appendChild(el("div","empty","No attendance for this month."))}
      else{
        const tw=h("div",{style:{overflowX:"auto",background:"var(--card)",borderRadius:"12px",border:"1px solid var(--border)"}});
        const tbl=el("table","month-table");
        tbl.innerHTML=`<thead><tr><th>Date</th><th>Check In</th><th>Check Out</th><th>Hours</th></tr></thead>`;
        const tb2=document.createElement("tbody");
        days.forEach(d=>{
          const tr2=document.createElement("tr");
          const mins=d.in&&d.out?Math.round((d.out-d.in)/60000):null;
          const hrs=mins?`${Math.floor(mins/60)}h ${mins%60}m`:"—";
          tr2.innerHTML=`<td style="font-family:var(--mono);font-size:.8rem">${d.date.toLocaleDateString("en-GB",{weekday:"short",day:"2-digit",month:"short"})}</td>
            <td style="color:var(--accent2);font-family:var(--mono);font-size:.82rem">${d.in?new Date(d.in).toLocaleTimeString([],({"hour":"2-digit","minute":"2-digit"})):"—"}</td>
            <td style="color:var(--danger);font-family:var(--mono);font-size:.82rem">${d.out?new Date(d.out).toLocaleTimeString([],({"hour":"2-digit","minute":"2-digit"})):"—"}</td>
            <td style="font-family:var(--mono);font-size:.82rem;color:var(--warn)">${hrs}</td>`;
          tb2.appendChild(tr2);
        });
        tbl.appendChild(tb2);tw.appendChild(tbl);content.appendChild(tw);
      }

      if(mSurveys.length){
        const st2=el("div","section-title","Survey Responses");content.appendChild(st2);
        const tw2=h("div",{style:{overflowX:"auto",background:"var(--card)",borderRadius:"12px",border:"1px solid var(--border)"}});
        const tbl2=el("table","month-table");
        tbl2.innerHTML=`<thead><tr><th>Date</th><th>📜 Policy</th><th>🔐 RSA</th><th>🎓 GPA</th></tr></thead>`;
        const tb3=document.createElement("tbody");
        [...mSurveys].sort((a,b)=>b.timestamp-a.timestamp).forEach(s=>{
          const tr3=document.createElement("tr");
          tr3.innerHTML=`<td style="font-family:var(--mono);font-size:.8rem">${s.date}</td>
            <td><span class="pill pill-pend">${s.policy||"—"}</span></td>
            <td><span class="pill pill-yes">${s.rsa||"—"}</span></td>
            <td><span class="pill pill-pend">${s.gpa||"—"}</span></td>`;
          tb3.appendChild(tr3);
        });
        tbl2.appendChild(tb3);tw2.appendChild(tbl2);content.appendChild(tw2);
      }
    }
  }
  refresh();render(dash);
}

function openSurveyEditModal(survey, onSave) {
  const ov=el("div","modal-overlay");
  const mo=el("div","modal",null,{maxWidth:"420px"});
  const xb=h("button",{className:"x-btn"},"✕");xb.addEventListener("click",()=>ov.remove());
  mo.appendChild(xb);
  mo.appendChild(h("div",{style:{fontSize:"1.5rem",marginBottom:".4rem"}},"✏️"));
  mo.appendChild(h("h2",{},"Edit Survey Entry"));
  const sub=el("div","sub","");
  sub.innerHTML=`User: <strong>${survey.username}</strong> &nbsp;·&nbsp; Date: <strong>${survey.date}</strong>`;
  mo.appendChild(sub);
  function numField(labelTxt, cls, val) {
    const wrap=h("div",{style:{marginBottom:"1.2rem"}});
    const ql=el("div","q-label "+cls,labelTxt);
    const inp=h("input",{type:"number",min:"0",value:val});
    inp.style.marginBottom="0";wrap.appendChild(ql);wrap.appendChild(inp);
    return {wrap,inp};
  }
  const {wrap:w1,inp:i1}=numField("📜 Policy Count","q-policy",survey.policy||0);
  const {wrap:w2,inp:i2}=numField("🔐 RSA Count","q-rsa",survey.rsa||0);
  const {wrap:w3,inp:i3}=numField("🎓 GPA Count","q-gpa",survey.gpa||0);
  const saveBtn=h("button",{className:"btn btn-primary",style:{marginTop:".5rem"}},"💾 Save Changes");
  saveBtn.addEventListener("click",()=>{
    const idx=DB.surveys.findIndex(s=>s.id===survey.id);
    if(idx>=0){DB.surveys[idx]={...DB.surveys[idx],policy:i1.value,rsa:i2.value,gpa:i3.value};save(DB);syncToSheet();}
    ov.remove();onSave();
  });
  const delBtn=h("button",{className:"btn btn-danger",style:{marginTop:".6rem"}},"🗑 Delete This Entry");
  delBtn.addEventListener("click",()=>{
    if(!confirm("Delete this survey entry?"))return;
    DB.surveys=DB.surveys.filter(s=>s.id!==survey.id);save(DB);syncToSheet();ov.remove();onSave();
  });
  const cancelBtn=h("button",{className:"btn btn-ghost",style:{marginTop:".6rem"}},"Cancel");
  cancelBtn.addEventListener("click",()=>ov.remove());
  [w1,w2,w3,saveBtn,delBtn,cancelBtn].forEach(x=>mo.appendChild(x));
  ov.appendChild(mo);document.body.appendChild(ov);
}

        const displayN=(u.fullName&&u.fullName.trim()?u.fullName.trim():(u.username.charAt(0).toUpperCase()+u.username.slice(1).toLowerCase()));
        tr3.innerHTML=`<td><span style="font-weight:600">${displayN}</span><br><span style="font-size:.72rem;color:var(--muted);font-family:var(--mono)">${u.username}${u.designation?" · "+u.designation:""}${u.location?" · 📍 "+u.location:""}</span></td>
          <td><span class="pill pill-pend">${uS.reduce((s,r)=>s+(parseInt(r.policy)||0),0)}</span></td>
          <td><span class="pill pill-yes">${uS.reduce((s,r)=>s+(parseInt(r.rsa)||0),0)}</span></td>
          <td><span class="pill pill-pend">${uS.reduce((s,r)=>s+(parseInt(r.gpa)||0),0)}</span></td>
          <td><span class="pill" style="background:#4f8ef722;color:var(--accent);border:1px solid #4f8ef744">${uD}</span></td>`;
        tb3.appendChild(tr3);
      });
      tbl2.appendChild(tb3);tw2.appendChild(tbl2);content.appendChild(tw2);

      // Download section
      content.appendChild(el("div","section-title","Download Data"));
      const allMonths2=[...new Set([...allSurveys.map(s=>s.date?.slice(0,7)).filter(Boolean),...allAttend.map(r=>{const d=new Date(r.timestamp);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`})])].sort().reverse();
      const mbar=el("div","month-bar");
      const ml2=h("label",{},"Filter by Month:");ml2.style.margin="0";
      const ms2=h("select",{});
      [h("option",{value:""},"All Months"),...allMonths2.map(m=>h("option",{value:m},new Date(m+"-01").toLocaleString("default",{month:"long",year:"numeric"})))].forEach(o=>{if(o.value===dlMonth)o.selected=true;ms2.appendChild(o)});
      ms2.addEventListener("change",()=>{dlMonth=ms2.value;refresh()});
      mbar.appendChild(ml2);mbar.appendChild(ms2);content.appendChild(mbar);

      const fS=dlMonth?allSurveys.filter(s=>s.date&&s.date.startsWith(dlMonth)):allSurveys;
      const fA=dlMonth?allAttend.filter(r=>{const d=new Date(r.timestamp);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`===dlMonth}):allAttend;
      const mLbl=dlMonth?new Date(dlMonth+"-01").toLocaleString("default",{month:"long",year:"numeric"}):"All Months";

      function getFullName(username){ const u=regularUsers.find(u=>u.username===username); return(u&&u.fullName)?u.fullName:username; }

      [
        ["#a78bfa44","var(--policy)","📜 Policy Data",fS.length,"Policy",()=>exportCSV(fS.map(s=>({Name:getFullName(s.username),UserID:s.username,Date:s.date,Time:new Date(s.timestamp).toLocaleTimeString(),Policy_Count:s.policy||""})),`Policy_${dlMonth||"All"}.csv`),"btn-policy"],
        ["#fb923c44","var(--rsa)","🔐 RSA Data",fS.length,"RSA",()=>exportCSV(fS.map(s=>({Name:getFullName(s.username),UserID:s.username,Date:s.date,Time:new Date(s.timestamp).toLocaleTimeString(),RSA_Count:s.rsa||""})),`RSA_${dlMonth||"All"}.csv`),"btn-rsa"],
        ["#34d39944","var(--gpa)","🎓 GPA Data",fS.length,"GPA",()=>exportCSV(fS.map(s=>({Name:getFullName(s.username),UserID:s.username,Date:s.date,Time:new Date(s.timestamp).toLocaleTimeString(),GPA_Count:s.gpa||""})),`GPA_${dlMonth||"All"}.csv`),"btn-gpa"],
        ["var(--border)","var(--accent)","📋 Attendance",fA.length,"records",()=>{
          const dm={};
          fA.forEach(r=>{const k=r.username+"__"+new Date(r.timestamp).toDateString();if(!dm[k])dm[k]={Name:getFullName(r.username),UserID:r.username,Date:new Date(r.timestamp).toLocaleDateString(),CheckIn:"",CheckOut:"",Hours:"",InLat:"",InLng:"",OutLat:"",OutLng:""};
            if(r.type==="in"&&(!dm[k]._inTs||r.timestamp<dm[k]._inTs)){dm[k]._inTs=r.timestamp;dm[k].CheckIn=new Date(r.timestamp).toLocaleTimeString();dm[k].InLat=r.location?.lat||"";dm[k].InLng=r.location?.lng||"";}
            if(r.type==="out"&&(!dm[k]._outTs||r.timestamp>dm[k]._outTs)){dm[k]._outTs=r.timestamp;dm[k].CheckOut=new Date(r.timestamp).toLocaleTimeString();dm[k].OutLat=r.location?.lat||"";dm[k].OutLng=r.location?.lng||"";}
          });
          Object.values(dm).forEach(d=>{if(d._inTs&&d._outTs){const m=Math.round((d._outTs-d._inTs)/60000);d.Hours=`${Math.floor(m/60)}h ${m%60}m`;}delete d._inTs;delete d._outTs;});
          exportCSV(Object.values(dm).sort((a,b)=>new Date(b.Date)-new Date(a.Date)),`Attendance_${dlMonth||"All"}.csv`);
        },"btn-primary"],
      ].forEach(([bc,nc,name,cnt,unit,fn,btnCls])=>{
        const dc=el("div","dl-card",null,{borderColor:bc});
        const di=h("div",{});
        di.appendChild(h("div",{className:"dl-name",style:{color:nc}},name));
        di.appendChild(h("div",{className:"dl-count"},`${cnt} ${unit} — ${mLbl}`));
        const db=h("button",{className:"btn "+btnCls+" btn-sm"},"⬇ Download CSV");
        db.addEventListener("click",fn);
        dc.appendChild(di);dc.appendChild(db);content.appendChild(dc);
      });
    }
  }

  // ── EDIT USER MODAL ──
  function openEditModal(u){
    const ov=el("div","modal-overlay");
    const mo=el("div","modal",null,{maxWidth:"440px"});
    const xb=h("button",{className:"x-btn"},"✕");xb.addEventListener("click",()=>ov.remove());
    mo.appendChild(xb);
    mo.appendChild(h("div",{style:{fontSize:"1.5rem",marginBottom:".4rem"}},"✏️"));
    mo.appendChild(h("h2",{},"Edit User"));
    mo.appendChild(el("div","sub","Editing: "+(u.fullName&&u.fullName.trim()?u.fullName.trim():(u.username.charAt(0).toUpperCase()+u.username.slice(1).toLowerCase()))));

    function mf(stepNum,icon,labelTxt,inputAttrs){
      const fg=el("div","field-group");
      const lbl=h("label",{});
      if(stepNum){const sb=el("span","field-step",String(stepNum));lbl.appendChild(sb);lbl.appendChild(document.createTextNode(" "));}
      lbl.appendChild(document.createTextNode(icon+" "+labelTxt));
      const inp=h("input",inputAttrs);
      fg.appendChild(lbl);fg.appendChild(inp);
      return {fg,inp};
    }
    const {fg:fg1,inp:iName}=mf(1,"👤","Full Name",{type:"text",value:u.fullName||""});
    const {fg:fg2,inp:iUID}=mf(2,"🪪","User ID (Login Username)",{type:"text",value:u.userId||u.username});
    const {fg:fg3,inp:iPW}=mf(3,"🔑","Password",{type:"password",value:u.password});
    const {fg:fg4,inp:iDS}=mf("","🏷","Designation",{type:"text",value:u.designation||""});
    const {fg:fg5,inp:iLoc}=mf("","📍","Working Location",{type:"text",value:u.location||""});

    const sb=h("button",{className:"btn btn-primary",style:{marginTop:".5rem"}},"💾 Save Changes");
    sb.addEventListener("click",()=>{
      const name=iName.value.trim(),uid=iUID.value.trim(),pw=iPW.value.trim(),des=iDS.value.trim(),loc=iLoc.value.trim();
      if(!name){alert("Full name is required.");return}
      if(!uid||!pw){alert("User ID and password required.");return}
      if(uid!==u.username&&DB.users.find(x=>x.username===uid)){alert("User ID already exists.");return}
      const idx=DB.users.findIndex(x=>x.username===u.username);
      DB.users[idx]={...DB.users[idx],username:uid,password:pw,fullName:name,userId:uid,designation:des,location:loc};
      if(uid!==u.username){
        DB.attendance=DB.attendance.map(r=>r.username===u.username?{...r,username:uid}:r);
        DB.surveys=(DB.surveys||[]).map(s=>s.username===u.username?{...s,username:uid}:s);
        DB.absences=(DB.absences||[]).map(a=>a.username===u.username?{...a,username:uid}:a);
      }
      save(DB);syncToSheet();ov.remove();refresh();
    });
    const cb=h("button",{className:"btn btn-ghost",style:{marginTop:".6rem"}},"Cancel");
    cb.addEventListener("click",()=>ov.remove());
    [fg1,fg2,fg3,fg4,fg5,sb,cb].forEach(x=>mo.appendChild(x));
    ov.appendChild(mo);document.body.appendChild(ov);
  }

  refresh();render(dash);
}

markAbsences();

loadDiv.style.cssText="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Sora',sans-serif;color:#e8eaf6;background:#0b0f1a;gap:1rem";
loadDiv.innerHTML=`
  <div style="font-size:2.5rem">📋</div>
  <div style="font-weight:900;font-size:1.5rem">
    <span style="color:#e63329">V</span><span style="color:#f5a623">I</span><span style="color:#2563eb">B</span><span style="color:#16a34a">E</span>
    <span style="color:#e8eaf6;font-size:1rem;font-weight:400;margin-left:.5rem">Attendance</span>
  </div>
  <div style="display:flex;gap:.4rem;align-items:center;color:#7a8bad;font-size:.85rem">
    <span style="display:inline-block;width:14px;height:14px;border:2px solid #4f8ef766;border-top-color:#4f8ef7;border-radius:50%;animation:spin .7s linear infinite"></span>
    Connecting to Google Sheets…
  </div>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
`;
document.getElementById("app").appendChild(loadDiv);

loadFromSheet().then(()=>{clearTimeout(timeout);route();}).catch(()=>{clearTimeout(timeout);route();});
