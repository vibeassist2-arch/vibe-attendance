<body>

<div id="app"></div>

<script>
// ── VIBE v20260311.fix — Absent bug fix: checkout records count as present ────
const KEY = "vibeAttendanceData";
const DEFAULT_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwvX9h3XDveEw0zpwDvhru7j8dlaQx5VGAGOayx1tnn7GuohDq-H7UTZdBLx9o9N3Yh/exec";

// Securely get the script URL — never accept arbitrary URLs from localStorage
function getScriptUrl() {
  const stored = localStorage.getItem("vibeScriptUrl");
  return (stored && stored.startsWith("https://script.google.com")) ? stored : DEFAULT_SCRIPT_URL;
}
let SCRIPT_URL = getScriptUrl();

async function gsFetch(params) {
  const url = getScriptUrl();
  if (!url) return null;
  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 8000);
    const res = await fetch(url + "?" + new URLSearchParams(params), { method: "GET", redirect: "follow", signal: controller.signal });
    clearTimeout(timer);
    const text = await res.text();
    try {
      return JSON.parse(text);
    } catch(e) {
      console.error("GS GET: server returned non-JSON response");
      return null;
    }
  } catch(e) { console.error("GS GET error", e); return null; }
}

// ── RETRY QUEUE — never lose a check-in even if network fails ─────────────────
const QUEUE_KEY = "vibePostQueue";
const QUEUE_MAX_AGE_MS = 7 * 24 * 60 * 60 * 1000; // 7 days — drop stale items that can never succeed
function loadQueue(){
  try{
    const raw = JSON.parse(localStorage.getItem(QUEUE_KEY)||"[]");
    // Purge items older than 7 days (use item.ts if present, else keep item)
    const now = Date.now();
    const fresh = raw.filter(item => !item.ts || (now - item.ts) < QUEUE_MAX_AGE_MS);
    if(fresh.length !== raw.length){
      try{ localStorage.setItem(QUEUE_KEY, JSON.stringify(fresh)); }catch(_){}
    }
    return fresh;
  }catch{ return []; }
}

// ── TOAST NOTIFICATION SYSTEM ─────────────────────────────────────────────────
// Replaces all alert() calls — non-blocking, auto-dismiss, stackable
function showToast(msg, type="info", duration=4000){
  // type: "info" | "success" | "warn" | "error"
  const colors={
    info:   {bg:"#4f8ef7", text:"#fff"},
    success:{bg:"#38d9a9", text:"#052e1c"},
    warn:   {bg:"#ffd166", text:"#1a1200"},
    error:  {bg:"#ff5f6d", text:"#fff"}
  };
  const {bg, text}=colors[type]||colors.info;

  // Stack toasts vertically — find existing ones and shift
  const existing=document.querySelectorAll(".vibe-toast");
  const offset=existing.length*60;

  const t=document.createElement("div");
  t.className="vibe-toast";
  t.style.cssText=[
    "position:fixed",
    "bottom:"+(1.5+offset/16)+"rem",
    "left:50%",
    "transform:translateX(-50%)",
    "background:"+bg,
    "color:"+text,
    "padding:.7rem 1.3rem",
    "border-radius:12px",
    "font-weight:700",
    "font-size:.85rem",
    "z-index:9999",
    "box-shadow:0 4px 20px #00000044",
    "font-family:'Sora',sans-serif",
    "max-width:90vw",
    "text-align:center",
    "transition:opacity .3s,transform .3s",
    "cursor:pointer",
    "line-height:1.4"
  ].join(";");
  t.textContent=msg;

  // Tap to dismiss
  t.addEventListener("click",()=>dismiss());
  document.body.appendChild(t);

  function dismiss(){
    t.style.opacity="0";
    t.style.transform="translateX(-50%) translateY(8px)";
    setTimeout(()=>{ t.remove(); repositionToasts(); },320);
  }

  function repositionToasts(){
    document.querySelectorAll(".vibe-toast").forEach((el,i)=>{
      el.style.bottom=(1.5+i*3.75)+"rem";
    });
  }

  const timer=setTimeout(dismiss, duration);
  t.addEventListener("click",()=>clearTimeout(timer),{once:true});
  return t;
}

// FIX: saveQueue now returns boolean so callers can detect storage failure
function saveQueue(q){
  try {
    localStorage.setItem(QUEUE_KEY, JSON.stringify(q));
    return true;
  } catch(e) {
    console.error("LocalStorage full — queue not saved!", e);
    showToast("Storage full — attendance may not save. Clear browser cache.", "error", 8000);
    return false;
  }
}

// Register background sync so the SW retries when connectivity returns
async function requestBackgroundSync() {
  if (!('serviceWorker' in navigator)) return;
  if (!('SyncManager' in window)) {
    // Fallback for Safari/Firefox: flush immediately if online
    if (navigator.onLine) flushQueue();
    return;
  }
  try {
    const reg = await navigator.serviceWorker.ready;
    await reg.sync.register('vibe-sync');
  } catch (err) {
    console.warn('Background sync registration failed:', err);
    if (navigator.onLine) flushQueue();
  }
}

let _queueRunning = false;
async function flushQueue(){
  const url = getScriptUrl();
  if(_queueRunning || !url || !navigator.onLine) return;
  _queueRunning = true;
  try {
    // removeAbsence items are always fired directly — never queue them
    // Drop any that snuck in (e.g. from older code paths)
    const _preClean = loadQueue();
    const _hasRemove = _preClean.some(i => i.action === "removeAbsence");
    if(_hasRemove) saveQueue(_preClean.filter(i => i.action !== "removeAbsence"));

    let q = loadQueue();
    let i = 0;
    while(i < q.length){
      if(!navigator.onLine) break;
      const item = q[i];
      let ok = false;
      let tries = 0;
      while(tries < 3){
        try{
          const ctrl=new AbortController();
          const t=setTimeout(()=>ctrl.abort(),8000);
          const res=await fetch(url,{method:"POST",redirect:"follow",headers:{"Content-Type":"text/plain"},body:JSON.stringify(item),signal:ctrl.signal});
          clearTimeout(t);
          const text=await res.text();
          let parsed=null; try{parsed=JSON.parse(text);}catch(_){}
          // FIX: Apps Script often returns 302 redirect or non-200 even on success.
          // Accept if: HTTP 2xx, OR parsed JSON has ok:true, OR response body is not an error string.
          // Only reject if we explicitly get ok:false or a known error pattern.
          const explicitFail = parsed && parsed.ok === false;
          const bodyLooksLikeError = !parsed && text && (text.toLowerCase().includes("error") || text.toLowerCase().includes("exception")) && text.length < 300;
          if(!explicitFail && !bodyLooksLikeError){ok=true;break;}
          tries++;
          if(tries<3)await new Promise(r=>setTimeout(r,1000*Math.pow(2,tries-1)));
        }catch(e){
          if(!navigator.onLine)break;
          tries++;
          if(tries<3)await new Promise(r=>setTimeout(r,1000*Math.pow(2,tries-1)));
        }
      }
      if(ok){
        q=loadQueue();
        const idx=q.findIndex(x=>x.ts===item.ts&&x.action===item.action);
        if(idx!==-1)q.splice(idx,1);
        saveQueue(q);
      } else {
        item._retries=(item._retries||0)+1;
        if(item._retries>=10){
          console.error("VIBE: dropping queue item after 10 retries",item);
          showToast("Warning: one attendance record could not sync to admin panel after multiple attempts.", "error", 8000);
          q=loadQueue();
          const idx=q.findIndex(x=>x.ts===item.ts&&x.action===item.action);
          if(idx!==-1){q.splice(idx,1);saveQueue(q);}
        } else {
          q=loadQueue();
          const idx=q.findIndex(x=>x.ts===item.ts&&x.action===item.action);
          if(idx!==-1){q[idx]._retries=item._retries;saveQueue(q);}
          i++;
        }
        requestBackgroundSync();
        if(!navigator.onLine)break;
      }
      q=loadQueue();
    }
  } finally { _queueRunning=false; }
}

async function gsPost(body) {
  const url = getScriptUrl();
  if (!url) return { ok: false, error: "No Script URL" };
  const q = loadQueue();
  q.push({...body, ts: Date.now()}); // ts enables 7-day TTL purge
  const saved = saveQueue(q);
  if (!saved) return { ok: false, error: "Storage Full" };
  // Tell user if they're offline — record is safe but not yet synced
  if(!navigator.onLine){
    showToast("You're offline — record saved locally and will sync automatically when reconnected.", "warn", 5000);
  }
  flushQueue(); // try immediately, non-blocking
  return { ok: true };
}

// ── VERIFY & PURGE: drop queue items already confirmed on sheet ───────────────
// Called when queue is stuck — compares queue IDs against sheet data and removes confirmed ones
async function verifyAndPurgeQueue(){
  const q = loadQueue();
  if(!q.length) return 0;

  const todayStr = localDateStr(new Date());

  // ── LOCAL check first (no network needed) ─────────────────────────────────
  // Users who have a check-in/out in local DB today
  const localCheckedInToday = new Set(
    (DB.attendance||[])
      .filter(r => r.username && r.timestamp && (r.type === "in" || r.type === "out") && localDateStr(new Date(r.timestamp)) === todayStr)
      .map(r => String(r.username))
  );
  // Users who have a queued check-in/out for today (pending upload)
  const queuedCheckedInToday = new Set(
    q.filter(i => i.action === "addAttendance" && i.data?.username && i.data?.timestamp &&
                  (i.data?.type === "in" || i.data?.type === "out") &&
                  localDateStr(new Date(i.data.timestamp)) === todayStr)
     .map(i => String(i.data.username))
  );

  // Drop addAbsence items locally if the user is already known to have checked in
  const localToDrop = new Set();
  q.forEach(item => {
    if(item.action === "addAbsence"){
      const uname = item.data?.username||"";
      const date  = item.data?.date||"";
      if(date === todayStr && (localCheckedInToday.has(uname) || queuedCheckedInToday.has(uname))) localToDrop.add(uname);
    }
  });
  const afterLocalPurge = q.filter(item => {
    if(item.action === "addAbsence"){
      const uname = item.data?.username||"";
      const date  = item.data?.date||"";
      if(date === todayStr && localToDrop.has(uname)) return false;
    }
    return true;
  });
  if(localToDrop.size > 0){
    saveQueue(afterLocalPurge);
    // Also remove from DB.absences so Today Absent list clears immediately
    DB.absences = (DB.absences||[]).filter(a => !(a.date===todayStr && localToDrop.has(a.username)));
    // Queue removeAbsence so the sheet gets cleaned too
    localToDrop.forEach(uname => {
      const already = loadQueue().some(i => i.action==="removeAbsence" && i.data?.username===uname && i.data?.date===todayStr);
      if(!already) gsPost({ action:"removeAbsence", data:{ username:uname, date:todayStr } });
    });
    save(DB);
  }

  // Pull latest sheet data
  const result = await gsFetch({action:"getAll"});
  if(!result || !result.ok) return q.length - afterLocalPurge.length; // return local purge count even if offline

  // Build sets of IDs already on sheet
  const sheetAttendIds = new Set((result.attendance||[]).map(r=>String(r.id||"")));
  const sheetSurveyIds = new Set((result.surveys||[]).map(s=>String(s.id||"")));
  const sheetAbsenceKeys = new Set((result.absences||[]).map(a=>a.username+"__"+a.date));
  // Users who have any attendance record on sheet today — absence is wrong for them
  const sheetCheckedInToday = new Set(
    (result.attendance||[])
      .filter(r => r.username && r.timestamp && localDateStr(new Date(parseInt(r.timestamp)||0)) === todayStr)
      .map(r => String(r.username))
  );

  const before = afterLocalPurge.length;
  const fresh = afterLocalPurge.filter(item => {
    const id = String(item.data?.id||"");
    if(item.action === "addAttendance" && id && sheetAttendIds.has(id)) return false;
    if(item.action === "addSurvey"    && id && sheetSurveyIds.has(id)) return false;
    if(item.action === "addAbsence"){
      const key = (item.data?.username||"")+"__"+(item.data?.date||"");
      // Drop if: absence already on sheet, OR user actually checked in on sheet today
      if(sheetAbsenceKeys.has(key)) return false;
      if(item.data?.date === todayStr && sheetCheckedInToday.has(item.data?.username||"")) return false;
    }
    if(item.action === "removeAbsence"){
      const key = (item.data?.username||"")+"__"+(item.data?.date||"");
      if(!sheetAbsenceKeys.has(key)) return false;
    }
    return true;
  });

  saveQueue(fresh);
  return (q.length - afterLocalPurge.length) + (before - fresh.length); // total purged
}

async function markAbsences() {
  const today = new Date();
  const todayStr = localDateStr(today);
  if (today.getDay() === 0) return; // Skip Sunday only

  const nowMin = today.getHours() * 60 + today.getMinutes();
  if (nowMin < 630) return; // Only after 10:30 AM

  if (!DB.absences) DB.absences = [];

  // GUARD: if any check-in/out is still queued (not yet uploaded), skip this cycle entirely.
  // Marking absences while check-ins are pending always produces wrong results.
  const queueBefore = loadQueue();
  const hasPendingCheckIns = queueBefore.some(i =>
    i.action === "addAttendance" &&
    i.data?.timestamp &&
    localDateStr(new Date(i.data.timestamp)) === todayStr
  );
  if (hasPendingCheckIns) {
    console.log("markAbsences: skipping — check-ins still in queue, waiting for sync");
    // Try to flush now; next interval will re-evaluate
    try { await flushQueue(); } catch(_) {}
    return;
  }

  // Try to flush + reload sheet — if unreachable, skip entirely
  try {
    await flushQueue();
    const loaded = await loadFromSheet();
    if (!loaded) {
      console.warn("markAbsences: sheet unreachable, skipping this cycle");
      return;
    }
  } catch(e) {
    console.warn("markAbsences: sheet unreachable, skipping this cycle", e);
    return;
  }

  // GUARD: re-check queue after flush — if check-ins arrived during the await, abort
  const queueAfter = loadQueue();
  const stillPending = queueAfter.some(i =>
    i.action === "addAttendance" &&
    i.data?.timestamp &&
    localDateStr(new Date(i.data.timestamp)) === todayStr
  );
  if (stillPending) {
    console.log("markAbsences: check-ins still pending after flush, skipping");
    return;
  }

  const checkedInToday = new Set(
    DB.attendance
      .filter(r => (r.type === "in" || r.type === "out") && localDateStr(new Date(r.timestamp)) === todayStr)
      .map(r => r.username)
  );
  const surveyedToday = new Set(
    (DB.surveys||[])
      .filter(s => s.date === todayStr)
      .map(s => s.username)
  );

  DB.users.filter(u => u.role !== "admin").forEach((u, idx) => {
    const isPresent = checkedInToday.has(u.username) || surveyedToday.has(u.username);
    const existingAbs = DB.absences.find(a => a.username === u.username && a.date === todayStr);
    if (isPresent && existingAbs) {
      // User checked in — remove any wrong absence
      DB.absences = DB.absences.filter(a => !(a.username === u.username && a.date === todayStr));
      // Fire directly to sheet (not via queue) to avoid re-queuing loop
      const url = getScriptUrl();
      if(url) fetch(url, { method:"POST", redirect:"follow", headers:{"Content-Type":"text/plain"},
        body: JSON.stringify({ action:"removeAbsence", data:{ username: u.username, date: todayStr } }) }).catch(()=>{});
    } else if (!isPresent && !existingAbs) {
      const alreadyQueued = queueAfter.some(q => q.action === "addAbsence" && q.data?.username === u.username && q.data?.date === todayStr);
      if (!alreadyQueued) {
        const newAbs = { id: String(Date.now())+"_abs_"+idx, username: u.username, date: todayStr, auto: true };
        DB.absences.push(newAbs);
        gsPost({ action: "addAbsence", data: newAbs });
      }
    }
  });
  save(DB);
}

async function syncToSheet() {
  const _syncUrl = getScriptUrl();
  if (!_syncUrl) return;
  // Send directly (not via queue) to avoid ordering issues with queued attendance records
  const payload = { action:"fullSync", data: { users: DB.users, surveys: DB.surveys, attendance: DB.attendance, absences: DB.absences, officeLocations: DB.officeLocations } };
  try {
    const _sc = new AbortController();
    const _st = setTimeout(() => _sc.abort(), 8000);
    const res = await fetch(_syncUrl, { method:"POST", redirect:"follow", headers:{"Content-Type":"text/plain"}, body: JSON.stringify(payload), signal: _sc.signal });
    clearTimeout(_st);
    const text = await res.text();
    try { return JSON.parse(text); } catch { return { ok: true }; }
  } catch(e) {
    // FIX: do NOT queue fullSync — queued fullSync can overwrite newer sheet data
    // with stale local DB when it eventually flushes. Just report failure.
    console.warn("syncToSheet failed:", e);
    return { ok: false, error: e.message };
  }
}

let _loadRunning = false;
async function loadFromSheet() {
  if (!getScriptUrl()) return false;
  if (_loadRunning) return false; // prevent concurrent calls corrupting DB merge
  _loadRunning = true;
  try {
    const result = await gsFetch({ action:"getAll" });
    if (!result || !result.ok) return false;

    const sheetUsers = (result.users||[]).map(u => ({
      username: String(u.username||"").trim(),
      password: String(u.password||"").trim(),
      fullName: (u.fullName||u.full_name||u.FullName||u.name||"").trim(),
      userId: (u.userId||u.user_id||u.UserId||u.username||"").trim(),
      designation: u.designation||"",
      location: u.location||"",
      role: u.role||"user",
      geoLat: u.geoLat||"",
      geoLng: u.geoLng||"",
      geoRadius: (u.geoRadius !== undefined && u.geoRadius !== "") ? parseInt(u.geoRadius) || 200 : 200,
      officeName: u.officeName||""
    })).filter(u => u.username);

    if (sheetUsers.length) {
      const localAdmins = DB.users.filter(u => u.role === "admin" && !sheetUsers.find(s => s.username === u.username));
      const merged = sheetUsers.map(su => {
        const local = DB.users.find(x => x.username === su.username);
        return {
          ...su,
          geoLat: su.geoLat || local?.geoLat || "",
          geoLng: su.geoLng || local?.geoLng || "",
          geoRadius: su.geoRadius || local?.geoRadius || 200,
          officeName: su.officeName || local?.officeName || ""
        };
      });
      DB.users = [...merged, ...localAdmins];
    }

    // Update SESSION fields if user data changed on sheet
    if (SESSION) {
      const sessionUser = DB.users.find(u => u.username === SESSION.username);
      if (sessionUser) {
        if (sessionUser.fullName && sessionUser.fullName.trim()) SESSION.fullName = sessionUser.fullName.trim();
      }
    }

    const sheetAttend = (result.attendance||[]).map(r => {
      const lat = parseFloat(r.lat), lng = parseFloat(r.lng);
      const outLat = parseFloat(r.outLat), outLng = parseFloat(r.outLng);
      const validLoc = (r.lat && r.lng && lat >= -90 && lat <= 90 && lng >= -180 && lng <= 180) ? {lat, lng, workLocation: r.workLocation||""} : null;
      const validOutLoc = (r.outLat && r.outLng && outLat >= -90 && outLat <= 90 && outLng >= -180 && outLng <= 180) ? {lat: outLat, lng: outLng} : null;
      const rType = (r.type||"").toString().trim().toLowerCase();
      // FIX 1: Prioritize explicit sheet type, then local DB record type, then default "in"
      // Checkout records always have type:"out" explicitly — never guess from lat
      const localRec = r.id ? DB.attendance.find(x => x.id && String(x.id) === String(r.id)) : null;
      const inferredType = rType || localRec?.type || "in";
      // Parse geoOk correctly — sheet stores it as string "true"/"false"
      const geoOk = r.geoOk === true || r.geoOk === "true" || r.geoOk === 1 || r.geoOk === "1";
      return {
        id: r.id,
        username: r.username,
        type: inferredType,
        timestamp: parseInt(r.timestamp)||0,
        location: validLoc,
        outLocation: validOutLoc,
        outTimestamp: parseInt(r.outTimestamp)||0,
        geoOk,
        geoName: r.geoName||"",
        geoDist: r.geoDist!=null ? parseInt(r.geoDist)||0 : null
      };
    }).filter(r => r.username && r.timestamp);

    // Merge sheet attendance with local records
    const _queue = loadQueue();
    // All IDs currently in the retry queue (pending upload)
    const queuedIds = new Set(_queue
      .filter(item => (item.action === "addAttendance" || item.action === "addSurvey") && item.data?.id)
      .map(item => String(item.data.id)));
    const todayDateStr = new Date().toDateString();

    // Build a map of ALL local attendance by ID for fast lookup
    const localById = {};
    DB.attendance.forEach(r => {
      const key = r.id ? String(r.id) : (r.username + r.timestamp);
      localById[key] = r;
    });

    // Start with sheet data as base
    const allAttendById = {};
    sheetAttend.forEach(r => {
      const key = r.id ? String(r.id) : (r.username + r.timestamp);
      const local = localById[key];
      if(local && local.timestamp > r.timestamp){
        // FIX: clock skew guard — if local is >10 min ahead of sheet, prefer sheet
        // A legitimate re-checkin would have a matching queue record; a skewed clock won't
        const skewed = (local.timestamp - r.timestamp) > 10 * 60 * 1000;
        const hasPendingLocal = _queue.some(q => q.data?.id && String(q.data.id) === key);
        allAttendById[key] = (skewed && !hasPendingLocal) ? r : local;
      } else if(local && local.timestamp === r.timestamp){
        // Same record — merge type: prefer local "out" over sheet "in"
        // A local checkout that beat the sheet sync should not be downgraded to "in"
        const sheetTypeRaw = (r.type||"").toString().trim().toLowerCase();
        const localTypeRaw = (local?.type||"").toString().trim().toLowerCase();
        // FIX: if local says "out", trust it — only revert to "in" if both agree
        const mergedType = (localTypeRaw === "out" || sheetTypeRaw === "out") ? "out" : "in";
        allAttendById[key] = {
          ...r,
          ...local,
          type: mergedType,
          outTimestamp: local.outTimestamp || r.outTimestamp || 0,
          outLocation:  local.outLocation  || r.outLocation  || null,
          geoName:      local.geoName      || r.geoName      || "",
          geoDist:      local.geoDist      ?? r.geoDist      ?? null,
        };
      } else {
        allAttendById[key] = r; // sheet is newer — use sheet record
      }
    });

    // Add ALL local records not on sheet at all (new records pending upload)
    DB.attendance.forEach(r => {
      const key = r.id ? String(r.id) : (r.username + r.timestamp);
      if(!allAttendById[key]) allAttendById[key] = r;
    });

    // Also pull directly from queue in case DB was cleared/reloaded
    _queue.filter(item => item.action === "addAttendance" && item.data?.username && item.data?.timestamp)
      .forEach(item => {
        const r = item.data;
        const key = r.id ? String(r.id) : (r.username + r.timestamp);
        const existing = allAttendById[key];
        if(!existing || r.timestamp >= (existing.timestamp||0)){
          allAttendById[key] = {...r, type: r.type||"in"};
        }
      });

    let mergedAttend = Object.values(allAttendById);

    // ── TYPE CORRECTION PASS: only trust explicit local DB or queue — no guesswork ──
    const _byUserDay2 = {};
    mergedAttend.forEach(r => {
      const dk = r.username + "__" + new Date(r.timestamp).toDateString();
      if(!_byUserDay2[dk]) _byUserDay2[dk] = [];
      _byUserDay2[dk].push(r);
    });
    mergedAttend = mergedAttend.map(r => {
      if(r.type !== "in") return r; // only consider records currently typed as "in"
      // FIX 2: Check queue first — if this exact record ID is pending as "out", trust it
      const isPendingOut = _queue.some(q =>
        q.action === "addAttendance" &&
        q.data?.id && String(q.data.id) === String(r.id) &&
        q.data?.type === "out"
      );
      if(isPendingOut) return {...r, type: "out"};
      // Then check local DB
      const localRec2 = r.id ? DB.attendance.find(x => String(x.id) === String(r.id)) : null;
      if(localRec2 && localRec2.type === "out") return {...r, type: "out"};
      return r;
    });

    // ── DEDUPLICATE: remove ghost check-ins that appear after a checkout ──
    // Rule: only drop check-in records that appear AFTER a checkout (ghost records from sheet echo)
    // NEVER drop checkout records themselves
    const byUserDay = {};
    mergedAttend.forEach(r => {
      const key = r.username + "__" + new Date(r.timestamp).toDateString();
      if(!byUserDay[key]) byUserDay[key] = [];
      byUserDay[key].push(r);
    });

    // FIX: adopt orphan "out" records — an "out" record with no same-day check-in
    // should be matched to the nearest prior check-in within 24h (timezone shift artifact)
    const orphanOuts = [];
    Object.entries(byUserDay).forEach(([key, recs]) => {
      const ins = recs.filter(r => r.type === "in");
      const outs = recs.filter(r => r.type === "out");
      if(outs.length && !ins.length){
        // These are orphan checkouts — save for re-homing
        outs.forEach(r => orphanOuts.push(r));
        delete byUserDay[key]; // remove from their wrong day
      }
    });
    // Re-home orphan outs to the nearest prior check-in day for same user
    orphanOuts.forEach(orphan => {
      // Find closest check-in within 24h before the checkout
      const candidates = Object.keys(byUserDay).filter(k =>
        k.startsWith(orphan.username + "__") &&
        byUserDay[k].some(r => r.type === "in" && orphan.timestamp > r.timestamp && orphan.timestamp - r.timestamp <= 28*60*60*1000)
      );
      if(candidates.length){
        // Pick the key whose check-in is closest in time
        const bestKey = candidates.reduce((a,b) => {
          const aIn = Math.max(...byUserDay[a].filter(r=>r.type==="in").map(r=>r.timestamp));
          const bIn = Math.max(...byUserDay[b].filter(r=>r.type==="in").map(r=>r.timestamp));
          return Math.abs(orphan.timestamp - aIn) < Math.abs(orphan.timestamp - bIn) ? a : b;
        });
        byUserDay[bestKey].push(orphan);
      }
      // If no match found, discard the orphan — it's a ghost record
    });

    const cleanedAttend = [];
    Object.values(byUserDay).forEach(recs => {
      const outs = recs.filter(r => r.type === "out");
      // Always keep all checkout records
      outs.forEach(r => cleanedAttend.push(r));
      const ins = recs.filter(r => r.type === "in");
      if(!outs.length){ ins.forEach(r => cleanedAttend.push(r)); return; }
      const lastOutTs = Math.max(...outs.map(r => r.timestamp));
      ins.forEach(r => {
        // Keep check-in if it came BEFORE the last checkout (original check-in)
        if(r.timestamp < lastOutTs){
          cleanedAttend.push(r);
        } else if(r.timestamp - lastOutTs > 5*60*1000){
          cleanedAttend.push(r); // legitimate re-checkin 5+ min later
        }
        // else: ghost check-in within 5 min after checkout — drop it (sheet sync artifact)
      });
    });
    DB.attendance = cleanedAttend;

    const sheetSurveys = (result.surveys||[]).map(s => {
      const ts = parseInt(s.timestamp)||0;
      // Derive date from timestamp first, then fall back to date field
      let d = ts ? localDateStr(new Date(ts)) : (s.date || "").slice(0,10);
      // If date is still empty, skip this record — can't reliably dedup without a date
      if(!d) return null;
      return { id: String(s.id||""), username: String(s.username||"").trim(), date: d, timestamp: ts, policy: parseInt(s.policy)||0, rsa: parseInt(s.rsa)||0, gpa: parseInt(s.gpa)||0 };
    }).filter(s => s && s.username && s.date);

    const surveyMap = {};
    sheetSurveys.forEach(s => {
      const key = s.username + "__" + s.date;
      const existing = surveyMap[key];
      if (!existing) { surveyMap[key] = s; }
      else {
        const existTotal = existing.policy + existing.rsa + existing.gpa;
        const newTotal = s.policy + s.rsa + s.gpa;
        // Prefer higher total; on tie, prefer newer timestamp
        if (newTotal > existTotal || (newTotal === existTotal && s.timestamp > existing.timestamp)) surveyMap[key] = s;
      }
    });
    // Preserve ALL local surveys that aren't yet confirmed on sheet
    // (not just SESSION user — protects against wiping during sync)
    const localTodayStr = localDateStr(new Date());
    (DB.surveys||[]).forEach(s => {
      if(!s.username || !s.date) return;
      const key = s.username + "__" + s.date;
      const existing = surveyMap[key];
      const localTotal = (parseInt(s.policy)||0)+(parseInt(s.rsa)||0)+(parseInt(s.gpa)||0);
      const existTotal = existing ? existing.policy + existing.rsa + existing.gpa : -1;
      // Keep local if: not on sheet yet, more recent, or has more data
      if(!existing) { surveyMap[key] = {...s, policy:parseInt(s.policy)||0, rsa:parseInt(s.rsa)||0, gpa:parseInt(s.gpa)||0}; return; }
      if(s.timestamp > existing.timestamp || localTotal > existTotal) surveyMap[key] = {...s, policy:parseInt(s.policy)||0, rsa:parseInt(s.rsa)||0, gpa:parseInt(s.gpa)||0};
    });
    DB.surveys = Object.values(surveyMap);
    // Note: save(DB) deferred to end of function — absences + orphan cleanup also pending

    // Load absences from sheet — merge with local so no device loses absence data
    // Always sync absences from sheet — sheet is source of truth for absences
    // Local absences are only kept if not yet confirmed on sheet
    const sheetAbsences = (result.absences||[]).map(a => ({
      id: a.id, username: String(a.username||"").trim(), date: String(a.date||"").slice(0,10), auto: a.auto||false
    })).filter(a => a.username && a.date);
    const absMap = {};
    // Sheet data first
    sheetAbsences.forEach(a => { absMap[a.username+"__"+a.date] = a; });
    // Add any local absences not yet on sheet (queued addAbsence items)
    const queuedAbsKeys = new Set(_queue
      .filter(item => item.action === "addAbsence" && item.data)
      .map(item => String(item.data.username||"")+"__"+String(item.data.date||"")));
    (DB.absences||[]).forEach(a => {
      const k = a.username+"__"+a.date;
      if(queuedAbsKeys.has(k) && !absMap[k]) absMap[k] = a; // only keep if queued and not yet on sheet
    });
    // Remove absences that were queued for removal
    const removedAbsKeys = new Set(_queue
      .filter(item => item.action === "removeAbsence" && item.data)
      .map(item => String(item.data.username||"")+"__"+String(item.data.date||"")));
    removedAbsKeys.forEach(k => delete absMap[k]);
    DB.absences = Object.values(absMap);

    // Clean up orphan records for deleted users (keep only recent attendance to avoid data loss)
    const activeUsernames = new Set(DB.users.map(u => u.username));
    DB.absences = (DB.absences||[]).filter(a => activeUsernames.has(a.username));
    DB.surveys = (DB.surveys||[]).filter(s => activeUsernames.has(s.username));
    // FIX: also clean orphan attendance — only remove records older than 30 days for deleted users
    const thirtyDaysAgo = Date.now() - 30 * 24 * 60 * 60 * 1000;
    DB.attendance = DB.attendance.filter(r => activeUsernames.has(r.username) || r.timestamp > thirtyDaysAgo);
    save(DB);
    return true;
  } catch(e) { console.error("loadFromSheet error:", e); return false; }
  finally { _loadRunning = false; }
}

function def(){return{users:[{username:"admin",password:"admin123",role:"admin"}],attendance:[],surveys:[],absences:[],officeLocations:[]}}

function loadData(){

const LS_LIMIT = 5 * 1024 * 1024; // 5MB
function getStorageUsage(){
  try{ return JSON.stringify(DB).length; } catch(e){ return 0; }
}
function storagePercent(){ return Math.round(getStorageUsage()/LS_LIMIT*100); }

function archiveOldData(d, months=6){
  // Keep only last N months of attendance + surveys + absences
  // Users and officeLocations are always kept
  const cutoff = Date.now() - (months * 30 * 24 * 60 * 60 * 1000);
  const cutoffDate = new Date(cutoff);
  const cutoffStr = `${cutoffDate.getFullYear()}-${String(cutoffDate.getMonth()+1).padStart(2,"0")}`;
  d.attendance = d.attendance.filter(r => r.timestamp > cutoff);
  d.surveys = (d.surveys||[]).filter(s => (s.date||"") >= cutoffStr);
  d.absences = (d.absences||[]).filter(a => (a.date||"") >= cutoffStr);
  return d;
}

function save(d){
  try{
    let str = JSON.stringify(d);
    const pct = str.length / LS_LIMIT * 100;
    // Auto-archive when above 75% — keeps last 6 months
    if(pct > 75){
      d = archiveOldData(d, 6);
      str = JSON.stringify(d);
    }
    // Emergency archive when above 90% — keeps last 3 months
    if(str.length / LS_LIMIT * 100 > 90){
      d = archiveOldData(d, 3);
      str = JSON.stringify(d);
    }
    localStorage.setItem(KEY, str);
  } catch(e){
    if(e.name === "QuotaExceededError"){
      // Last resort — keep only 1 month
      d = archiveOldData(d, 1);
      try{ localStorage.setItem(KEY, JSON.stringify(d)); } catch(e2){ console.error("Storage critically full", e2); }
    }
  }
}
function localDateStr(date){const d=date||new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}

// ── GEOFENCE HELPERS ──────────────────────────────────────────────────────────
function haversineDistance(lat1,lng1,lat2,lng2){
  const R=6371000,toRad=x=>x*Math.PI/180;
  const dLat=toRad(lat2-lat1),dLng=toRad(lng2-lng1);
  const a=Math.sin(dLat/2)**2+Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
// checkUserGeofence: only uses personally assigned location — no global office fallback
function checkUserGeofence(userLat,userLng,username){
  const u=DB.users.find(x=>x.username===username);
  if(u&&u.geoLat&&u.geoLng){
    const d=haversineDistance(userLat,userLng,parseFloat(u.geoLat),parseFloat(u.geoLng));
    const radius=parseInt(u.geoRadius)||200;
    const name=u.officeName||"";
    return{ok:d<=radius,name,dist:Math.round(d),radius};
  }
  // No location assigned — allow check-in freely, no geofence applied
  return{ok:true,name:"",dist:null,noLocationSet:true};
}

// ── WORK TIMING HELPERS ───────────────────────────────────────────────────────
const WORK_START_H=9,WORK_START_M=0;   // 9:00 AM
const WORK_END_H=19,WORK_END_M=0;      // 7:00 PM
const HALF_DAY_LATE_MIN=4*60;          // 4 hours late = half day

function getArrivalStatus(tsMs){
  if(!tsMs)return null;
  const d=new Date(tsMs);
  const inMin=d.getHours()*60+d.getMinutes();
  const startMin=WORK_START_H*60+WORK_START_M;
  const lateMin=inMin-startMin;
  if(lateMin<=0)return{type:"ontime",label:"On Time"};
  if(lateMin>=HALF_DAY_LATE_MIN)return{type:"halfday",label:"Half Day"};
  const lh=Math.floor(lateMin/60),lm=lateMin%60;
  return{type:"late",label:lh>0?(lm>0?`${lh}h ${lm}m Late`:`${lh}h Late`):`${lm}m Late`};
}
function getDepartureStatus(tsMs, checkInTs){
  if(!tsMs)return null;
  const d=new Date(tsMs);
  const outMin=d.getHours()*60+d.getMinutes();
  const endMin=WORK_END_H*60+WORK_END_M;
  // If check-in time is provided, also verify they worked enough hours
  if(checkInTs){
    const workedMs=tsMs-checkInTs;
    const workedHours=workedMs/(1000*60*60);
    const fullDayHours=WORK_END_H-WORK_START_H; // 7PM-9AM = 10 hours, but we use 4h min
    if(outMin<endMin||workedHours<4) return{type:"permission",label:"Permission"};
  } else {
    if(outMin<endMin)return{type:"permission",label:"Permission"};
  }
  return{type:"full",label:"Full Day"};
}
function localMonthStr(date){const d=date||new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`}

function getLocation(){
  // Returns {lat,lng} on success or {error:"denied"|"timeout"|"unavailable"|"unsupported"} on failure
  return new Promise((res)=>{
    if(!navigator.geolocation){res({error:"unsupported"});return;}
    navigator.geolocation.getCurrentPosition(
      p=>{const lat=p.coords.latitude,lng=p.coords.longitude;if(lat<-90||lat>90||lng<-180||lng>180){res({error:"unavailable"});return;}res({lat,lng});},
      (err)=>{ if(err.code===1)res({error:"denied"}); else if(err.code===3)res({error:"timeout"}); else res({error:"unavailable"}); },
      {timeout:12000,enableHighAccuracy:true,maximumAge:0}
    );
  });
}
function exportCSV(rows,filename){
  if(!rows||!rows.length){
    const t=h("div",{style:{position:"fixed",bottom:"1.5rem",left:"50%",transform:"translateX(-50%)",background:"#ff5f6d",color:"#fff",padding:".65rem 1.4rem",borderRadius:"10px",fontWeight:"700",fontSize:".9rem",zIndex:"9999",boxShadow:"0 4px 20px #00000044"}}, "No data to export.");
    document.body.appendChild(t);setTimeout(()=>t.remove(),2500);return;
  }
  const keys=Object.keys(rows[0]);
  const body=rows.map(r=>keys.map(k=>{const v=r[k]==null?"":String(r[k]);return v.includes(",")||v.includes('"')?`"${v.replace(/"/g,'""')}"`:`${v}`}).join(",")).join("\n");
  const blob=new Blob([keys.join(",")+"\n"+body],{type:"text/csv"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=filename;a.click();
  setTimeout(()=>URL.revokeObjectURL(url),10000);
}
function h(tag,attrs,children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object"){Object.assign(el.style,v)}
    else if(k.startsWith("on")&&typeof v==="function"){el.addEventListener(k.slice(2).toLowerCase(),v)}
    else if(k==="className"){el.className=v}
    else if(k==="htmlFor"){el.htmlFor=v}
    else if(typeof v==="boolean"){if(v)el.setAttribute(k,"");else el.removeAttribute(k);}
    else{el.setAttribute(k,v)}
  });
  if(children){(Array.isArray(children)?children:[children]).forEach(c=>{
    if(c==null||c===false||c===undefined)return;
    el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
  })}
  return el;
}
function el(tag,cls,children,style){return h(tag,{className:cls,...(style?{style}:{})},children)}

    // FIX: resolve with false on timeout so callers can distinguish timeout from success
    return Promise.race([promise, new Promise(res=>setTimeout(()=>res(false), ms))]);

// ── USER DASH ─────────────────────────────────────────────────────────────────
function renderUser(){
  if(!SESSION||!SESSION.username){renderLogin();return;}
  if(!DB.users.find(u=>u.username===SESSION.username)){SESSION=null;clearSession();renderLogin();return;}
  const myRecs=()=>DB.attendance.filter(r=>r.username===SESSION.username).sort((a,b)=>b.timestamp-a.timestamp);
  const todayRecs=()=>{
    const s=new Date().toDateString();
    const recs=myRecs().filter(r=>new Date(r.timestamp).toDateString()===s);
    // Remove ghost check-ins: any check-in that appears AFTER the latest checkout
    const sessionCheckoutTs=parseInt(sessionStorage.getItem("vibeLastCheckout_"+SESSION.username)||"0");
    const outs=recs.filter(r=>r.type==="out");
    const lastOutTs=outs.length?Math.max(...outs.map(r=>r.timestamp)):0;
    // Also check queue for a pending checkout timestamp
    const queuedOutTs=Math.max(0,...loadQueue()
      .filter(item=>item.action==="addAttendance"&&item.data?.type==="out"&&item.data?.username===SESSION.username&&new Date(item.data.timestamp).toDateString()===s)
      .map(item=>item.data.timestamp));
    const cutoff=Math.max(sessionCheckoutTs,lastOutTs,queuedOutTs);
    if(!cutoff)return recs;
    // Keep: all outs, and all ins that are NOT after the last checkout (i.e. valid earlier check-ins)
    // Also keep any ins that came AFTER cutoff only if they are genuinely new (future re-checkins)
    // Since this is "today" and user has checked out, drop any in record created suspiciously close after checkout
    return recs.filter(r=>{
      if(r.type==="out")return true;
      // Keep check-in if it came BEFORE the last checkout (it's the original check-in)
      if(r.timestamp<=cutoff)return true;
